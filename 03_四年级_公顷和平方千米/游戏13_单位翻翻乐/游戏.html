<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单位翻翻乐 - 公顷和平方千米</title>
<style>
/* ============================================
   单位翻翻乐 - Memory Card Matching Game
   基于 math-game-designer 模板的CSS样式系统
   四年级"公顷和平方千米"知识点
   ============================================ */

:root {
  /* --- 模板颜色变量 --- */
  --color-primary: #4A90D9;
  --color-primary-light: #7AB3E8;
  --color-primary-dark: #2E6AB0;
  --color-success: #52C41A;
  --color-success-light: #D9F7BE;
  --color-error: #FF4D4F;
  --color-error-light: #FFF1F0;
  --color-warning: #FAAD14;
  --color-warning-light: #FFFBE6;
  --color-bg: #F0F5FF;
  --color-card: #FFFFFF;
  --color-text: #333333;
  --color-text-light: #666666;
  --color-border: #E8E8E8;

  /* --- 尺寸 --- */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-button: 0 4px 12px rgba(0,0,0,0.15);

  /* --- 字体 --- */
  --font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-number: "Consolas", "Courier New", monospace;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-family);
  background: var(--color-bg);
  color: var(--color-text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

/* ============================================
   Game Container (模板标准布局)
   ============================================ */
.game-container {
  width: 100%;
  max-width: 500px;
  background: var(--color-card);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 600px;
  position: relative;
}

/* --- Header Bar --- */
.game-header {
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
  color: white;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.game-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.game-stats {
  display: flex;
  gap: 16px;
  font-size: 14px;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.stat-icon {
  font-size: 16px;
}

.stat-value {
  font-weight: 700;
  font-family: var(--font-number);
}

/* --- Level Indicator --- */
.level-indicator {
  padding: 8px 20px;
  background: var(--color-primary-light);
  color: white;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
}

/* --- Instruction Area --- */
.question-area {
  padding: 16px 20px 8px;
  text-align: center;
  flex-shrink: 0;
}

.question-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--color-text);
  line-height: 1.5;
}

.question-hint {
  font-size: 13px;
  color: var(--color-text-light);
  margin-top: 4px;
}

/* ============================================
   Card Grid - 响应式网格布局
   ============================================ */
.game-area {
  flex: 1;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  position: relative;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  width: 100%;
  max-width: 420px;
  /* 为3D翻转提供透视 */
  perspective: 800px;
}

/* ============================================
   Card - 3D翻转卡牌
   ============================================ */
.card {
  aspect-ratio: 1 / 1.15;
  min-height: 80px;
  cursor: pointer;
  position: relative;
  perspective: 800px;
}

.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}

/* 翻牌状态：绕Y轴旋转180度 */
.card.flipped .card-inner {
  transform: rotateY(180deg);
}

/* 已配对的卡牌：缩小并消失 */
.card.matched {
  pointer-events: none;
  opacity: 0;
  transform: scale(0.3);
  transition: all 0.5s ease 0.3s;
  cursor: default;
}

.card-front,
.card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

/* 卡牌正面（未翻时显示）- 花色背面 */
.card-front {
  background: linear-gradient(135deg, #5B8DEF, #3D6DD8);
  color: white;
  font-size: 32px;
  border: 2px solid rgba(255,255,255,0.3);
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

/* 卡牌正面装饰花纹 */
.card-front::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 2px dashed rgba(255,255,255,0.4);
  border-radius: 6px;
  pointer-events: none;
}

/* 卡牌背面（翻牌后显示）- 数值/算式 */
.card-back {
  background: linear-gradient(135deg, #FFFFFF, #F5F8FF);
  border: 2px solid var(--color-primary);
  color: var(--color-text);
  transform: rotateY(180deg);
  font-size: 14px;
  font-weight: 700;
  padding: 6px;
  line-height: 1.3;
  word-break: keep-all;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

/* 配对成功的卡片瞬间高亮 */
.card-back.matched-highlight {
  border-color: var(--color-success);
  background: var(--color-success-light);
  color: var(--color-success);
}

/* ============================================
   Equation Toast - 配对成功换算提示
   ============================================ */
.equation-toast {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 10px 18px;
  border-radius: var(--radius-md);
  box-shadow: 0 6px 24px rgba(0,0,0,0.2);
  font-size: 15px;
  font-weight: 700;
  color: var(--color-success);
  z-index: 20;
  pointer-events: none;
  white-space: nowrap;
  animation: toastInOut 2s ease forwards;
  border: 2px solid var(--color-success-light);
}

@keyframes toastInOut {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
  30%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  70%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -60%) scale(0.9); }
}

/* ============================================
   Progress Bar (模板标准)
   ============================================ */
.progress-bar-container {
  width: 100%;
  height: 8px;
  background: var(--color-border);
  border-radius: 4px;
  margin: 0 20px;
  width: calc(100% - 40px);
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--color-success), var(--color-primary));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* ============================================
   Feedback Modal (模板标准)
   ============================================ */
.feedback-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
  animation: fadeIn 0.2s ease;
}

.feedback-modal {
  background: white;
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  text-align: center;
  max-width: 320px;
  width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  animation: scaleIn 0.3s ease;
}

.feedback-icon {
  font-size: 56px;
  margin-bottom: 12px;
}

.feedback-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}

.feedback-message {
  font-size: 15px;
  color: var(--color-text-light);
  margin-bottom: 20px;
  line-height: 1.5;
}

.feedback-btn {
  padding: 12px 32px;
  font-size: 16px;
  font-weight: 700;
  color: white;
  background: var(--color-primary);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.2s;
}

.feedback-btn:hover {
  background: var(--color-primary-dark);
}

/* ============================================
   Victory Screen
   ============================================ */
.victory-container {
  text-align: center;
  padding: 20px;
}

.victory-icon {
  font-size: 72px;
  margin-bottom: 12px;
  animation: bounce 0.6s ease infinite alternate;
}

.victory-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--color-success);
  margin-bottom: 8px;
}

.victory-stats {
  font-size: 15px;
  color: var(--color-text-light);
  margin-bottom: 20px;
  line-height: 1.8;
}

.victory-btn {
  padding: 12px 32px;
  font-size: 16px;
  font-weight: 700;
  color: white;
  background: var(--color-primary);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  margin: 0 6px;
  transition: background 0.2s;
}

.victory-btn:hover {
  background: var(--color-primary-dark);
}

/* ============================================
   Footer
   ============================================ */
.game-footer {
  padding: 12px 20px;
  display: flex;
  justify-content: center;
  border-top: 1px solid var(--color-border);
}

.restart-btn {
  padding: 8px 20px;
  font-size: 14px;
  color: var(--color-text-light);
  background: transparent;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
}

.restart-btn:hover {
  color: var(--color-primary);
  border-color: var(--color-primary);
}

/* ============================================
   Animations
   ============================================ */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes scaleIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-12px); }
}

@keyframes shakeCard {
  0%, 100% { transform: rotateY(180deg) translateX(0); }
  20% { transform: rotateY(180deg) translateX(-6px); }
  40% { transform: rotateY(180deg) translateX(6px); }
  60% { transform: rotateY(180deg) translateX(-4px); }
  80% { transform: rotateY(180deg) translateX(4px); }
}

.card.mismatch .card-inner {
  animation: shakeCard 0.4s ease;
}

/* ============================================
   Utility Classes
   ============================================ */
.hidden {
  display: none !important;
}

/* ============================================
   Responsive - 响应式调整
   ============================================ */
@media (max-width: 360px) {
  .game-container {
    min-height: 500px;
  }
  .game-header {
    padding: 12px 16px;
  }
  .game-title {
    font-size: 17px;
  }
  .card-grid {
    gap: 6px;
  }
  .card {
    min-height: 70px;
  }
  .card-front {
    font-size: 26px;
  }
  .card-back {
    font-size: 12px;
    padding: 3px;
  }
  .question-text {
    font-size: 14px;
  }
}

@media (min-width: 500px) {
  .card-back {
    font-size: 15px;
    padding: 8px;
  }
}

@media (min-width: 768px) {
  .game-container {
    max-width: 560px;
    min-height: 700px;
  }
  .card-back {
    font-size: 16px;
  }
}
</style>
</head>
<body>

<!-- ============================================
     Game Container
     ============================================ -->
<div class="game-container" id="gameContainer">
  <!-- Header: 游戏名 + 统计数据 -->
  <div class="game-header">
    <div class="game-title" id="gameTitle">🃏 单位翻翻乐</div>
    <div class="game-stats">
      <!-- 翻牌次数 -->
      <div class="stat-item">
        <span class="stat-icon">👆</span>
        <span class="stat-value" id="flipDisplay">0</span>
      </div>
      <!-- 星级评价 -->
      <div class="stat-item">
        <span class="stat-icon">⭐</span>
        <span class="stat-value" id="starDisplay">★★★</span>
      </div>
      <!-- 关卡 -->
      <div class="stat-item">
        <span class="stat-icon">🎯</span>
        <span class="stat-value" id="levelDisplay">1/3</span>
      </div>
    </div>
  </div>

  <!-- 关卡标签 -->
  <div class="level-indicator" id="levelLabel">第 1 关 · 公顷与平方米</div>

  <!-- 提示语 -->
  <div class="question-area" id="questionArea">
    <div class="question-text" id="questionText">翻开两张牌，找到等值的配对！</div>
    <div class="question-hint" id="questionHint">把公顷数值和平方米数值配成一对</div>
  </div>

  <!-- 卡牌游戏区域 -->
  <div class="game-area" id="gameArea">
    <div class="card-grid" id="cardGrid">
      <!-- 卡牌由JS动态生成 -->
    </div>
  </div>

  <!-- 进度条 -->
  <div style="padding: 0 20px; margin-bottom: 4px;">
    <div class="progress-bar-container" style="width: 100%;">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>
  </div>

  <!-- 底部按钮 -->
  <div class="game-footer">
    <button class="restart-btn" id="restartBtn">🔄 重新开始</button>
  </div>
</div>

<!-- ============================================
     Feedback Modal - 关卡完成 / 提示
     ============================================ -->
<div class="feedback-overlay hidden" id="feedbackOverlay">
  <div class="feedback-modal">
    <div class="feedback-icon" id="feedbackIcon">✅</div>
    <div class="feedback-title" id="feedbackTitle">关卡完成！</div>
    <div class="feedback-message" id="feedbackMessage">恭喜通过本关！</div>
    <button class="feedback-btn" id="feedbackBtn">继续 →</button>
  </div>
</div>

<!-- ============================================
     Game Logic Script
     ============================================ -->
<script>
// ============================================
// DOM 引用
// ============================================
const $ = (sel) => document.querySelector(sel);

const gameTitle   = $('#gameTitle');
const flipDisplay = $('#flipDisplay');
const starDisplay = $('#starDisplay');
const levelDisplay= $('#levelDisplay');
const levelLabel  = $('#levelLabel');
const questionText= $('#questionText');
const questionHint= $('#questionHint');
let   cardGrid    = $('#cardGrid');    // let：重新开始时需重新绑定
const gameArea    = $('#gameArea');
const progressBar = $('#progressBar');
const restartBtn  = $('#restartBtn');
const feedbackOverlay = $('#feedbackOverlay');
const feedbackIcon    = $('#feedbackIcon');
const feedbackTitle   = $('#feedbackTitle');
const feedbackMessage = $('#feedbackMessage');
const feedbackBtn     = $('#feedbackBtn');

// ============================================
// 关卡数据：三关递进的配对卡牌
// ============================================
const levelData = {
  1: {
    name: '公顷与平方米',
    hint: '把公顷数值和平方米数值配成一对',
    // 每对 [左侧文本, 右侧文本, 配对ID]
    pairs: [
      { left: '1公顷',     right: '10000平方米',  id: 'p1' },
      { left: '5公顷',     right: '50000平方米',  id: 'p2' },
      { left: '10公顷',    right: '100000平方米', id: 'p3' },
      { left: '20公顷',    right: '200000平方米', id: 'p4' },
    ]
  },
  2: {
    name: '平方千米与公顷',
    hint: '加入平方千米↔公顷配对了！仔细看单位',
    pairs: [
      { left: '1平方千米', right: '100公顷',      id: 'p1' },
      { left: '3平方千米', right: '300公顷',      id: 'p2' },
      { left: '6公顷',     right: '60000平方米',  id: 'p3' },
      { left: '15公顷',    right: '150000平方米', id: 'p4' },
      { left: '2平方千米', right: '200公顷',      id: 'p5' },
      { left: '50公顷',    right: '500000平方米', id: 'p6' },
    ]
  },
  3: {
    name: '计算挑战',
    hint: '加入算式和文字题！动脑筋算一算',
    pairs: [
      { left: '500m×200m的地',     right: '10公顷',     id: 'p1' },
      { left: '4平方千米',          right: '400公顷',    id: 'p2' },
      { left: '30000平方米',        right: '3公顷',      id: 'p3' },
      { left: '边长1000m的正方形',  right: '1平方千米',  id: 'p4' },
      { left: '250公顷',            right: '2.5平方千米',id: 'p5' },
      { left: '80000平方米',        right: '8公顷',      id: 'p6' },
      { left: '长2km宽1km的长方形', right: '2平方千米',  id: 'p7' },
      { left: '7平方千米',          right: '700公顷',    id: 'p8' },
    ]
  }
};

// ============================================
// 游戏状态
// ============================================
const state = {
  currentLevel: 1,      // 当前关卡
  totalLevels: 3,       // 总关卡数
  flipCount: 0,         // 翻牌总次数（成功+失败）
  wrongFlips: 0,        // 翻错次数（配对数）
  matchedPairs: 0,      // 当前关已配对数量
  totalPairs: 0,        // 当前关总配对数
  totalMatchedAll: 0,   // 全部关卡累计配对
  totalPairsAll: 0,     // 全部关卡累计总配对数
  // 当前状态
  firstCard: null,      // 第一张翻开的卡
  secondCard: null,     // 第二张翻开的卡
  isLocked: false,      // 是否锁定交互（动画进行中）
};

// ============================================
// Fisher-Yates 洗牌算法
// ============================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================
// 根据关卡数据生成卡牌列表并随机排列
// ============================================
function createCards(level) {
  const data = levelData[level];
  const cards = [];

  data.pairs.forEach(pair => {
    // 每对生成2张卡牌，共享同一个 pairId
    cards.push({
      pairId: pair.id,
      text: pair.left,
      side: 'left',
      equation: `${pair.left} = ${pair.right}`
    });
    cards.push({
      pairId: pair.id,
      text: pair.right,
      side: 'right',
      equation: `${pair.left} = ${pair.right}`
    });
  });

  return shuffle(cards);
}

// ============================================
// 渲染卡牌网格
// ============================================
function renderCards(cards) {
  cardGrid.innerHTML = '';

  cards.forEach((card, index) => {
    const cardEl = document.createElement('div');
    cardEl.className = 'card';
    cardEl.dataset.index = index;
    cardEl.dataset.pairId = card.pairId;

    cardEl.innerHTML = `
      <div class="card-inner">
        <div class="card-front">?</div>
        <div class="card-back">${card.text}</div>
      </div>
    `;

    // 绑定点击事件
    cardEl.addEventListener('click', () => handleCardClick(cardEl, card, index));

    cardGrid.appendChild(cardEl);
  });
}

// ============================================
// 处理卡牌点击
// ============================================
function handleCardClick(cardEl, cardData, index) {
  // 锁定状态不响应点击
  if (state.isLocked) return;

  // 已经翻开的牌不响应
  if (cardEl.classList.contains('flipped')) return;

  // 已经配对的牌不响应
  if (cardEl.classList.contains('matched')) return;

  // 如果正在比较两张牌（动画中），不响应
  if (state.firstCard && state.secondCard) return;

  // 翻转卡牌
  cardEl.classList.add('flipped');
  state.flipCount++;
  updateFlipDisplay();

  if (!state.firstCard) {
    // 第一张翻牌
    state.firstCard = { el: cardEl, data: cardData, index: index };
  } else {
    // 第二张翻牌
    state.secondCard = { el: cardEl, data: cardData, index: index };
    state.isLocked = true;

    // 检查是否配对
    checkMatch();
  }
}

// ============================================
// 检查两张翻开的牌是否配对
// ============================================
function checkMatch() {
  const card1 = state.firstCard;
  const card2 = state.secondCard;

  if (card1.data.pairId === card2.data.pairId) {
    // ✅ 配对成功！
    handleMatchSuccess(card1, card2);
  } else {
    // ❌ 配对失败！
    handleMatchFail(card1, card2);
  }
}

// ============================================
// 配对成功处理
// ============================================
function handleMatchSuccess(card1, card2) {
  // 高亮两张卡牌背面
  const back1 = card1.el.querySelector('.card-back');
  const back2 = card2.el.querySelector('.card-back');
  back1.classList.add('matched-highlight');
  back2.classList.add('matched-highlight');

  // 显示换算等式提示
  showEquationToast(card1.data.equation);

  // 短暂延迟后让配对卡牌消失
  setTimeout(() => {
    card1.el.classList.add('matched');
    card2.el.classList.add('matched');

    state.matchedPairs++;
    state.totalMatchedAll++;
    updateProgress();

    // 重置选择状态
    resetSelection();

    // 检查是否完成当前关卡
    if (state.matchedPairs === state.totalPairs) {
      setTimeout(() => onLevelComplete(), 600);
    }
  }, 800);
}

// ============================================
// 配对失败处理
// ============================================
function handleMatchFail(card1, card2) {
  state.wrongFlips++;

  // 振动动画提示翻错
  card1.el.classList.add('mismatch');
  card2.el.classList.add('mismatch');

  // 延迟后翻回
  setTimeout(() => {
    card1.el.classList.remove('flipped', 'mismatch');
    card2.el.classList.remove('flipped', 'mismatch');
    resetSelection();
  }, 1000);
}

// ============================================
// 显示换算等式 Toast
// ============================================
function showEquationToast(equation) {
  // 移除已有 toast
  const existing = gameArea.querySelector('.equation-toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'equation-toast';
  toast.textContent = '✅ ' + equation;
  gameArea.appendChild(toast);

  // 动画结束后自动移除
  setTimeout(() => {
    if (toast.parentNode) toast.remove();
  }, 2100);
}

// ============================================
// 重置选择状态
// ============================================
function resetSelection() {
  state.firstCard = null;
  state.secondCard = null;
  state.isLocked = false;
}

// ============================================
// 关卡完成处理
// ============================================
function onLevelComplete() {
  const stars = getStarRating();
  const data = levelData[state.currentLevel];

  if (state.currentLevel >= state.totalLevels) {
    // 全部通关，显示胜利画面
    showVictory();
  } else {
    // 显示关卡完成的反馈弹窗
    showFeedback(
      'correct',
      '关卡完成！',
      `恭喜通过第${state.currentLevel}关「${data.name}」！\n翻错 ${state.wrongFlips} 次，获得 ${stars}`,
      () => {
        // 进入下一关
        state.currentLevel++;
        startLevel(state.currentLevel);
      }
    );
  }
}

// ============================================
// 星级评价计算
// 翻错 ≤2 次 = 3星, ≤5 次 = 2星, >5 次 = 1星
// ============================================
function getStarRating() {
  if (state.wrongFlips <= 2) return '★★★';
  if (state.wrongFlips <= 5) return '★★☆';
  return '★☆☆';
}

function getStarCount() {
  if (state.wrongFlips <= 2) return 3;
  if (state.wrongFlips <= 5) return 2;
  return 1;
}

// ============================================
// 开始某一关
// ============================================
function startLevel(level) {
  const data = levelData[level];
  if (!data) return;

  // 更新UI
  updateLevel(level);
  levelLabel.textContent = `第 ${level} 关 · ${data.name}`;
  questionText.textContent = '翻开两张牌，找到等值的配对！';
  questionHint.textContent = data.hint;

  // 重置关卡状态
  state.flipCount = 0;
  state.wrongFlips = 0;
  state.matchedPairs = 0;
  state.totalPairs = data.pairs.length;
  state.totalPairsAll = Object.values(levelData).reduce((sum, d) => sum + d.pairs.length, 0);
  state.firstCard = null;
  state.secondCard = null;
  state.isLocked = false;

  // 累计总配对数（用于进度条）
  // 前面已完成的关卡配对数 + 当前关卡配对数
  const prevCompleted = Object.keys(levelData)
    .filter(l => parseInt(l) < level)
    .reduce((sum, l) => sum + levelData[l].pairs.length, 0);
  state.totalMatchedAll = prevCompleted;

  // 更新显示
  updateFlipDisplay();
  updateStarDisplay();
  updateProgress();

  // 生成并渲染卡牌
  const cards = createCards(level);
  renderCards(cards);
}

// ============================================
// UI 更新函数
// ============================================
function updateFlipDisplay() {
  flipDisplay.textContent = state.flipCount;
}

function updateStarDisplay() {
  starDisplay.textContent = getStarRating();
}

function updateLevel(level) {
  levelDisplay.textContent = `${level}/${state.totalLevels}`;
}

function updateProgress() {
  const total = state.totalPairsAll;
  const current = state.totalMatchedAll;
  const pct = total > 0 ? Math.round((current / total) * 100) : 0;
  progressBar.style.width = `${pct}%`;
}

// ============================================
// Feedback Modal (模板标准)
// ============================================
function showFeedback(type, title, message, onContinue) {
  feedbackIcon.textContent = type === 'correct' ? '✅' : '💡';
  feedbackTitle.textContent = title;
  feedbackTitle.style.color = type === 'correct'
    ? 'var(--color-success)' : 'var(--color-warning)';
  feedbackMessage.textContent = message;
  feedbackOverlay.classList.remove('hidden');

  feedbackBtn.onclick = () => {
    feedbackOverlay.classList.add('hidden');
    if (onContinue) onContinue();
  };
}

// ============================================
// 全部通关 - 胜利画面
// ============================================
function showVictory() {
  // 计算全局总翻错次数（当前只显示最后一关的，但胜利画面展示最终评价）
  const finalStars = getStarRating();
  const totalFlips = state.flipCount;
  const totalPairs = Object.values(levelData).reduce((sum, d) => sum + d.pairs.length, 0);

  // 替换游戏区域为胜利画面
  cardGrid.innerHTML = '';
  gameArea.innerHTML = `
    <div class="victory-container">
      <div class="victory-icon">🏆</div>
      <div class="victory-title">恭喜通关！</div>
      <div class="victory-stats">
        <div>🎯 完成全部 ${state.totalLevels} 关</div>
        <div>👆 总共翻牌 ${totalFlips} 次</div>
        <div>❌ 本关翻错 ${state.wrongFlips} 次</div>
        <div>⭐ 最终评价 ${finalStars}</div>
        <div style="font-size:18px;margin-top:8px;">🌟 你对公顷和平方千米的换算已经滚瓜烂熟啦！</div>
      </div>
      <button class="victory-btn" onclick="restartGame()">🔄 再玩一次</button>
    </div>
  `;

  // 进度条满格
  progressBar.style.width = '100%';
  levelLabel.textContent = '全部通关！🎉';
  questionText.textContent = '';
  questionHint.textContent = '';
}

// ============================================
// 重新开始游戏
// ============================================
function restartGame() {
  state.currentLevel = 1;
  state.totalMatchedAll = 0;

  // 计算总配对数
  const total = Object.values(levelData).reduce((sum, d) => sum + d.pairs.length, 0);
  state.totalPairsAll = total;

  // 如果游戏区域被胜利画面替换，恢复原始结构
  if (!gameArea.querySelector('.card-grid')) {
    gameArea.innerHTML = '<div class="card-grid" id="cardGrid"></div>';
    // 重新绑定 cardGrid 引用
    cardGrid = gameArea.querySelector('#cardGrid');
  } else {
    // 确保 cardGrid 引用有效
    cardGrid = document.getElementById('cardGrid');
  }

  updateLevel(1);
  updateProgress();
  startLevel(1);
}

// ============================================
// 事件绑定 & 初始化
// ============================================
restartBtn.addEventListener('click', restartGame);

// 初始化游戏
(function init() {
  gameTitle.textContent = '🃏 单位翻翻乐';
  state.totalPairsAll = Object.values(levelData).reduce((sum, d) => sum + d.pairs.length, 0);
  state.totalMatchedAll = 0;
  updateLevel(1);
  updateProgress();
  startLevel(1);
})();
</script>

</body>
</html>
