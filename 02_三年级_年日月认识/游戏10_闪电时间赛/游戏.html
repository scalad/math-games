<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 闪电时间赛 - 年、月、日的认识</title>
<style>
/* ============================================
   Speed Challenge Theme - Dark Neon
   ============================================ */
:root {
  --color-bg: #1A1A2E;
  --color-card: #16213E;
  --color-card-light: #1F3460;
  --color-primary: #00D2FF;
  --color-primary-light: #4DE8FF;
  --color-primary-dark: #0099CC;
  --color-success: #00E676;
  --color-success-light: #1B3A2D;
  --color-error: #FF2D55;
  --color-error-light: #3D1A25;
  --color-warning: #FFD740;
  --color-warning-light: #3D3020;
  --color-text: #E0E0E0;
  --color-text-light: #A0A0B0;
  --color-border: #2A3A5C;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-card: 0 4px 24px rgba(0,210,255,0.1);
  --shadow-glow: 0 0 20px rgba(0,210,255,0.3);
  --font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-number: "Consolas", "Courier New", monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-family);
  background: var(--color-bg);
  background-image: radial-gradient(ellipse at 50% 0%, #1A2A4A 0%, #0D1117 70%);
  color: var(--color-text);
  min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  padding: 16px;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}

.game-container {
  width: 100%; max-width: 480px;
  background: var(--color-card);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  display: flex; flex-direction: column;
  min-height: 620px; position: relative;
  border: 1px solid var(--color-border);
}

/* --- Header --- */
.game-header {
  background: linear-gradient(135deg, #0F2B4C, #0D1B36);
  color: white; padding: 14px 20px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid rgba(0,210,255,0.2);
}
.game-title { font-size: 19px; font-weight: 700; }
.game-stats { display: flex; gap: 14px; font-size: 13px; }
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-icon { font-size: 15px; }
.stat-value { font-weight: 700; font-family: var(--font-number); }

/* --- Timer Bar --- */
.timer-bar-container {
  height: 6px; background: #1A2D50; position: relative;
}
.timer-bar-fill {
  height: 100%; background: linear-gradient(90deg, #00E676, #00D2FF, #FF2D55);
  background-size: 200% 100%;
  transition: width 0.3s linear;
  border-radius: 0 0 3px 0;
}

/* --- Level + Time display --- */
.level-bar {
  padding: 8px 20px; display: flex; justify-content: space-between; align-items: center;
  background: var(--color-card-light); border-bottom: 1px solid var(--color-border);
}
.level-bar-label { font-size: 13px; font-weight: 600; color: var(--color-primary); }
.time-display { font-size: 20px; font-weight: 700; font-family: var(--font-number); color: var(--color-primary-light); }
.time-display.urgent { color: var(--color-error); animation: pulse-urgent 0.5s ease infinite alternate; }

/* --- Combo --- */
.combo-bar {
  padding: 6px 20px; display: flex; justify-content: space-between; align-items: center;
  background: rgba(0,210,255,0.05);
}
.combo-display { font-size: 14px; font-weight: 700; color: var(--color-warning); }
.combo-display.fire { color: #FF6D00; text-shadow: 0 0 10px rgba(255,109,0,0.5); }
.combo-multiplier { font-size: 12px; color: var(--color-text-light); }

/* --- Question --- */
.question-area { padding: 20px; text-align: center; flex-shrink: 0; }
.question-text {
  font-size: 20px; font-weight: 700; color: #FFF;
  margin-bottom: 6px; line-height: 1.5;
  text-shadow: 0 0 10px rgba(0,210,255,0.2);
}
.question-hint { font-size: 12px; color: var(--color-text-light); }

/* --- Game Area --- */
.game-area {
  flex: 1; padding: 16px 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 180px;
}

/* --- Options --- */
.options-grid {
  display: grid; gap: 12px; width: 100%; max-width: 380px;
}
.options-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.options-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.options-grid.cols-4 { grid-template-columns: 1fr 1fr; }

.option-btn {
  padding: 16px 12px; font-size: 18px; font-weight: 700;
  font-family: var(--font-family); color: #FFF;
  background: var(--color-card-light); border: 2px solid var(--color-border);
  border-radius: var(--radius-md); cursor: pointer;
  transition: all 0.15s ease; min-height: 56px;
  display: flex; align-items: center; justify-content: center;
  text-align: center; line-height: 1.3;
}
.option-btn:hover {
  border-color: var(--color-primary); background: rgba(0,210,255,0.1);
  transform: translateY(-2px); box-shadow: var(--shadow-glow);
}
.option-btn:active { transform: translateY(0); }
.option-btn.correct {
  border-color: var(--color-success); background: var(--color-success-light);
  color: var(--color-success); animation: pulse-glow 0.5s ease;
  box-shadow: 0 0 20px rgba(0,230,118,0.3);
}
.option-btn.incorrect {
  border-color: var(--color-error); background: var(--color-error-light);
  color: var(--color-error); animation: shake 0.4s ease;
}
.option-btn:disabled { pointer-events: none; opacity: 0.6; }

/* --- Score Pop --- */
.score-pop {
  position: absolute; font-size: 22px; font-weight: 700;
  color: var(--color-primary); pointer-events: none;
  animation: scoreFly 0.8s ease forwards;
  z-index: 50;
}

/* --- Progress --- */
.progress-container {
  padding: 0 20px 8px;
}
.progress-bar-container {
  width: 100%; height: 4px; background: var(--color-border);
  border-radius: 2px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--color-primary), var(--color-success));
  border-radius: 2px; transition: width 0.3s ease;
}

/* --- Footer --- */
.game-footer {
  padding: 10px 20px; display: flex; justify-content: center;
  border-top: 1px solid var(--color-border);
}
.restart-btn {
  padding: 8px 20px; font-size: 13px; color: var(--color-text-light);
  background: transparent; border: 1px solid var(--color-border);
  border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s;
}
.restart-btn:hover { color: var(--color-primary); border-color: var(--color-primary); }

/* --- Feedback Modal --- */
.feedback-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); display: flex;
  justify-content: center; align-items: center;
  z-index: 100; animation: fadeIn 0.2s ease;
}
.feedback-modal {
  background: var(--color-card); border-radius: var(--radius-lg);
  padding: 28px 24px; text-align: center;
  max-width: 300px; width: 90%; color: #FFF;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  border: 1px solid var(--color-border);
  animation: scaleIn 0.3s ease;
}
.feedback-icon { font-size: 48px; margin-bottom: 10px; }
.feedback-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.feedback-message { font-size: 14px; color: var(--color-text-light); margin-bottom: 18px; line-height: 1.5; }
.feedback-btn {
  padding: 10px 28px; font-size: 15px; font-weight: 700;
  color: #000; background: var(--color-primary);
  border: none; border-radius: var(--radius-md);
  cursor: pointer; transition: all 0.2s;
}
.feedback-btn:hover { background: var(--color-primary-light); box-shadow: var(--shadow-glow); }

/* --- Victory / Level Complete --- */
.victory-container { text-align: center; padding: 20px; color: #FFF; }
.victory-icon { font-size: 64px; margin-bottom: 10px; animation: bounce 0.6s ease infinite alternate; }
.victory-title { font-size: 24px; font-weight: 700; color: var(--color-primary); margin-bottom: 6px; }
.victory-stats { font-size: 14px; color: var(--color-text-light); margin-bottom: 18px; line-height: 1.9; }
.victory-btn {
  padding: 12px 28px; font-size: 15px; font-weight: 700;
  color: #000; background: var(--color-primary);
  border: none; border-radius: var(--radius-md);
  cursor: pointer; margin: 0 5px; transition: all 0.2s;
}
.victory-btn:hover { background: var(--color-primary-light); box-shadow: var(--shadow-glow); }

/* ============================================
   Practice Mode Styles (dark theme adapted)
   ============================================ */
.practice-container {
  display: none; flex-direction: column; height: 100%;
}
.practice-badge-bar {
  padding: 12px 20px; background: var(--color-card-light);
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--color-border);
}
.practice-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 20px;
  font-size: 13px; font-weight: 700;
}
.badge-tier-1 { background: #1B3A2D; color: #00E676; }
.badge-tier-2 { background: #1A2D50; color: #00D2FF; }
.badge-tier-3 { background: #3D3020; color: #FFD740; }
.badge-tier-4 { background: #2D1A3D; color: #CE93D8; }
.badge-tier-5 { background: #3D1A25; color: #FF5252; }
.practice-progress-text { font-size: 13px; color: var(--color-text-light); }

.practice-question-card {
  margin: 20px; padding: 24px 20px;
  background: var(--color-card-light);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); flex: 1;
}
.practice-q-num { font-size: 12px; font-weight: 700; color: var(--color-primary); margin-bottom: 8px; }
.practice-q-title { font-size: 17px; font-weight: 600; color: #FFF; margin-bottom: 16px; line-height: 1.6; }
.practice-options { display: flex; flex-direction: column; gap: 10px; }
.practice-option {
  padding: 14px 16px; font-size: 15px; text-align: left;
  background: var(--color-card); border: 2px solid var(--color-border);
  border-radius: var(--radius-md); cursor: pointer; color: #FFF;
  transition: all 0.2s; line-height: 1.4;
}
.practice-option:hover { border-color: var(--color-primary); background: rgba(0,210,255,0.1); }
.practice-option.selected-correct { border-color: var(--color-success); background: var(--color-success-light); color: var(--color-success); }
.practice-option.selected-wrong { border-color: var(--color-error); background: var(--color-error-light); color: var(--color-error); }
.practice-option.show-correct { border-color: var(--color-success); }
.practice-option:disabled { pointer-events: none; }

.practice-input-area { display: flex; gap: 10px; }
.practice-input {
  flex: 1; padding: 12px 16px; font-size: 18px; font-weight: 700;
  font-family: var(--font-number); text-align: center; color: #FFF;
  background: var(--color-card); border: 2px solid var(--color-border);
  border-radius: var(--radius-md); outline: none;
}
.practice-input:focus { border-color: var(--color-primary); }
.submit-btn {
  padding: 14px 24px; font-size: 15px; font-weight: 700;
  color: #000; background: var(--color-primary);
  border: none; border-radius: var(--radius-md);
  cursor: pointer; transition: background 0.2s; min-width: 72px;
}
.submit-btn:hover { background: var(--color-primary-light); }

.practice-feedback {
  margin: 0 20px 12px; padding: 12px 16px;
  border-radius: var(--radius-md); font-size: 14px;
  line-height: 1.5; display: none;
}
.practice-feedback.show { display: block; animation: fadeIn 0.3s ease; }
.practice-feedback.correct { background: var(--color-success-light); color: #00E676; }
.practice-feedback.wrong { background: var(--color-error-light); color: #FF5252; }

.practice-nav {
  padding: 12px 20px; display: flex; gap: 10px;
  justify-content: center; border-top: 1px solid var(--color-border);
}
.practice-nav-btn {
  padding: 10px 24px; font-size: 15px; font-weight: 700;
  border: none; border-radius: var(--radius-md);
  cursor: pointer; transition: all 0.2s;
}
.practice-nav-btn.primary { background: var(--color-primary); color: #000; }
.practice-nav-btn.primary:hover { background: var(--color-primary-light); }
.practice-nav-btn.primary:disabled { opacity: 0.4; cursor: not-allowed; }
.practice-nav-btn.secondary { background: transparent; color: var(--color-text-light); border: 1px solid var(--color-border); }
.practice-nav-btn.secondary:hover { color: var(--color-primary); border-color: var(--color-primary); }

.practice-summary { text-align: center; padding: 30px 20px; color: #FFF; }
.practice-summary-icon { font-size: 56px; margin-bottom: 10px; }
.practice-summary-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.practice-summary-score { font-size: 36px; font-weight: 700; font-family: var(--font-number); margin-bottom: 12px; }
.practice-summary-detail { font-size: 14px; color: var(--color-text-light); margin-bottom: 20px; line-height: 1.8; }

/* --- Level Complete Overlay --- */
.level-complete-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(13,17,23,0.92); display: flex;
  justify-content: center; align-items: center;
  z-index: 90; animation: fadeIn 0.3s ease;
}
.level-complete-card {
  text-align: center; padding: 30px; color: #FFF;
}

/* --- Animations --- */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes shake { 0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)} }
@keyframes pulse-glow { 0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)} }
@keyframes pulse-urgent { from{opacity:1} to{opacity:0.4} }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-10px)} }
@keyframes scoreFly {
  0% { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-60px) scale(1.4); }
}
@keyframes comboFire { 0%{text-shadow:0 0 8px #FF6D00} 50%{text-shadow:0 0 20px #FF6D00} 100%{text-shadow:0 0 8px #FF6D00} }

.hidden { display: none !important; }
.text-center { text-align: center; }

@media (max-width: 360px) {
  .game-container { min-height: 500px; }
  .game-title { font-size: 16px; }
  .question-text { font-size: 17px; }
  .option-btn { font-size: 16px; padding: 12px; }
}
@media (min-width: 768px) {
  .game-container { max-width: 560px; min-height: 680px; }
  .options-grid.cols-4 { grid-template-columns: 1fr 1fr; max-width: 440px; }
}
</style>
</head>
<body>

<div class="game-container" id="gameContainer">
  <div class="game-header">
    <div class="game-title">⚡ 闪电时间赛</div>
    <div class="game-stats">
      <div class="stat-item"><span class="stat-icon">⭐</span><span class="stat-value" id="scoreDisplay">0</span></div>

    <div class="timer-bar-fill" id="timerBar" style="width:100%"></div>

  </div>

  <div class="game-area" id="gameArea" style="position:relative;">
    <button class="victory-btn" id="startBtn" style="font-size:18px; padding:16px 40px;">🚀 开始挑战</button>
  </div>

  <div class="progress-container">
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <div class="game-footer">
    <button class="restart-btn" id="restartBtn">🔄 重新开始</button>
  </div>
</div>

<!-- Practice Mode -->
<div class="practice-container hidden" id="practiceContainer">
  <div class="practice-badge-bar">
    <span class="practice-badge" id="practiceBadge">📝 巩固练习</span>

    <div class="practice-q-title" id="practiceQTitle">题目内容</div>
    <div id="practiceQContent"></div>
  </div>
  <div class="practice-feedback" id="practiceFeedback"></div>
  <div class="practice-nav">
    <button class="practice-nav-btn secondary hidden" id="practiceSkipBtn">跳过</button>
    <button class="practice-nav-btn primary" id="practiceNextBtn">下一题 →</button>
  </div>
</div>

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getRandomQuestions(level, count) {
  const pool = questionPools[level];
  const shuffled = shuffle(pool);
  return shuffled.slice(0, count);
}

// ============================================
// UI Helpers
// ============================================
function updateScore(pts) { state.score += pts; scoreDisplay.textContent = state.score; }

function updateTimeUI() {
  timeDisplay.textContent = Math.max(0, Math.ceil(state.timeLeft));
  const cfg = levelConfig[state.level];
  const pct = Math.max(0, (state.timeLeft / cfg.time) * 100);
  timerBar.style.width = pct + '%';
  if (state.timeLeft <= 5) {
    timeDisplay.classList.add('urgent');
    timerBar.style.background = '#FF2D55';
  } else if (state.timeLeft <= 10) {
    timeDisplay.classList.remove('urgent');
    timerBar.style.background = 'linear-gradient(90deg, #FFD740, #FF2D55)';
  } else {
    timeDisplay.classList.remove('urgent');
    timerBar.style.background = 'linear-gradient(90deg, #00E676, #00D2FF)';
  }
}

function updateCombo() {
  if (state.combo >= 10) {
    comboDisplay.className = 'combo-display fire';
    comboDisplay.textContent = `🔥🔥 超级连击 ${state.combo}`;
  } else if (state.combo >= 5) {
    comboDisplay.className = 'combo-display fire';
    comboDisplay.textContent = `🔥 连击 ${state.combo}`;
  } else {
    comboDisplay.className = 'combo-display';
    comboDisplay.textContent = `🔥 连击 ${state.combo}`;
  }
  const mult = state.combo >= 15 ? 2.0 : state.combo >= 10 ? 1.5 : state.combo >= 5 ? 1.2 : 1.0;
  multiplierDisplay.textContent = `×${mult.toFixed(1)}`;
}

function getComboMultiplier() {
  if (state.combo >= 15) return 2.0;
  if (state.combo >= 10) return 1.5;
  if (state.combo >= 5) return 1.2;
  return 1.0;
}

function showScorePop(x, y, text) {
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = text;
  pop.style.left = x + 'px';
  pop.style.top = y + 'px';
  gameArea.appendChild(pop);
  setTimeout(() => pop.remove(), 800);
}

// ============================================
// Timer
// ============================================
function startTimer() {
  state.isRunning = true;
  state.timerInterval = setInterval(() => {
    state.timeLeft -= 0.1;
    updateTimeUI();
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      state.timeLeft = 0;
      updateTimeUI();
      endLevel();
    }
  }, 100);
}

function stopTimer() {
  clearInterval(state.timerInterval);
  state.isRunning = false;
}

function addTimePenalty(seconds) {
  state.timeLeft = Math.max(0, state.timeLeft - seconds);
  updateTimeUI();
  if (state.timeLeft <= 0) {
    stopTimer();
    endLevel();
  }
}

// ============================================
// Game Flow
// ============================================
let currentQuestions = [];
let currentQIndex = 0;
let levelQuestionsCorrect = 0;

function startLevel() {
  const cfg = levelConfig[state.level];
  state.timeLeft = cfg.time;
  state.combo = 0;
  levelQuestionsCorrect = 0;
  state.questionsThisLevel = 0;
  currentQIndex = 0;

  levelLabel.textContent = `${cfg.icon} 第 ${state.level} 关 · ${cfg.name}`;
  levelDisplay.textContent = `${state.level}/${state.totalLevels}`;
  updateTimeUI();
  updateCombo();
  updateProgress(0, 100);

  // Prepare 20 questions per level for a continuous flow
  currentQuestions = getRandomQuestions(state.level, 20);
  questionHint.textContent = `目标：答对≥${cfg.minCorrect}题即可过关`;
  renderNextQuestion();
}

function renderNextQuestion() {
  if (currentQIndex >= currentQuestions.length) {
    currentQuestions = getRandomQuestions(state.level, 20);
    currentQIndex = 0;
  }

  if (state.timeLeft <= 0) {
    endLevel();
    return;
  }

  const q = currentQuestions[currentQIndex];
  questionText.textContent = `第 ${state.questionsThisLevel + 1} 题：${q.q}`;
  questionHint.textContent = `剩余 ${Math.max(1, Math.ceil(state.timeLeft))} 秒 | 目标答对≥${levelConfig[state.level].minCorrect}题`;

  const cfg = levelConfig[state.level];
  const cols = cfg.cols;

  gameArea.innerHTML = `<div class="options-grid cols-${cols === 4 ? 2 : cols}"></div>`;
  const grid = gameArea.querySelector('.options-grid');

  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.addEventListener('click', (e) => handleAnswer(idx, q.answer, q.options[q.answer], e));
    grid.appendChild(btn);
  });

  state.isAnswering = false;
}

function handleAnswer(selected, correct, correctAnswer, event) {
  if (state.isAnswering || state.timeLeft <= 0) return;
  state.isAnswering = true;
  state.totalAttempts++;
  state.questionsThisLevel++;
  currentQIndex++;

  const buttons = gameArea.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  if (selected === correct) {
    buttons[selected].classList.add('correct');
    state.combo++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
    state.correctCount++;
    levelQuestionsCorrect++;
    const mult = getComboMultiplier();
    const pts = Math.round(10 * mult);
    updateScore(pts);
    updateCombo();

    // Score pop
    const rect = buttons[selected].getBoundingClientRect();
    const gRect = gameArea.getBoundingClientRect();
    showScorePop(rect.left - gRect.left + rect.width / 2, rect.top - gRect.top - 10,
      `+${pts}${mult > 1 ? '🔥' : ''}`);

    updateProgress(levelQuestionsCorrect, levelConfig[state.level].minCorrect);

    setTimeout(() => renderNextQuestion(), 300);
  } else {
    buttons[selected].classList.add('incorrect');
    buttons[correct].classList.add('correct');
    state.combo = 0;
    updateCombo();
    addTimePenalty(2);
    updateProgress(levelQuestionsCorrect, levelConfig[state.level].minCorrect);

    // Show hint briefly
    questionHint.textContent = `❌ 正确答案是：${correctAnswer}（扣2秒！）`;
    setTimeout(() => {
      questionHint.textContent = `剩余 ${Math.max(1, Math.ceil(state.timeLeft))} 秒 | 目标答对≥${levelConfig[state.level].minCorrect}题`;
      renderNextQuestion();
    }, 800);
  }
}

function endLevel() {
  stopTimer();
  const cfg = levelConfig[state.level];
  const passed = levelQuestionsCorrect >= cfg.minCorrect;

  if (passed && state.level < state.totalLevels) {
    // Level complete, advance
    gameArea.innerHTML = `
      <div class="level-complete-card">
        <div class="victory-icon">🎉</div>
        <div class="victory-title" style="color:var(--color-success)">${cfg.name} 通过！</div>
        <div class="victory-stats">
          <div>✅ 答对：${levelQuestionsCorrect} 题</div>
          <div>🔥 最高连击：${state.maxCombo}</div>
          <div>⭐ 当前得分：${state.score} 分</div>
        </div>
        <button class="victory-btn" id="nextLevelBtn">进入第 ${state.level + 1} 关 →</button>
      </div>`;
    $('#nextLevelBtn').addEventListener('click', () => {
      state.level++;
      startLevel();
      startTimer();
    });
  } else if (!passed) {
    // Failed level
    gameArea.innerHTML = `
      <div class="level-complete-card">
        <div class="victory-icon">😞</div>
        <div class="victory-title" style="color:var(--color-error)">时间到！</div>
        <div class="victory-stats">
          <div>✅ 答对：${levelQuestionsCorrect} / ${cfg.minCorrect}（未达标）</div>
          <div>🔥 最高连击：${state.maxCombo}</div>
          <div>⭐ 当前得分：${state.score} 分</div>
          <div>💡 需要答对至少${cfg.minCorrect}题才能过关</div>
        </div>
        <button class="victory-btn" id="retryBtn">🔄 重试本关</button>
      </div>`;
    $('#retryBtn').addEventListener('click', () => {
      startLevel();
      startTimer();
    });
  } else {
    // All levels complete
    showVictory();
  }
}

function showVictory() {
  stopTimer();

  const accuracy = state.totalAttempts > 0
    ? Math.round((state.correctCount / state.totalAttempts) * 100)
    : 0;

  const tier = determinePracticeTier();
  const tierLabel = difficultyLabels[tier];

  gameArea.innerHTML = `
    <div class="victory-container">
      <div class="victory-icon">🏆</div>
      <div class="victory-title">🎉 全部通关！</div>
      <div class="victory-stats">
        <div>🎯 完成关卡：${state.totalLevels} 关</div>
        <div>⭐ 最终得分：${state.score} 分</div>
        <div>📊 正确率：${accuracy}%（${state.correctCount}/${state.totalAttempts}）</div>
        <div>🔥 最高连击：${state.maxCombo}</div>
      </div>
      <button class="victory-btn" onclick="enterPracticeMode()">
        📝 进入练习 <small>(${tierLabel.icon} ${tierLabel.name})</small>
      </button>
      <div style="margin-top:8px;">
        <button class="restart-btn" onclick="restartGame()">🔄 直接重玩</button>
      </div>
    </div>`;
}

function startGame() {
  state.score = 0;
  state.level = 1;
  state.correctCount = 0;
  state.totalAttempts = 0;
  state.combo = 0;
  state.maxCombo = 0;
  updateScore(0);
  state.mode = 'game';
  gameContainer.classList.remove('hidden');
  practiceContainer.classList.add('hidden');
  practiceContainer.style.display = 'none';
  startLevel();
  startTimer();
}

function restartGame() {
  stopTimer();
  state.mode = 'game';
  state.score = 0;
  state.level = 1;
  state.correctCount = 0;
  state.totalAttempts = 0;
  state.combo = 0;
  state.maxCombo = 0;
  updateScore(0);
  updateCombo();
  levelDisplay.textContent = '1/3';
  gameContainer.classList.remove('hidden');
  practiceContainer.classList.add('hidden');
  practiceContainer.style.display = 'none';
  startLevel();
  startTimer();
}

function determinePracticeTier() {
  const accuracy = state.totalAttempts > 0 ? state.correctCount / state.totalAttempts : 0;
  if (accuracy < 0.4) return 1;
  if (accuracy < 0.6) return 2;
  if (accuracy < 0.8) return 3;
  if (accuracy < 0.95) return 4;
  return 5;
}

function enterPracticeMode() {
  stopTimer();
  state.practiceTier = determinePracticeTier();
  state.mode = 'practice';
  state.practiceIndex = 0;
  state.practiceCorrect = 0;

  gameContainer.classList.add('hidden');
  practiceContainer.classList.remove('hidden');
  practiceContainer.style.display = 'flex';

  const tier = difficultyLabels[state.practiceTier];
  practiceBadge.innerHTML = `${tier.icon} ${tier.name}`;
  practiceBadge.className = `practice-badge ${tier.badgeClass}`;
  practiceNextBtn.textContent = '开始答题 →';
  practiceNextBtn.classList.remove('hidden');
  practiceNextBtn.disabled = false;

  renderPracticeQuestion();
}

function renderPracticeQuestion() {
  const problems = practiceProblems[state.practiceTier];
  if (!problems || state.practiceIndex >= problems.length) {
    showPracticeSummary();
    return;
  }

  const p = problems[state.practiceIndex];
  const total = problems.length;
  practiceProgress.textContent = `第 ${state.practiceIndex + 1}/${total} 题`;
  practiceQNum.textContent = `第 ${state.practiceIndex + 1} 题`;
  practiceQTitle.textContent = p.q;
  practiceFeedback.classList.remove('show', 'correct', 'wrong');
  practiceFeedback.textContent = '';

  if (p.type === 'fill') {
    practiceQContent.innerHTML = `
      <div class="practice-input-area">
        <input type="text" class="practice-input" id="practiceInput" placeholder="输入答案" inputmode="text">
        <button class="submit-btn" id="practiceSubmitBtn">确认</button>
      </div>`;
    $('#practiceSubmitBtn').addEventListener('click', handlePracticeSubmit);
    $('#practiceInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') handlePracticeSubmit(); });
    $('#practiceInput').focus();
  } else {
    practiceQContent.innerHTML = '<div class="practice-options"></div>';
    const opts = practiceQContent.querySelector('.practice-options');
    p.options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'practice-option';
      btn.textContent = opt;
      btn.addEventListener('click', () => handlePracticeChoice(idx, p.answer, p.options[p.answer]));
      opts.appendChild(btn);
    });
  }
  practiceNextBtn.textContent = state.practiceIndex < problems.length - 1 ? '下一题 →' : '查看结果 📊';
  practiceNextBtn.disabled = true;
}

function handlePracticeChoice(selected, correctIdx, correctText) {
  const options = practiceQContent.querySelectorAll('.practice-option');
  options.forEach(o => o.disabled = true);
  if (selected === correctIdx) {
    options[selected].classList.add('selected-correct');
    state.practiceCorrect++;
    practiceFeedback.textContent = `✅ 正确！${correctText}`;
    practiceFeedback.className = 'practice-feedback show correct';
  } else {
    options[selected].classList.add('selected-wrong');
    options[correctIdx].classList.add('show-correct');
    practiceFeedback.textContent = `❌ 正确答案是 ${correctText}。加油！`;
    practiceFeedback.className = 'practice-feedback show wrong';
  }
  practiceNextBtn.disabled = false;
}

function handlePracticeSubmit() {
  const input = $('#practiceInput');
  const btn = $('#practiceSubmitBtn');
  if (!input || btn.disabled) return;
  const problems = practiceProblems[state.practiceTier];
  const p = problems[state.practiceIndex];
  const userAnswer = input.value.trim();
  btn.disabled = true;
  input.disabled = true;
  if (userAnswer === p.answer) {
    state.practiceCorrect++;
    practiceFeedback.textContent = `✅ 正确！答案就是 ${p.answer}`;
    practiceFeedback.className = 'practice-feedback show correct';
  } else {
    practiceFeedback.textContent = `❌ 正确答案是 ${p.answer}。${p.hint || ''}`;
    practiceFeedback.className = 'practice-feedback show wrong';
  }
  practiceNextBtn.disabled = false;
}

function handlePracticeNext() {
  const problems = practiceProblems[state.practiceTier];
  if (state.practiceIndex >= problems.length - 1) { showPracticeSummary(); return; }
  state.practiceIndex++;
  renderPracticeQuestion();
}

function showPracticeSummary() {
  const problems = practiceProblems[state.practiceTier];
  const total = problems ? problems.length : 0;
  const pct = total > 0 ? Math.round((state.practiceCorrect / total) * 100) : 0;
  let emoji, color;
  if (pct >= 80) { emoji = '🌟'; color = 'var(--color-success)'; }
  else if (pct >= 60) { emoji = '👍'; color = 'var(--color-primary)'; }
  else { emoji = '💪'; color = 'var(--color-warning)'; }

  gameContainer.classList.remove('hidden');
  practiceContainer.classList.add('hidden');
  practiceContainer.style.display = 'none';

  gameArea.innerHTML = `
    <div class="practice-summary">
      <div class="practice-summary-icon">${emoji}</div>
      <div class="practice-summary-title">练习完成！</div>
      <div class="practice-summary-score" style="color:${color}">${state.practiceCorrect}/${total}</div>
      <div class="practice-summary-detail">
        <div>📊 正确率：${pct}%</div>
        <div>🎮 游戏得分：${state.score} 分</div>
        ${pct >= 80 ? '<div>🏆 太棒了，你对年月日掌握得很好！</div>' :
          pct >= 60 ? '<div>📚 还不错，继续加油会更好！</div>' :
          '<div>🌱 没关系，多练习几次就能进步！</div>'}
      </div>
      <button class="victory-btn" onclick="restartGame()">🔄 再玩一次</button>
    </div>`;
}

practiceNextBtn.addEventListener('click', handlePracticeNext);

// ============================================
// Init
// ============================================
restartBtn.addEventListener('click', restartGame);
gameTitle.textContent = '⚡ 闪电时间赛';

if (startBtn) {
  startBtn.addEventListener('click', () => { startGame(); });
}
</script>
</body>
</html>
