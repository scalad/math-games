<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计价小车队调度中心｜路线经营挑战</title>
<style>
:root{--navy:#17233c;--blue:#2f80ed;--sky:#56ccf2;--orange:#ff8a3d;--purple:#7c3aed;--green:#16a34a;--red:#ef4444;--gold:#f7b731;--muted:#68758a;--line:#dce7f5;--card:#fff;--shadow:0 18px 45px rgba(31,47,75,.16);font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--navy);background:linear-gradient(135deg,#e4f7ff,#fff7df 50%,#f1e9ff)}button,input,select{font:inherit}button{border:0;cursor:pointer}.app{max-width:1200px;margin:0 auto;padding:18px}.top{display:grid;grid-template-columns:1fr 340px;gap:18px}.panel{background:rgba(255,255,255,.94);border:1px solid rgba(255,255,255,.75);border-radius:26px;box-shadow:var(--shadow);padding:20px}.hero{position:relative;overflow:hidden}.hero:after{content:"🚖";position:absolute;right:22px;bottom:-18px;font-size:120px;opacity:.12}.hero h1{font-size:42px;margin:10px 0}.label{display:inline-block;padding:7px 12px;border-radius:999px;background:#eaf2ff;color:#1d4ed8;font-weight:900}.muted{color:var(--muted);line-height:1.75}.btn{border-radius:15px;padding:12px 16px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--blue),var(--sky));box-shadow:0 10px 20px rgba(47,128,237,.22)}.btn.alt{background:linear-gradient(135deg,var(--purple),#b66dff)}.btn.ghost{background:#eef5ff;color:#245;border:1px solid #ccdaf0;box-shadow:none}.score{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.score div{background:#f8fbff;border:1px solid var(--line);border-radius:18px;padding:13px;text-align:center}.score b{display:block;font-size:26px;color:var(--blue)}.rule{margin-top:12px;background:#10253f;color:white;border-radius:18px;padding:15px;line-height:1.8}.rule b{color:#ffe38a}.main{display:grid;grid-template-columns:360px 1fr;gap:18px;margin-top:18px}.map{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.place{min-height:92px;border-radius:20px;border:2px solid #e0e9f7;background:#fbfdff;padding:12px;text-align:left}.place.active{border-color:var(--blue);background:#edf6ff}.place.done{border-color:#86efac;background:#f0fdf4}.stageHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:16px}.stageHead h2{margin:0}.pill{background:#fff7d6;color:#7a4b00;border-radius:999px;padding:8px 12px;font-weight:900}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px}.route{margin:12px 0}.road{height:42px;border-radius:999px;background:#e7edf5;overflow:hidden;display:flex;border:1px solid #cfd9e8}.base{background:linear-gradient(90deg,#56b5ff,#2f80ed)}.extra{background:linear-gradient(90deg,#ffbd72,#ff8a3d)}.taxi{font-size:34px;animation:hop 1s infinite alternate;display:inline-block}@keyframes hop{to{transform:translateY(-8px)}}.ticks{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:8px}.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.choice{border:2px solid var(--line);border-radius:16px;background:#fbfdff;padding:13px;font-weight:900;color:#34445a}.choice.selected{border-color:var(--purple);background:#f3e8ff}.choice.ok{border-color:var(--green);background:#ecfdf5}.choice.bad{border-color:var(--red);background:#fff1f2}.slots{display:grid;gap:10px}.slot{display:grid;grid-template-columns:1fr 135px;gap:10px;align-items:center;background:#f8fbff;border:1px solid var(--line);border-radius:16px;padding:11px}.slot input,.slot select{width:100%;border:2px solid #dce7f5;border-radius:12px;padding:10px}.meter{background:#0f2138;border-radius:22px;color:#d9f2ff;text-align:center;padding:18px}.meter .money{font-size:40px;color:#ffe66e;font-weight:900}.blocks{display:flex;gap:8px;flex-wrap:wrap}.block{background:#fff8db;border:1px solid #f7d56c;border-radius:14px;padding:10px;font-weight:900}.feedback{margin-top:13px;border-radius:16px;padding:13px;line-height:1.75}.okbox{background:#ecfdf5;border:1px solid #86efac;color:#166534}.badbox{background:#fff1f2;border:1px solid #fecdd3;color:#9f1239}.hintbox{background:#fffbeb;border:1px solid #fde68a;color:#7c4a03}.garage{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.car{font-size:34px;text-align:center;background:#f8fbff;border:1px solid var(--line);border-radius:18px;padding:14px}.car.on{background:#fff7d6;border-color:#f7d56c}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}@media(max-width:940px){.top,.main,.grid{grid-template-columns:1fr}.summary{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <section class="top">
    <div class="panel hero">
      <span class="label">🚦 路线经营玩法</span>
      <h1>计价小车队调度中心</h1>
      <p class="muted">你是车队调度员：为不同城区订单派车，先给路线贴标签，再铺计费格，最后用普通路线或挑战路线报价。强调“经营进度”和“触屏选择”。</p>
      <button class="btn" onclick="start()">开始调度</button>
      <button class="btn alt" onclick="state.stage='garage';render()">车库徽章</button>
    </div>
    <div class="panel">
      <div class="score"><div><b id="coins">0</b>金币</div><div><b id="stars">0</b>计价星</div><div><b id="repute">80</b>信誉</div><div><b id="progress">0%</b>修复度</div></div>
      <div class="rule">统一计价：<b>3 km 以内 8 元</b>；超过部分 <b>2.5 元/km</b>；不足 1 km <b>按 1 km</b>。</div>
    </div>
  </section>
  <section class="main">
    <aside class="panel">
      <h3>🏙️ 城区订单地图</h3>
      <div class="map" id="map"></div>
    </aside>
    <main class="panel" id="stage"></main>
  </section>
</div>
<script>
const baseD=3, baseP=8, unit=2.5;
const jobs=[
{id:1,place:'学校',emoji:'🏫',d:2.8,passenger:'晨晨',level:'起步价'},
{id:2,place:'图书馆',emoji:'📚',d:3,passenger:'小林',level:'边界'},
{id:3,place:'科技馆',emoji:'🔬',d:3.1,passenger:'可可',level:'进一'},
{id:4,place:'商场',emoji:'🛍️',d:6.5,passenger:'安安',level:'分段'},
{id:5,place:'机场快线',emoji:'✈️',d:7.2,passenger:'圆圆',level:'乘加'},
{id:6,place:'城市环线',emoji:'🌉',d:8.6,passenger:'航航',level:'双策略'}
].map(j=>({...j,actual:r1(Math.max(0,j.d-baseD)),billing:Math.max(0,Math.ceil(r1(j.d-baseD))),fee:fare(j.d)}));
let state={idx:0,stage:'home',coins:0,stars:0,repute:80,done:{},badges:new Set(),wrong:{},strategyDone:{normal:false,challenge:false}};
function r1(n){return Math.round(n*10)/10} function fare(d){return d<=baseD?baseP:baseP+Math.ceil(r1(d-baseD))*unit} function money(n){return Number.isInteger(n)?n:n.toFixed(1)} function current(){return jobs[state.idx]}
function logEvent(name,data={}){console.log('[调度埋点]',name,{...data,time:new Date().toISOString()})}
function start(){state.stage='tag';render()} function choose(i){state.idx=i;state.stage='tag';render()} function render(){renderMap();update(); if(state.stage==='home')home(); if(state.stage==='tag')tagStage(); if(state.stage==='segment')segmentStage(); if(state.stage==='blocks')blockStage(); if(state.stage==='quote')quoteStage(); if(state.stage==='garage')garage(); if(state.stage==='summary')summary()}
function renderMap(){map.innerHTML=jobs.map((j,i)=>`<button class="place ${i===state.idx?'active':''} ${state.done[j.id]?'done':''}" onclick="choose(${i})"><b>${j.emoji} ${j.place}</b><br><span class="muted">${j.passenger} · ${j.d} km · ${j.level}</span></button>`).join('')}
function update(){coins.textContent=state.coins;stars.textContent=state.stars;repute.textContent=state.repute;progress.textContent=Math.round(Object.keys(state.done).length/jobs.length*100)+'%'}
function head(title,pill){const j=current();return `<div class="stageHead"><div><h2>${title}</h2><p class="muted">${j.passenger} 的订单：${j.place}，全程 <b>${j.d} km</b>。</p></div><span class="pill">${pill}</span></div>`}
function route(j){const bp=Math.min(100,baseD/j.d*100);return `<div class="route"><div class="road"><div class="base" style="width:${bp}%"></div><div class="extra" style="width:${100-bp}%"></div></div><div class="ticks"><span>0 km</span><span>3 km 起步线</span><span>${j.d} km</span></div></div>`}
function home(){stage.innerHTML=`${head('欢迎来到调度中心','经营任务')}<div class="grid"><div class="card"><h3>玩法区别</h3><p class="muted">这一版更像经营调度：按城区接单、给路线贴标签、铺 1 km 计费格、选择策略报价，最后点亮车辆。</p><button class="btn" onclick="start()">接第一单</button></div><div class="card"><h3>车库</h3><div class="garage"><div class="car on">🚕</div><div class="car">🚙</div><div class="car">🚗</div><div class="car">🚖</div></div></div></div>`}
function tagStage(){const j=current();logEvent('order_start',{order_id:j.id,distance:j.d});stage.innerHTML=`${head('1. 路线贴标签','判断是否超出')}<div class="grid"><div class="card">${route(j)}<p>请先判断这单属于哪种计价路线。</p></div><div class="card"><div class="choices"><button class="choice" onclick="checkTag('base')">只收起步价</button><button class="choice" onclick="checkTag('extra')">需要加收超出费用</button></div><div id="fb" class="feedback hintbox">3 km 以内包括刚好 3 km；只有超过 3 km 才加收。</div></div></div>`}
function checkTag(v){const j=current(),ok=(j.d<=baseD&&v==='base')||(j.d>baseD&&v==='extra');logEvent('route_tag_submit',{order_id:j.id,student_choice:v}); if(ok){fb.className='feedback okbox';fb.textContent=j.d<=baseD?'判断正确：未超过 3 km，只需要起步价。':'判断正确：超过起步里程，进入路线分段。';state.stars++;setTimeout(()=>{state.stage=j.d<=baseD?'quote':'segment';render()},700)}else{mistake(j.d===3?'boundary_error':'not_check_exceed');fb.className='feedback badbox';fb.textContent='判断错了。请特别注意“以内”包括刚好 3 km。'}}
function segmentStage(){const j=current();stage.innerHTML=`${head('2. 路线分色调度','起步段 + 超出段')}<div class="grid"><div class="card">${route(j)}<p>蓝色是前 3 km 起步段，橙色才是实际超出段。</p></div><div class="card"><div class="slots"><div class="slot"><label>${j.d} - 3 = 实际超出路程</label><input id="actual" type="number" step="0.1"></div><button class="btn" onclick="checkActual()">确认分段</button><div id="fb" class="feedback hintbox">不是整条路都加价，只有超过 3 km 的部分加价。</div></div></div></div>`}
function checkActual(){const j=current(),v=parseFloat(actual.value);logEvent('route_split_submit',{order_id:j.id,actual_extra_distance:j.actual,student_extra_distance:v});if(Math.abs(v-j.actual)<.001){fb.className='feedback okbox';fb.textContent=`分段成功：实际超出 ${j.actual} km。`;state.stars++;setTimeout(()=>{state.stage='blocks';render()},650)}else{mistake('extra_distance_error');fb.className='feedback badbox';fb.textContent='请用总路程减 3 km，先分出起步段。'}}
function blockStage(){const j=current();stage.innerHTML=`${head('3. 铺计费格','不足 1 km 进一')}<div class="grid"><div class="card"><h3>1 km 计费格</h3><div class="blocks">${Array.from({length:Math.max(1,j.billing)},(_,i)=>`<span class="block">第 ${i+1} 格${i===j.billing-1&&j.actual%1?'（补满）':''}</span>`).join('')}</div><p class="muted">实际超出 ${j.actual} km，计费时按 ${j.billing} km。</p></div><div class="card"><div class="choices">${[j.actual,Math.floor(j.actual),j.billing,j.billing+1].filter((x,i,a)=>a.indexOf(x)===i).map(x=>`<button class="choice" onclick="checkBilling(${x})">按 ${x} km</button>`).join('')}</div><div id="fb" class="feedback hintbox">不足 1 km 的最后一段要补成 1 km 计费格。</div></div></div>`}
function checkBilling(v){const j=current();logEvent('billing_distance_submit',{order_id:j.id,billing_extra_distance:j.billing,student_billing_distance:v});if(Math.abs(v-j.billing)<.001){fb.className='feedback okbox';fb.textContent='计费格铺对了！接下来报价。';state.stars++;setTimeout(()=>{state.stage='quote';render()},650)}else{mistake(v===j.actual?'confuse_actual_and_billing':'forget_round_up');fb.className='feedback badbox';fb.textContent='这是实际行驶距离，不一定是计费距离。请执行“不足 1 km 按 1 km”。'}}
function quoteStage(){const j=current();stage.innerHTML=`${head('4. 调度报价台','乘加 / 挑战路线')}<div class="grid"><div class="card">${route(j)}<div class="meter"><div>计价仪</div><div class="money" id="meter">¥ --</div></div><p class="muted">普通路线：8 + 计费超出里程 × 2.5。挑战路线：计费总里程 × 2.5 + 起步段差额。</p></div><div class="card"><div class="slots"><div class="slot"><label>实际超出路程</label><input id="a" type="number" step="0.1" value="${j.d<=baseD?0:''}"></div><div class="slot"><label>计费超出里程</label><input id="b" type="number" step="1" value="${j.d<=baseD?0:''}"></div><div class="slot"><label>最终车费</label><input id="f" type="number" step="0.1"></div><div class="slot"><label>选择策略</label><select id="strategy"><option value="normal">普通乘加路线</option><option value="challenge">挑战调整路线</option></select></div><button class="btn" onclick="checkQuote()">提交报价</button><div id="fb" class="feedback hintbox">车费 = 起步价 + 计费超出里程 × 超出单价。</div></div></div></div>`}
function checkQuote(){const j=current();const vals=[parseFloat(a.value),parseFloat(b.value),parseFloat(f.value)];logEvent('answer_submit',{order_id:j.id,answer:vals[2],strategy_type:strategy.value});if(Math.abs(vals[0]-j.actual)<.001&&Math.abs(vals[1]-j.billing)<.001&&Math.abs(vals[2]-j.fee)<.001){meter.textContent='¥ '+money(j.fee);fb.className='feedback okbox';fb.textContent=`报价成功！${j.d<=3?'这单只收起步价 8 元。':`8 + ${j.billing} × 2.5 = ${money(j.fee)} 元。`}乘客满意，车辆点亮。`;state.strategyDone[strategy.value]=true;complete(j);setTimeout(()=>{state.idx=Math.min(state.idx+1,jobs.length-1);state.stage=Object.keys(state.done).length===jobs.length?'summary':'tag';render()},900)}else{const type=Math.abs(vals[0]-j.actual)>.001?'extra_distance_error':Math.abs(vals[1]-j.billing)>.001?'forget_round_up':'decimal_calculation_error';mistake(type);fb.className='feedback badbox';fb.textContent=`报价未通过：${wrongText(type)}。请保留答案并修正对应步骤。`}}
function complete(j){if(!state.done[j.id]){state.done[j.id]=true;state.coins+=25;state.stars++;state.repute=Math.min(100,state.repute+4);if(Object.keys(state.done).length>=3)state.badges.add('乘加调度员');if(state.strategyDone.challenge)state.badges.add('策略大师');if(state.repute>=92)state.badges.add('精准车队');logEvent('level_complete',{order_id:j.id})}update();renderMap()}
function mistake(t){state.repute=Math.max(0,state.repute-3);state.wrong[t]=(state.wrong[t]||0)+1;logEvent('answer_wrong',{order_id:current().id,wrong_type:t});update()}
function wrongText(t){return {not_check_exceed:'未判断是否超过起步里程',boundary_error:'把刚好 3 km 当成超出',extra_distance_error:'实际超出路程计算错误',forget_round_up:'没有按不足 1 km 进一计算',confuse_actual_and_billing:'混淆实际超出和计费超出里程',decimal_calculation_error:'小数乘法或加法计算错误'}[t]||t}
function garage(){stage.innerHTML=`${head('车库徽章','奖励成长')}<div class="grid"><div class="card"><h3>已点亮车辆</h3><div class="garage"><div class="car on">🚕</div><div class="car ${Object.keys(state.done).length>=2?'on':''}">🚙</div><div class="car ${Object.keys(state.done).length>=4?'on':''}">🚗</div><div class="car ${Object.keys(state.done).length>=6?'on':''}">🚖</div></div></div><div class="card"><h3>徽章</h3><div class="blocks">${[...state.badges].concat(state.badges.size?[]:['继续完成订单解锁']).map(x=>`<span class="block">🏅 ${x}</span>`).join('')}</div><button class="btn" style="margin-top:12px" onclick="state.stage='tag';render()">继续调度</button></div></div>`}
function summary(){const weak=Object.entries(state.wrong).sort((a,b)=>b[1]-a[1])[0];stage.innerHTML=`${head('学习总结','城市修复完成')}<div class="summary"><div class="card"><b>${Object.keys(state.done).length}/6</b><br>完成订单</div><div class="card"><b>${state.coins}</b><br>金币</div><div class="card"><b>${state.stars}</b><br>计价星</div><div class="card"><b>${state.repute}</b><br>信誉值</div></div><div class="grid" style="margin-top:14px"><div class="card"><h3>我学会了</h3><div class="blocks"><span class="block">先判断是否超过 3 km</span><span class="block">总路程 - 起步里程</span><span class="block">实际超出要进一</span><span class="block">起步价 + 超出费用</span></div></div><div class="card"><h3>薄弱点</h3><p class="muted">${weak?`建议继续练习：${wrongText(weak[0])}。`:'表现稳定，可以尝试挑战路线解释。'}</p><button class="btn" onclick="state.idx=0;state.stage='tag';render()">再来一轮</button></div></div>`;logEvent('game_complete',{weak_points:weak?.[0]})}
render();
</script>
</body>
</html>
