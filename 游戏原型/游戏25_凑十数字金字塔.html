<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凑十数字金字塔</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: linear-gradient(180deg, #87CEEB 0%, #FFF3E0 40%, #FFE0B2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
}
#app {
  width: 100%;
  max-width: 520px;
  padding: 12px;
}
/* Screens */
.screen { display: none; }
.screen.active { display: block; }

/* Title Screen */
#title-screen {
  text-align: center;
  padding: 30px 16px;
}
#title-screen .pyramid-icon {
  font-size: 72px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
#title-screen h1 {
  font-size: 32px;
  color: #5D4037;
  margin: 12px 0 6px;
  text-shadow: 2px 2px 0 #FFD700;
}
#title-screen .subtitle {
  color: #8D6E63;
  font-size: 15px;
  margin-bottom: 24px;
}
#title-screen .mascot {
  font-size: 48px;
  margin: 16px 0;
}
.btn {
  display: inline-block;
  padding: 12px 36px;
  border: none;
  border-radius: 28px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  outline: none;
}
.btn:active { transform: scale(0.95); }
.btn-primary {
  background: linear-gradient(135deg, #FF8F00, #FF6F00);
  color: #fff;
  box-shadow: 0 4px 12px rgba(255,111,0,0.4);
}
.btn-secondary {
  background: #FFF3E0;
  color: #5D4037;
  border: 2px solid #FFB300;
}
.btn-hint {
  background: #FFECB3;
  color: #5D4037;
  border: 2px solid #FFC107;
  font-size: 15px;
  padding: 8px 20px;
}

/* Game Screen */
#game-screen { padding: 8px; }
.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 8px;
}
.game-header .level-info {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: #5D4037;
  font-weight: bold;
}
.game-header .level-info span {
  background: #FFD700;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 13px;
}
.game-header .stats {
  display: flex;
  gap: 10px;
  font-size: 13px;
  color: #5D4037;
}
.game-header .stats div {
  background: #FFF3E0;
  padding: 4px 10px;
  border-radius: 10px;
  border: 1px solid #FFCC80;
}
.progress-wrap {
  width: 100%;
  height: 10px;
  background: #FFE0B2;
  border-radius: 5px;
  margin-bottom: 12px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #FFB300, #FF8F00);
  border-radius: 5px;
  transition: width 0.4s;
}
.pyramid-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  margin-bottom: 12px;
}
.pyramid-row {
  display: flex;
  justify-content: center;
  gap: 6px;
}
.brick {
  width: 62px;
  height: 62px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
  position: relative;
  transition: all 0.3s;
}
.brick.known {
  background: linear-gradient(135deg, #FFE082, #FFD54F);
  color: #5D4037;
  border: 3px solid #FFB300;
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.5), 0 3px 0 #E65100;
}
.brick.blank {
  background: #FFF8E1;
  color: #BCAAA4;
  border: 3px dashed #FFB300;
  cursor: pointer;
  animation: pulse 2s infinite;
}
.brick.blank:hover {
  background: #FFF3E0;
  border-style: solid;
  transform: scale(1.08);
}
.brick.blank.selected {
  border: 3px solid #FF6F00;
  background: #FFF3E0;
  color: #5D4037;
  box-shadow: 0 0 16px rgba(255,111,0,0.5);
  animation: none;
}
.brick.correct {
  background: linear-gradient(135deg, #FFD700, #FFC107);
  color: #5D4037;
  border: 3px solid #FF8F00;
  animation: goldGlow 0.6s ease-out;
  cursor: default;
  box-shadow: 0 0 20px rgba(255,215,0,0.6);
}
.brick.wrong {
  animation: shake 0.4s;
  border-color: #E53935;
}
@keyframes pulse {
  0%,100% { opacity: 0.8; }
  50% { opacity: 1; }
}
@keyframes goldGlow {
  0% { transform: scale(1.3); box-shadow: 0 0 30px rgba(255,215,0,0.9); }
  50% { transform: scale(0.95); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.hint-msg {
  text-align: center;
  color: #E65100;
  font-size: 14px;
  min-height: 22px;
  margin: 4px 0;
  font-weight: bold;
}

/* Number Pad */
.numpad {
  background: #FFF3E0;
  border-radius: 16px;
  padding: 10px;
  border: 2px solid #FFCC80;
  display: none;
}
.numpad.active { display: block; }
.numpad-display {
  background: #fff;
  border: 2px solid #FFB300;
  border-radius: 10px;
  padding: 8px 12px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  color: #5D4037;
  margin-bottom: 8px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.numpad-keys {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.numpad-keys button {
  padding: 10px 0;
  border: 2px solid #FFCC80;
  border-radius: 10px;
  background: #fff;
  font-size: 20px;
  font-weight: bold;
  color: #5D4037;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.numpad-keys button:active {
  background: #FFE082;
  transform: scale(0.92);
}
.numpad-keys .btn-del {
  background: #FFCDD2;
  border-color: #EF9A9A;
  font-size: 14px;
}
.numpad-keys .btn-confirm {
  background: #FFB300;
  border-color: #FF8F00;
  color: #fff;
  font-size: 14px;
}
.numpad-keys .btn-empty {
  visibility: hidden;
}

/* Bottom buttons */
.bottom-btns {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 10px;
  flex-wrap: wrap;
}
.bottom-btns button {
  flex: 1;
  min-width: 80px;
}

/* Practice Screen */
#practice-screen {
  text-align: center;
  padding: 16px;
}
#practice-screen .badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 16px;
  font-weight: bold;
  font-size: 14px;
  margin: 8px 0 16px;
}
.badge-tier-1 { background: #C8E6C9; color: #2E7D32; }
.badge-tier-2 { background: #BBDEFB; color: #1565C0; }
.badge-tier-3 { background: #F8BBD0; color: #AD1457; }
.badge-tier-4 { background: #FFE082; color: #E65100; }
.badge-tier-5 { background: #D1C4E9; color: #4527A0; }
.practice-question {
  font-size: 22px;
  color: #5D4037;
  font-weight: bold;
  margin: 20px 0;
}
.practice-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 300px;
  margin: 0 auto 16px;
}
.practice-options button {
  padding: 10px 16px;
  border: 2px solid #FFCC80;
  border-radius: 12px;
  background: #fff;
  font-size: 17px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  color: #5D4037;
}
.practice-options button:hover { background: #FFF3E0; }
.practice-options button.correct-pick { background: #A5D6A7; border-color: #4CAF50; }
.practice-options button.wrong-pick { background: #EF9A9A; border-color: #E53935; }
.practice-input-wrap {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 12px 0;
}
.practice-input-wrap input {
  width: 100px;
  padding: 10px;
  border: 2px solid #FFB300;
  border-radius: 10px;
  font-size: 20px;
  text-align: center;
  font-family: inherit;
  color: #5D4037;
}
.practice-feedback {
  font-size: 15px;
  min-height: 24px;
  margin: 8px 0;
  font-weight: bold;
}
.practice-feedback.good { color: #2E7D32; }
.practice-feedback.bad { color: #E53935; }
.practice-score {
  font-size: 14px;
  color: #8D6E63;
  margin: 8px 0;
}

/* Victory Screen */
#victory-screen {
  text-align: center;
  padding: 20px;
}
#victory-screen .trophy {
  font-size: 64px;
  animation: float 2s ease-in-out infinite;
}
#victory-screen h2 {
  font-size: 28px;
  color: #5D4037;
  margin: 12px 0;
}
#victory-screen .final-score {
  font-size: 36px;
  color: #FF6F00;
  font-weight: bold;
}
#victory-screen .stars {
  font-size: 40px;
  margin: 8px 0;
}
#victory-screen table {
  width: 100%;
  max-width: 350px;
  margin: 16px auto;
  border-collapse: collapse;
}
#victory-screen td, #victory-screen th {
  padding: 6px 10px;
  border-bottom: 1px solid #FFCC80;
  text-align: center;
  font-size: 14px;
}
.victory-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 16px;
  flex-wrap: wrap;
}

/* Sand dunes at bottom */
.sand-decoration {
  text-align: center;
  font-size: 28px;
  margin-top: 8px;
  opacity: 0.6;
}
</style>
</head>
<body>
<div id="app">

<!-- Title Screen -->
<div id="title-screen" class="screen active">
  <div class="pyramid-icon">🔺</div>
  <h1>凑十数字金字塔</h1>
  <div class="subtitle">用凑十法，揭开金字塔的数字秘密！</div>
  <div class="mascot">🏺</div>
  <button class="btn btn-primary" onclick="startGame()">开始探险</button>
  <div class="sand-decoration">🏜️ 🐪 🏜️</div>
</div>

<!-- Game Screen -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="level-info">
      第<span id="level-num">1</span>关
      <span id="level-label">基础巩固 🌱</span>
    </div>
    <div class="stats">
      <div class="mascot-small">🏺</div>
      <div>提示: <b id="hints-left">3</b></div>
      <div>分数: <b id="score-display">0</b></div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
  <div style="text-align:center;font-size:13px;color:#8D6E63;margin-bottom:6px;">
    修复进度 <b id="progress-text">0</b>/<span id="progress-total">6</span> 块
  </div>
  <div class="pyramid-container" id="pyramid"></div>
  <div class="hint-msg" id="hint-msg"></div>
  <div class="numpad" id="numpad">
    <div class="numpad-display" id="numpad-display">?</div>
    <div class="numpad-keys">
      <button onclick="numpadInput('1')">1</button>
      <button onclick="numpadInput('2')">2</button>
      <button onclick="numpadInput('3')">3</button>
      <button onclick="numpadInput('4')">4</button>
      <button onclick="numpadInput('5')">5</button>
      <button onclick="numpadInput('6')">6</button>
      <button onclick="numpadInput('7')">7</button>
      <button onclick="numpadInput('8')">8</button>
      <button onclick="numpadInput('9')">9</button>
      <button class="btn-empty"></button>
      <button onclick="numpadInput('0')">0</button>
      <button class="btn-del" onclick="numpadDelete()">⌫</button>
    </div>
    <div style="margin-top:8px;display:flex;gap:8px;">
      <button class="btn btn-primary" style="flex:1;font-size:15px;padding:8px;" onclick="numpadConfirm()">确认 ✓</button>
    </div>
  </div>
  <div class="bottom-btns">
    <button class="btn btn-hint" onclick="useHint()">💡 提示 (<span id="hint-count">3</span>)</button>
    <button class="btn btn-secondary" onclick="restartLevel()">🔄 重新开始</button>
  </div>
</div>

<!-- Practice Screen -->
<div id="practice-screen" class="screen">
  <div style="font-size:32px;" id="practice-icon">🌱</div>
  <h2 style="color:#5D4037;margin:6px 0;" id="practice-title">基础巩固</h2>
  <div class="badge" id="practice-badge">第1关练习</div>
  <div id="practice-content"></div>
  <div class="practice-feedback" id="practice-feedback"></div>
  <div class="practice-score" id="practice-score-display">练习得分: 0</div>
  <button class="btn btn-primary" id="practice-next-btn" onclick="nextPractice()">下一题</button>
  <button class="btn btn-secondary" style="display:none;" id="practice-done-btn" onclick="finishPractice()">进入下一关</button>
</div>

<!-- Victory Screen -->
<div id="victory-screen" class="screen">
  <div class="trophy">🏆</div>
  <h2>探险完成！</h2>
  <div class="stars" id="victory-stars">⭐⭐⭐</div>
  <div class="final-score" id="final-score">总分: 0</div>
  <table id="victory-table">
    <tr><th>关卡</th><th>正确/尝试</th><th>分数</th></tr>
  </table>
  <div class="mascot" style="font-size:36px;">🔍</div>
  <div class="victory-btns">
    <button class="btn btn-primary" onclick="restartGame()">再玩一次</button>
  </div>
</div>

</div>

<script>
// ============ Data ============
const practiceProblems = {
  1: [
    { type: 'choice', q: '9 + 4 = ?', options: ['12', '13', '14', '15'], answer: 1, hint: '用凑十法：从4里拿1给9，9+1=10，10+3=13' },
    { type: 'choice', q: '8 + 3 = ?', options: ['10', '11', '12', '13'], answer: 1, hint: '8还差2凑10，从3里拿2，10+1=11' },
    { type: 'choice', q: '9 + 6 = ?', options: ['14', '15', '16', '17'], answer: 1, hint: '9+1=10，10+5=15' },
    { type: 'choice', q: '7 + 4 = ?', options: ['10', '11', '12', '13'], answer: 1, hint: '7+3=10，10+1=11' },
  ],
  2: [
    { type: 'choice', q: '8 + 5 = ?', options: ['12', '13', '14', '15'], answer: 1, hint: '8+2=10，10+3=13' },
    { type: 'choice', q: '7 + 6 = ?', options: ['12', '13', '14', '15'], answer: 1, hint: '7+3=10，10+3=13' },
    { type: 'fill', q: '9 + 7 = ?', answer: '16', hint: '9+1=10，10+6=16' },
    { type: 'choice', q: '6 + 5 用凑十法，从5里拿几？', options: ['3', '4', '5', '2'], answer: 1, hint: '6还差4凑10，所以要拿4' },
  ],
  3: [
    { type: 'choice', q: '9 + 8 = ?', options: ['16', '17', '18', '19'], answer: 1, hint: '9+1=10，10+7=17' },
    { type: 'fill', q: '8 + 7 = ?', answer: '15', hint: '8+2=10，10+5=15' },
    { type: 'choice', q: '7 + 8 = ? 和 8 + 7 的答案一样吗？', options: ['一样，都是15', '不一样'], answer: 0, hint: '加法交换律' },
    { type: 'choice', q: '6 + 8 = ?', options: ['13', '14', '15', '16'], answer: 1, hint: '8+2=10，10+4=14' },
  ],
  4: [
    { type: 'choice', q: '38 + 7 = ?', options: ['43', '44', '45', '46'], answer: 2, hint: '38+2=40，7拆成2+5，40+5=45' },
    { type: 'fill', q: '47 + 6 = ?', answer: '53', hint: '47+3=50，6拆成3+3，50+3=53' },
    { type: 'choice', q: '小明有8块糖，又买了5块。一共有几块？', options: ['12', '13', '14', '15'], answer: 1, hint: '8+2=10，5拆成2+3，10+3=13' },
    { type: 'choice', q: '29 + 8 = ?', options: ['36', '37', '38', '39'], answer: 1, hint: '29+1=30，8拆成1+7，30+7=37' },
  ],
  5: [
    { type: 'fill', q: '想一想：9+5=14，那19+5=？', answer: '24', hint: '19+1=20，20+4=24' },
    { type: 'choice', q: '下面哪组不是凑十好朋友？', options: ['9和1', '8和2', '7和4', '6和4'], answer: 2, hint: '7的好朋友是3' },
    { type: 'choice', q: '小猫钓了9条鱼，小狗比小猫多5条。小狗钓了几条？', options: ['13', '14', '15', '16'], answer: 1, hint: '9+5=14' },
    { type: 'fill', q: '8+6除了用凑十法，还有其他方法吗？写出答案。', answer: '14', hint: '多种方法都能得到14' },
  ],
};

const difficultyLabels = {
  1: { name: '基础巩固', icon: '🌱', badgeClass: 'badge-tier-1' },
  2: { name: '查漏补缺', icon: '🔍', badgeClass: 'badge-tier-2' },
  3: { name: '能力提升', icon: '📈', badgeClass: 'badge-tier-3' },
  4: { name: '思维拓展', icon: '🚀', badgeClass: 'badge-tier-4' },
  5: { name: '挑战冲刺', icon: '🏆', badgeClass: 'badge-tier-5' },
};

// Pyramid data: full solution values and which positions are known
// Each level: { rows: [[{val,known}...]], layers }
const levelData = [
  // Level 1: 3 layers, 6 bricks, 3 blanks (simple pyramid intro)
  {
    layers: 3,
    rows: [
      [{val:13, known:true}],
      [{val:8, known:false}, {val:5, known:false}],
      [{val:5, known:true}, {val:3, known:true}, {val:2, known:false}]
    ]
  },
  // Level 2: 3 layers, 6 bricks, 3 blanks (reverse thinking introduced)
  {
    layers: 3,
    rows: [
      [{val:12, known:true}],
      [{val:7, known:false}, {val:5, known:true}],
      [{val:4, known:true}, {val:3, known:false}, {val:2, known:false}]
    ]
  },
  // Level 3: 4 layers, 10 bricks, 6 blanks
  {
    layers: 4,
    rows: [
      [{val:30, known:false}],
      [{val:17, known:false}, {val:13, known:false}],
      [{val:10, known:false}, {val:7, known:true}, {val:6, known:false}],
      [{val:6, known:true}, {val:4, known:false}, {val:3, known:true}, {val:3, known:true}]
    ]
  },
  // Level 4: 4 layers, 10 bricks, 6 blanks (larger numbers, 2-digit)
  {
    layers: 4,
    rows: [
      [{val:35, known:false}],
      [{val:20, known:false}, {val:15, known:false}],
      [{val:12, known:false}, {val:8, known:true}, {val:7, known:false}],
      [{val:7, known:true}, {val:5, known:false}, {val:3, known:true}, {val:4, known:true}]
    ]
  },
  // Level 5: 5 layers, 15 bricks, 10 blanks (challenge)
  {
    layers: 5,
    rows: [
      [{val:50, known:true}],
      [{val:28, known:false}, {val:22, known:false}],
      [{val:16, known:false}, {val:12, known:true}, {val:10, known:false}],
      [{val:9, known:false}, {val:7, known:false}, {val:5, known:false}, {val:5, known:false}],
      [{val:5, known:true}, {val:4, known:false}, {val:3, known:true}, {val:2, known:true}, {val:3, known:false}]
    ]
  }
];

// ============ State ============
const state = {
  currentLevel: 0,
  hintsLeft: 3,
  score: 0,
  levelScore: 0,
  levelCorrect: 0,
  levelAttempts: 0,
  filledBricks: 0,
  totalBlanks: 0,
  totalBricks: 0,
  selectedBrick: null, // {row, col}
  numpadValue: '',
  levelHistory: [], // [{level, correct, attempts, score}]
  wrongAttempts: {}, // brick key -> count
  hintUsed: {}, // brick key -> bool
  practiceIndex: 0,
  practiceScore: 0,
};

// ============ Screens ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============ Game ============
function startGame() {
  state.currentLevel = 0;
  state.score = 0;
  state.levelHistory = [];
  loadLevel(0);
  showScreen('game-screen');
}

function restartGame() {
  startGame();
}

function restartLevel() {
  loadLevel(state.currentLevel);
}

function loadLevel(idx) {
  state.currentLevel = idx;
  state.hintsLeft = 3;
  state.levelScore = 0;
  state.levelCorrect = 0;
  state.levelAttempts = 0;
  state.selectedBrick = null;
  state.numpadValue = '';
  state.wrongAttempts = {};
  state.hintUsed = {};

  const data = levelData[idx];
  const label = difficultyLabels[idx + 1];

  // Count blanks
  let blanks = 0;
  let total = 0;
  for (const row of data.rows) {
    for (const brick of row) {
      total++;
      if (!brick.known) blanks++;
    }
  }
  state.filledBricks = 0;
  state.totalBlanks = blanks;
  state.totalBricks = total;

  // Update UI
  document.getElementById('level-num').textContent = idx + 1;
  document.getElementById('level-label').textContent = label.name + ' ' + label.icon;
  document.getElementById('hints-left').textContent = state.hintsLeft;
  document.getElementById('hint-count').textContent = state.hintsLeft;
  document.getElementById('score-display').textContent = state.score;
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('progress-text').textContent = '0';
  document.getElementById('progress-total').textContent = blanks;
  document.getElementById('hint-msg').textContent = '';
  document.getElementById('numpad').classList.remove('active');
  document.getElementById('numpad-display').textContent = '?';

  renderPyramid(data);
  showScreen('game-screen');
}

function renderPyramid(data) {
  const container = document.getElementById('pyramid');
  container.innerHTML = '';

  for (let r = 0; r < data.rows.length; r++) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'pyramid-row';

    for (let c = 0; c < data.rows[r].length; c++) {
      const brick = data.rows[r][c];
      const div = document.createElement('div');
      div.className = 'brick';
      div.dataset.row = r;
      div.dataset.col = c;

      if (brick.known) {
        div.className += ' known';
        div.textContent = brick.val;
      } else {
        div.className += ' blank';
        div.textContent = '?';
        div.addEventListener('click', () => selectBrick(r, c, data));
      }
      rowDiv.appendChild(div);
    }
    container.appendChild(rowDiv);
  }
}

function selectBrick(row, col, data) {
  // Deselect all
  document.querySelectorAll('.brick.blank.selected').forEach(b => b.classList.remove('selected'));
  state.selectedBrick = { row, col };
  state.numpadValue = '';

  const bricks = document.querySelectorAll('.brick');
  for (const b of bricks) {
    if (b.dataset.row == row && b.dataset.col == col) {
      b.classList.add('selected');
    }
  }

  document.getElementById('numpad').classList.add('active');
  document.getElementById('numpad-display').textContent = '?';
  document.getElementById('hint-msg').textContent = '';
}

function numpadInput(digit) {
  if (!state.selectedBrick) return;
  if (state.numpadValue.length >= 3) return;
  state.numpadValue += digit;
  document.getElementById('numpad-display').textContent = state.numpadValue || '?';
}

function numpadDelete() {
  state.numpadValue = state.numpadValue.slice(0, -1);
  document.getElementById('numpad-display').textContent = state.numpadValue || '?';
}

function numpadConfirm() {
  if (!state.selectedBrick || !state.numpadValue) return;

  const data = levelData[state.currentLevel];
  const { row, col } = state.selectedBrick;
  const answer = parseInt(state.numpadValue);
  const expected = data.rows[row][col].val;
  const brickKey = row + ',' + col;

  state.levelAttempts++;

  if (answer === expected) {
    // Correct!
    const bricks = document.querySelectorAll('.brick');
    for (const b of bricks) {
      if (b.dataset.row == row && b.dataset.col == col) {
        b.classList.remove('blank', 'selected');
        b.classList.add('correct');
        b.textContent = answer;
        b.style.cursor = 'default';
        // Clone and replace to restart animation
        const clone = b.cloneNode(true);
        b.parentNode.replaceChild(clone, b);
      }
    }

    // Update data model
    data.rows[row][col].known = true;
    state.filledBricks++;

    // Score
    const wrongCount = state.wrongAttempts[brickKey] || 0;
    const hintUsed = state.hintUsed[brickKey] || false;
    let points = 20;
    if (hintUsed) points = 10;
    else if (wrongCount > 0) points = 5;
    state.levelScore += points;
    state.score += points;
    state.levelCorrect++;

    document.getElementById('score-display').textContent = state.score;
    document.getElementById('hint-msg').textContent = '太棒了！✓';
    document.getElementById('hint-msg').style.color = '#2E7D32';

    // Update progress
    const pct = Math.round((state.filledBricks / state.totalBlanks) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-text').textContent = state.filledBricks;

    // Reset selection
    state.selectedBrick = null;
    state.numpadValue = '';
    document.getElementById('numpad').classList.remove('active');
    document.getElementById('numpad-display').textContent = '?';

    // Check if level complete
    if (state.filledBricks >= state.totalBlanks) {
      setTimeout(() => levelComplete(), 800);
    } else {
      // Clear hint after 2s
      setTimeout(() => {
        if (document.getElementById('hint-msg').textContent === '太棒了！✓') {
          document.getElementById('hint-msg').textContent = '';
        }
      }, 2000);
    }
  } else {
    // Wrong
    state.wrongAttempts[brickKey] = (state.wrongAttempts[brickKey] || 0) + 1;

    const bricks = document.querySelectorAll('.brick');
    for (const b of bricks) {
      if (b.dataset.row == row && b.dataset.col == col) {
        b.classList.add('wrong');
        setTimeout(() => b.classList.remove('wrong'), 400);
      }
    }

    // Generate hint
    const hint = generateHint(row, col, data);
    document.getElementById('hint-msg').textContent = '再想想！' + hint;
    document.getElementById('hint-msg').style.color = '#E65100';
  }
}

function generateHint(row, col, data) {
  // Try to show the relationship
  if (row < data.rows.length - 1) {
    const belowLeft = data.rows[row + 1][col];
    const belowRight = data.rows[row + 1][col + 1];
    if (belowLeft.known && belowRight.known) {
      return '用凑十法：' + belowLeft.val + '+' + belowRight.val + '=?';
    }
  }
  // Try reverse relationship
  if (row > 0) {
    // Check if upper brick is known
    const upperRow = data.rows[row - 1];
    let upperIdx = -1;
    // Find which upper brick this is below of
    for (let i = 0; i < upperRow.length; i++) {
      if (i === col || i === col - 1) {
        if (upperRow[i].known) {
          upperIdx = i;
          break;
        }
      }
    }
    if (upperIdx >= 0) {
      const upperVal = upperRow[upperIdx].val;
      if (upperIdx === col) {
        // This is left-below, need to check right-below
        const rightBelow = data.rows[row][col + 1];
        if (rightBelow && rightBelow.known) {
          return upperVal + '-' + rightBelow.val + '=?';
        }
      } else if (upperIdx === col - 1) {
        // This is right-below
        const leftBelow = data.rows[row][col - 1];
        if (leftBelow && leftBelow.known) {
          return upperVal + '-' + leftBelow.val + '=?';
        }
      }
    }
  }
  return '看看周围已填好的数字';
}

function findSolvableBrick(data) {
  for (let r = 0; r < data.rows.length; r++) {
    for (let c = 0; c < data.rows[r].length; c++) {
      if (data.rows[r][c].known) continue;

      // Check if both below are known (solve going up)
      if (r < data.rows.length - 1) {
        const bl = data.rows[r + 1][c];
        const br = data.rows[r + 1][c + 1];
        if (bl && br && bl.known && br.known) {
          return { row: r, col: c, type: 'up', left: bl.val, right: br.val };
        }
      }

      // Check if above and one below are known (reverse)
      if (r > 0) {
        for (let uc = c - 1; uc <= c; uc++) {
          if (uc < 0 || uc >= data.rows[r - 1].length) continue;
          if (!data.rows[r - 1][uc].known) continue;
          const upperVal = data.rows[r - 1][uc].val;
          if (uc === c) {
            // This is left-below of upper[uc]
            const rightBelow = data.rows[r][c + 1];
            if (rightBelow && rightBelow.known) {
              return { row: r, col: c, type: 'reverse', upper: upperVal, known: rightBelow.val, side: 'left' };
            }
          } else {
            // This is right-below of upper[uc]
            const leftBelow = data.rows[r][c - 1];
            if (leftBelow && leftBelow.known) {
              return { row: r, col: c, type: 'reverse', upper: upperVal, known: leftBelow.val, side: 'right' };
            }
          }
        }
      }
    }
  }
  return null;
}

function useHint() {
  if (state.hintsLeft <= 0) {
    document.getElementById('hint-msg').textContent = '提示次数已用完！';
    document.getElementById('hint-msg').style.color = '#E53935';
    return;
  }

  const data = levelData[state.currentLevel];
  const solvable = findSolvableBrick(data);

  if (!solvable) {
    document.getElementById('hint-msg').textContent = '先填其他格子，或检查已填的数字~';
    document.getElementById('hint-msg').style.color = '#8D6E63';
    return;
  }

  state.hintsLeft--;
  document.getElementById('hints-left').textContent = state.hintsLeft;
  document.getElementById('hint-count').textContent = state.hintsLeft;

  const brickKey = solvable.row + ',' + solvable.col;
  state.hintUsed[brickKey] = true;

  let hintText = '';
  if (solvable.type === 'up') {
    hintText = solvable.left + ' + ' + solvable.right + ' = ? 用凑十法试试看！';
  } else {
    if (solvable.side === 'left') {
      hintText = solvable.upper + ' - ' + solvable.known + ' = ?';
    } else {
      hintText = solvable.upper + ' - ' + solvable.known + ' = ?';
    }
  }

  document.getElementById('hint-msg').textContent = '提示：' + hintText;
  document.getElementById('hint-msg').style.color = '#1565C0';

  // Highlight the brick
  selectBrick(solvable.row, solvable.col, data);
}

function levelComplete() {
  const level = state.currentLevel;
  state.levelHistory.push({
    level: level + 1,
    correct: state.levelCorrect,
    attempts: state.levelAttempts,
    score: state.levelScore,
  });

  // Bonus
  const bonus = 50;
  state.score += bonus;
  state.levelScore += bonus;
  document.getElementById('score-display').textContent = state.score;

  document.getElementById('hint-msg').textContent = '关卡完成！+50 奖励分 🎉';
  document.getElementById('hint-msg').style.color = '#FF6F00';

  if (level >= levelData.length - 1) {
    // All levels done
    setTimeout(() => showVictory(), 1500);
  } else {
    // Go to practice
    setTimeout(() => startPractice(), 1500);
  }
}

// ============ Practice ============
function startPractice() {
  state.practiceIndex = 0;
  state.practiceScore = 0;
  showPracticeQuestion();
  showScreen('practice-screen');
  document.getElementById('practice-next-btn').style.display = 'block';
  document.getElementById('practice-done-btn').style.display = 'none';
}

function showPracticeQuestion() {
  const tier = state.currentLevel + 1;
  const label = difficultyLabels[tier];
  const problems = practiceProblems[tier];
  const problem = problems[state.practiceIndex];

  document.getElementById('practice-icon').textContent = label.icon;
  document.getElementById('practice-title').textContent = label.name;
  const badge = document.getElementById('practice-badge');
  badge.textContent = '第' + tier + '关练习 (' + (state.practiceIndex + 1) + '/' + problems.length + ')';
  badge.className = 'badge ' + label.badgeClass;

  const content = document.getElementById('practice-content');
  const feedback = document.getElementById('practice-feedback');
  feedback.textContent = '';

  if (problem.type === 'choice') {
    content.innerHTML = `
      <div class="practice-question">${problem.q}</div>
      <div class="practice-options" id="practice-options"></div>
    `;
    const optsDiv = document.getElementById('practice-options');
    problem.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.textContent = opt;
      btn.addEventListener('click', () => answerChoice(i, problem, optsDiv));
      optsDiv.appendChild(btn);
    });
  } else if (problem.type === 'fill') {
    content.innerHTML = `
      <div class="practice-question">${problem.q}</div>
      <div class="practice-input-wrap">
        <input type="number" id="practice-fill-input" placeholder="输入答案">
      </div>
    `;
    document.getElementById('practice-next-btn').style.display = 'none';
    document.getElementById('practice-done-btn').style.display = 'none';
    const input = document.getElementById('practice-fill-input');
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') answerFill(problem);
    });
    input.focus();
  }

  document.getElementById('practice-score-display').textContent = '练习得分: ' + state.practiceScore;
}

function answerChoice(idx, problem, optsDiv) {
  const buttons = optsDiv.querySelectorAll('button');
  const feedback = document.getElementById('practice-feedback');

  buttons.forEach(b => b.disabled = true);
  buttons[idx].classList.add(idx === problem.answer ? 'correct-pick' : 'wrong-pick');

  if (idx === problem.answer) {
    state.practiceScore += 10;
    feedback.textContent = '正确！✓ ' + problem.hint;
    feedback.className = 'practice-feedback good';
  } else {
    feedback.textContent = '不对哦~ ' + problem.hint;
    feedback.className = 'practice-feedback bad';
  }

  document.getElementById('practice-score-display').textContent = '练习得分: ' + state.practiceScore;
  document.getElementById('practice-next-btn').style.display = 'block';
}

function answerFill(problem) {
  const input = document.getElementById('practice-fill-input');
  const feedback = document.getElementById('practice-feedback');
  const userAnswer = input.value.trim();

  if (!userAnswer) return;

  if (userAnswer === problem.answer) {
    state.practiceScore += 10;
    feedback.textContent = '正确！✓ ' + problem.hint;
    feedback.className = 'practice-feedback good';
  } else {
    feedback.textContent = '答案是 ' + problem.answer + '。' + problem.hint;
    feedback.className = 'practice-feedback bad';
  }

  input.disabled = true;
  document.getElementById('practice-score-display').textContent = '练习得分: ' + state.practiceScore;
  document.getElementById('practice-next-btn').style.display = 'block';
}

function nextPractice() {
  const tier = state.currentLevel + 1;
  const problems = practiceProblems[tier];
  state.practiceIndex++;

  if (state.practiceIndex >= problems.length) {
    // All practice done
    document.getElementById('practice-next-btn').style.display = 'none';
    document.getElementById('practice-done-btn').style.display = 'block';
    const feedback = document.getElementById('practice-feedback');
    feedback.textContent = '练习完成！准备挑战下一关吧！';
    feedback.className = 'practice-feedback good';
  } else {
    showPracticeQuestion();
  }
}

function finishPractice() {
  state.currentLevel++;
  state.score += state.practiceScore;
  document.getElementById('score-display').textContent = state.score;
  loadLevel(state.currentLevel);
}

// ============ Victory ============
function showVictory() {
  const totalScore = state.score;
  const totalCorrect = state.levelHistory.reduce((sum, h) => sum + h.correct, 0);
  const totalAttempts = state.levelHistory.reduce((sum, h) => sum + h.attempts, 0);
  const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 100;

  // Stars based on score
  let stars = '';
  if (totalScore >= 500) stars = '⭐⭐⭐';
  else if (totalScore >= 300) stars = '⭐⭐';
  else stars = '⭐';

  document.getElementById('victory-stars').textContent = stars;
  document.getElementById('final-score').textContent = '总分: ' + totalScore;

  const table = document.getElementById('victory-table');
  table.innerHTML = '<tr><th>关卡</th><th>正确/尝试</th><th>分数</th></tr>';
  state.levelHistory.forEach(h => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>第${h.level}关</td><td>${h.correct}/${h.attempts}</td><td>+${h.score}</td>`;
    table.appendChild(tr);
  });
  const tr = document.createElement('tr');
  tr.innerHTML = `<td style="font-weight:bold;">总计</td><td style="font-weight:bold;">${totalCorrect}/${totalAttempts} (${accuracy}%)</td><td style="font-weight:bold;color:#FF6F00;">${totalScore}</td>`;
  table.appendChild(tr);

  showScreen('victory-screen');
}

// ============ Init ============
showScreen('title-screen');
</script>
