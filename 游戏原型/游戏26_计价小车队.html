<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>计价小车队：出租车分段计费挑战</title>
<style>
:root{--blue:#2f80ed;--orange:#ff8a3d;--purple:#7c3aed;--gold:#f7b731;--red:#ef4444;--green:#18a058;--ink:#243042;--muted:#667085;--bg:#edf6ff;--card:#fff;--line:#d7e3f4;--shadow:0 18px 45px rgba(31,65,114,.16);--r:22px;font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:radial-gradient(circle at 12% 0,#fff7c7 0 15%,transparent 36%),linear-gradient(135deg,#dff3ff,#f5edff 58%,#fff7df);min-height:100vh}button,input,select{font:inherit}button{border:0;cursor:pointer}.app{max-width:1180px;margin:0 auto;padding:18px}.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;align-items:stretch}.panel{background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.75);border-radius:var(--r);box-shadow:var(--shadow)}.title{padding:24px;position:relative;overflow:hidden}.title:after{content:"🚕";position:absolute;right:28px;bottom:2px;font-size:96px;opacity:.14}.eyebrow{display:inline-flex;gap:8px;align-items:center;background:#eaf2ff;color:#1c55a6;border-radius:999px;padding:7px 13px;font-weight:800;font-size:13px}.title h1{font-size:42px;line-height:1.05;margin:16px 0 8px}.title p{color:var(--muted);font-size:16px;line-height:1.8;margin:0;max-width:720px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.btn{border-radius:15px;padding:12px 18px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--blue),#54b4ff);box-shadow:0 10px 22px rgba(47,128,237,.25)}.btn.alt{background:linear-gradient(135deg,var(--purple),#b86bff)}.btn.ghost{color:#246;box-shadow:none;background:#edf5ff;border:1px solid #cfe0f7}.btn.warn{background:linear-gradient(135deg,#ff7a3d,#ffb23d)}.btn:disabled{opacity:.45;cursor:not-allowed}.meter{padding:18px;display:grid;gap:12px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{background:#f8fbff;border:1px solid var(--line);border-radius:18px;padding:14px;text-align:center}.stat b{display:block;font-size:24px;color:#1456ad}.rule{background:#112b4b;color:#fff;border-radius:18px;padding:16px;line-height:1.75}.rule mark{background:#ffe38a;border-radius:6px;padding:1px 5px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tab{background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 13px;color:#40607e;font-weight:800}.tab.active{background:#1f6feb;color:#fff;border-color:#1f6feb}.game{display:grid;grid-template-columns:330px 1fr;gap:18px}.sidebar{padding:16px;align-self:start;position:sticky;top:12px}.orders{display:grid;gap:10px}.order{padding:13px;border-radius:16px;border:2px solid #e0e9f7;background:#fbfdff;text-align:left}.order.active{border-color:var(--blue);background:#edf6ff}.order.done{border-color:#9ee1bc;background:#f0fff6}.order small{color:var(--muted)}.workspace{padding:18px;min-height:650px}.level-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:14px}.level-head h2{margin:0;font-size:25px}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:#fff3d0;color:#7a4b00;font-weight:900;padding:8px 12px}.task-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px}.card h3{margin:0 0 10px}.number{color:#0d63d8;font-weight:900}.choice-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.choice{border:2px solid var(--line);background:#fbfdff;border-radius:16px;padding:13px;font-weight:900;color:#28435c}.choice.selected{border-color:var(--purple);background:#f2eaff}.choice.correct{border-color:var(--green);background:#ecfff4}.choice.wrong{border-color:var(--red);background:#fff0f0}.route{margin:18px 0}.road{height:34px;background:#e7edf5;border-radius:999px;position:relative;overflow:hidden;border:1px solid #cfd9e8}.seg-base{height:100%;background:linear-gradient(90deg,#56b5ff,var(--blue));position:absolute;left:0;top:0}.seg-extra{height:100%;background:linear-gradient(90deg,#ffb35c,var(--orange));position:absolute;top:0}.taxi{position:absolute;top:-21px;transform:translateX(-50%);font-size:30px;animation:drive 2.3s ease-in-out infinite alternate}@keyframes drive{to{left:92%}}.ticks{display:flex;justify-content:space-between;color:#667085;font-size:12px;margin-top:7px}.inputs{display:grid;gap:12px}.step{display:grid;grid-template-columns:1fr 128px;gap:10px;align-items:center;background:#f8fbff;border:1px solid var(--line);border-radius:16px;padding:11px}.step input,.step select{width:100%;border:2px solid #dce7f5;border-radius:12px;padding:10px;background:#fff}.feedback{margin-top:14px;border-radius:18px;padding:14px;line-height:1.75;display:none}.feedback.show{display:block}.feedback.ok{background:#eafff1;border:1px solid #9ce2b8;color:#0f6933}.feedback.bad{background:#fff0f0;border:1px solid #ffc1c1;color:#9d1c1c}.feedback.hint{background:#fff9df;border:1px solid #ffe08a;color:#785200}.fee-box{background:#0f2138;color:#d9f2ff;border-radius:20px;padding:18px;text-align:center}.fee-box .screen{font-size:38px;font-weight:900;color:#ffe66e;letter-spacing:1px}.blocks{display:flex;flex-wrap:wrap;gap:8px}.block{background:#eef5ff;border:1px solid #cdddf2;border-radius:12px;padding:9px 11px;font-weight:900}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.badge{border-radius:16px;padding:13px;background:#fff8db;border:1px solid #f7d56c;font-weight:900}.city{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.building{border-radius:18px;padding:18px;background:#eef2f7;text-align:center;border:1px solid #d9e2ef}.building.lit{background:linear-gradient(135deg,#fff0a8,#fff);box-shadow:0 0 0 3px rgba(247,183,49,.25)}.repair-formula{font-size:24px;font-weight:900;background:#222;color:#a6ffbd;border-radius:16px;padding:18px;text-align:center}.wrong-token{display:inline-block;border:2px solid #ff6b6b;border-radius:10px;padding:2px 8px;background:#451a1a;color:#fff}.hidden{display:none!important}@media(max-width:900px){.hero,.game,.task-grid{grid-template-columns:1fr}.sidebar{position:static}.title h1{font-size:32px}.summary{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <section class="hero">
    <div class="panel title">
      <span class="eyebrow">五年级上册 · 小数乘加乘减 · 分段计费</span>
      <h1>计价小车队</h1>
      <p>扮演“城市小小计价官”，按 <b>3 km 以内 8 元</b>、超过部分 <b>2.5 元/km</b>、不足 1 km 按 1 km 的出租车规则，完成接单、分段、进一、列式、维修和总结。</p>
      <div class="actions"><button class="btn" onclick="startGame()">开始游戏</button><button class="btn alt" onclick="showRules()">学习规则</button><button class="btn ghost" onclick="showSummary()">我的徽章</button></div>
    </div>
    <div class="panel meter">
      <div class="stats"><div class="stat"><b id="coins">0</b>金币</div><div class="stat"><b id="stars">0</b>计价星</div><div class="stat"><b id="credit">80</b>信誉值</div><div class="stat"><b id="doneCount">0/6</b>订单</div></div>
      <div class="rule">默认规则：<br><mark>3 km 以内</mark>收费 <mark>8 元</mark>；超过 3 km 的部分，每千米收费 <mark>2.5 元</mark>；超过部分不足 1 km，<mark>按 1 km</mark>计算。</div>
    </div>
  </section>

  <div class="tabs" id="tabs"></div>
  <section class="game">
    <aside class="panel sidebar"><h3>🚕 今日订单</h3><div class="orders" id="orders"></div><div class="card" style="margin-top:12px"><b>学习流程</b><p style="color:var(--muted);line-height:1.7">读规则 → 判断超出 → 路线分段 → 进一计费 → 乘加计算 → 反馈修正。</p></div></aside>
    <main class="panel workspace" id="workspace"></main>
  </section>
</div>
<script>
const BASE_D=3, BASE_P=8, UNIT=2.5;
const orders=[
{id:1,from:'学校',to:'图书馆',passenger:'小雨',d:2.8,focus:'起步价守门员'},
{id:2,from:'出租车站',to:'科技馆',passenger:'阿明',d:3.0,focus:'边界判断'},
{id:3,from:'商场',to:'学校',passenger:'乐乐',d:3.1,focus:'进一计费'},
{id:4,from:'图书馆',to:'商场',passenger:'朵朵',d:6.5,focus:'找到超出路程'},
{id:5,from:'学校',to:'机场快线',passenger:'贝贝',d:7.2,focus:'乘加计价仪'},
{id:6,from:'科技馆',to:'机场',passenger:'天天',d:8.6,focus:'双策略挑战'}
].map(o=>({...o,actual:round1(Math.max(0,o.d-BASE_D)),billing:Math.max(0,Math.ceil(round1(o.d-BASE_D))),fee:calcFee(o.d)}));
const levels=['首页','规则识别','是否超出','路线分段','进一计费','分步计算','维修站','双策略','学习总结'];
let state={idx:0,level:0,coins:0,stars:0,credit:80,done:{},badges:new Set(),attempts:{},mistakes:{},lastMsg:''};
function round1(n){return Math.round(n*10)/10} function money(n){return Number.isInteger(n)?n:n.toFixed(1)} function calcFee(d){return d<=BASE_D?BASE_P:BASE_P+Math.ceil(round1(d-BASE_D))*UNIT}
function logEvent(name,data={}){console.log('[埋点]',name,{time:new Date().toISOString(),...data})}
function render(){renderTabs();renderOrders();updateStats(); const l=state.level; if(l===0)home(); if(l===1)rules(); if(l===2)exceed(); if(l===3)split(); if(l===4)roundUp(); if(l===5)steps(); if(l===6)repair(); if(l===7)strategy(); if(l===8)summary();}
function renderTabs(){tabs.innerHTML=levels.map((x,i)=>`<button class="tab ${state.level===i?'active':''}" onclick="goLevel(${i})">${i?i+'. ':''}${x}</button>`).join('')}
function renderOrders(){ordersEl=document.getElementById('orders');ordersEl.innerHTML=orders.map((o,i)=>`<button class="order ${state.idx===i?'active':''} ${state.done[o.id]?'done':''}" onclick="selectOrder(${i})"><b>${o.id}. ${o.passenger}：${o.from} → ${o.to}</b><br><small>全程 ${o.d} km · ${o.focus} · 正确车费 ${money(o.fee)} 元</small></button>`).join('')}
function updateStats(){coins.textContent=state.coins;stars.textContent=state.stars;credit.textContent=state.credit;doneCount.textContent=Object.keys(state.done).length+'/6'}
function goLevel(i){state.level=i;logEvent(i?'level_start':'game_start',{level_id:i,level_name:levels[i]});render()} function selectOrder(i){state.idx=i;logEvent('order_start',orders[i]);render()} function startGame(){state.level=1;logEvent('game_start',{grade:'五年级',knowledge_id:'segmented_taxi_fee',scene:'taxi'});render()} function showRules(){state.level=1;render()} function showSummary(){state.level=8;render()}
function current(){return orders[state.idx]} function fb(type,msg){return `<div class="feedback show ${type}">${msg}</div>`}
function home(){workspace.innerHTML=`<div class="level-head"><div><h2>欢迎来到数智出租城</h2><p>计价系统故障了：有人多收钱，有人少收钱。请你恢复公平计价。</p></div><span class="pill">单局 10-20 分钟</span></div><div class="task-grid"><div class="card"><h3>🎯 你的任务</h3><p>完成 6 个固定订单，至少经历规则识别、路线分段、进一计费和分步计算 4 类核心互动。</p><button class="btn" onclick="startGame()">接第一单</button></div><div class="card"><h3>🏙️ 城市地图</h3><div class="city"><div class="building lit">出租车站</div><div class="building">学校</div><div class="building">图书馆</div><div class="building">科技馆</div><div class="building">商场</div><div class="building">机场</div></div></div></div>`}
function rules(){let o=current();workspace.innerHTML=`<div class="level-head"><div><h2>1. 订单规则识别</h2><p>点击每张规则卡，确认它表示什么数量。</p></div><span class="pill">当前订单 ${o.d} km</span></div><div class="task-grid"><div class="card"><h3>乘客订单</h3><p>乘客 ${o.passenger}：${o.from} → ${o.to}，全程 <span class="number">${o.d} km</span>。</p><p>规则：<b>3 km</b> 以内收费 <b>8 元</b>；超过部分每千米 <b>2.5 元</b>；不足 1 km 按 1 km。</p></div><div class="card"><h3>归类关键条件</h3><div class="choice-grid"><button class="choice" onclick="checkRule(this,'起步里程')">3 km</button><button class="choice" onclick="checkRule(this,'起步价')">8 元</button><button class="choice" onclick="checkRule(this,'超出单价')">2.5 元/km</button><button class="choice" onclick="checkRule(this,'进一规则')">不足 1 km 按 1 km</button></div><div id="ruleFb">${fb('hint','先把数字和文字看成四张规则卡：起步里程、起步价、超出单价、进一规则。')}</div><div class="actions"><button class="btn" onclick="goLevel(2)">确认规则，判断是否超出</button></div></div></div>`}
function checkRule(btn,label){btn.classList.add('correct');ruleFb.innerHTML=fb('ok',`识别成功：这是“${label}”。这道题要先看是否超过 3 km，再计算超过部分。`)}
function exceed(){let o=current(),ans=o.d>BASE_D;workspace.innerHTML=`<div class="level-head"><div><h2>2. 是否超过起步里程</h2><p>理解“3 km 以内”包括刚好 3 km。</p></div><span class="pill">${o.d} km vs 3 km</span></div><div class="task-grid"><div class="card"><h3>门槛线</h3><div class="fee-box"><div>起步里程</div><div class="screen">3 km</div></div><p>当前订单：<b>${o.d} km</b></p></div><div class="card"><h3>把订单放到正确区域</h3><div class="choice-grid"><button class="choice" onclick="checkExceed(false)">只收起步价</button><button class="choice" onclick="checkExceed(true)">需要加收超出费用</button></div><div id="exceedFb">${fb('hint','小于或等于 3 km 都只收 8 元；只有大于 3 km 才加收。')}</div></div></div>`}
function checkExceed(v){let o=current(),ok=(v===(o.d>BASE_D));document.querySelectorAll('.choice').forEach((b,i)=>b.classList.toggle(ok&&((i===1)===v)?'correct':'wrong',!ok&&((i===1)===v))); if(ok){exceedFb.innerHTML=fb('ok',o.d>BASE_D?'判断正确！超过 3 km，要继续计算超出部分。':'判断正确！3 km 以内包括 3 km，只收起步价。');logEvent('answer_correct',{order_id:o.id,step:'exceed'});setTimeout(()=>goLevel(o.d>BASE_D?3:5),650)}else{markMistake(o.d===3?'boundary_error':'not_check_exceed');exceedFb.innerHTML=fb('bad','再看“以内”这个词。刚好 3 km 还在起步范围内，不需要加收费用。')}}
function routeHtml(o){let basePct=Math.min(100,BASE_D/o.d*100),extraPct=100-basePct;return `<div class="route"><div class="road"><div class="seg-base" style="width:${basePct}%"></div><div class="seg-extra" style="left:${basePct}%;width:${extraPct}%"></div><span class="taxi" style="left:12%">🚕</span></div><div class="ticks"><span>0 km</span><span>起步线 3 km</span><span>终点 ${o.d} km</span></div></div>`}
function split(){let o=current();workspace.innerHTML=`<div class="level-head"><div><h2>3. 路线分段</h2><p>把总路程拆成蓝色起步段和橙色实际超出段。</p></div><span class="pill">总量 - 起步量 = 超出量</span></div><div class="card">${routeHtml(o)}<div class="step"><label>${o.d} - 3 = <b>实际超出路程</b>（km）</label><input id="actualInput" type="number" step="0.1" placeholder="填数字"></div><div class="actions"><button class="btn" onclick="checkActual()">确认分段</button><button class="btn ghost" onclick="hint('actualFb','不是整条路线都要加价。先分出前 3 km，再看剩下多少。')">查看提示</button></div><div id="actualFb"></div></div>`}
function checkActual(){let o=current(),v=parseFloat(actualInput.value);logEvent('route_split_submit',{order_id:o.id,actual_extra_distance:o.actual,student_extra_distance:v});if(Math.abs(v-o.actual)<.001){actualFb.innerHTML=fb('ok',`分段正确！前 3 km 已经包含在起步价里，后面的 ${o.actual} km 才需要另行计费。`);state.stars++;updateStats();setTimeout(()=>goLevel(4),650)}else{markMistake('extra_distance_error');actualFb.innerHTML=fb('bad','你把路线分错了。请用“总路程 - 3 km”计算实际超出路程。')}}
function roundUp(){let o=current();workspace.innerHTML=`<div class="level-head"><div><h2>4. 不足 1 km 进一站</h2><p>区分实际超出路程和计费超出里程。</p></div><span class="pill">实际 ${o.actual} km → 计费 ? km</span></div><div class="task-grid"><div class="card"><h3>计费格子</h3><div class="blocks">${Array.from({length:Math.max(1,o.billing)},(_,i)=>`<span class="block" style="background:${i<Math.floor(o.actual)?'#fff1df':'#fff9db'}">${i+1} km${i===o.billing-1&&o.actual%1?'（补满）':''}</span>`).join('')}</div><p>实际超出 <b>${o.actual} km</b>，最后不足 1 km 的小段也要补成 1 km。</p></div><div class="card"><h3>选择计费超出里程</h3><div class="choice-grid">${[Math.floor(o.actual),o.billing,o.billing+1,o.actual].filter((v,i,a)=>a.indexOf(v)===i).map(v=>`<button class="choice" onclick="checkBilling(${v})">按 ${v} km 计费</button>`).join('')}</div><div id="billFb"></div></div></div>`}
function checkBilling(v){let o=current();logEvent('billing_distance_submit',{order_id:o.id,billing_extra_distance:o.billing,student_billing_distance:v});if(Math.abs(v-o.billing)<.001){billFb.innerHTML=fb('ok',`进一正确！实际超出 ${o.actual} km，计费时按 ${o.billing} km 收费。`);state.stars++;updateStats();setTimeout(()=>goLevel(5),650)}else{markMistake(v===o.actual?'confuse_actual_and_billing':'forget_round_up');billFb.innerHTML=fb('bad',`${o.actual} km 不是都按实际小数收费。出租车规则要求不足 1 km 按 1 km 计算。`)}}
function steps(){let o=current(),no=o.d<=BASE_D;workspace.innerHTML=`<div class="level-head"><div><h2>5. 分步计算与乘加计价仪</h2><p>先分段、再进一、后计算。</p></div><span class="pill">车费 = 8 + 计费超出 × 2.5</span></div><div class="task-grid"><div class="card"><h3>路线可视化</h3>${routeHtml(o)}<div class="fee-box"><div>计价仪</div><div class="screen" id="screen">¥ --</div></div></div><div class="card"><h3>填写四个步骤</h3><div class="inputs"><div class="step"><label>1）实际超出：${o.d} - 3 =</label><input id="s1" type="number" step="0.1" value="${no?0:''}"></div><div class="step"><label>2）计费超出里程：</label><input id="s2" type="number" step="1" value="${no?0:''}"></div><div class="step"><label>3）超出费用：计费里程 × 2.5 =</label><input id="s3" type="number" step="0.1" value="${no?0:''}"></div><div class="step"><label>4）总车费：8 + 超出费用 =</label><input id="s4" type="number" step="0.1"></div></div><div class="actions"><button class="btn" onclick="checkSteps()">提交车费</button><button class="btn ghost" onclick="hint('stepFb','如果没有超过 3 km，超出里程和超出费用都是 0；如果超过，先把实际超出路程向上取整。')">提示</button></div><div id="stepFb"></div></div></div>`}
function checkSteps(){let o=current(),vals=['s1','s2','s3','s4'].map(id=>parseFloat(document.getElementById(id).value));let expect=[o.actual,o.billing,o.billing*UNIT,o.fee];logEvent('answer_submit',{order_id:o.id,answer:vals[3],attempt_count:(state.attempts[o.id]||0)+1});let bad=expect.findIndex((e,i)=>Math.abs((vals[i]||0)-e)>.001);if(bad<0){screen.textContent='¥ '+money(o.fee);stepFb.innerHTML=fb('ok',`计价正确！${o.d<=3?'未超过 3 km，只收起步价 8 元。':`算式是 8 + ${o.billing} × 2.5 = ${money(o.fee)} 元。`}乘客满意度上升。`);completeOrder(o);setTimeout(()=>{state.idx=Math.min(state.idx+1,orders.length-1);goLevel(state.idx===5?7:1)},900)}else{let types=['extra_distance_error','forget_round_up','decimal_calculation_error','decimal_calculation_error'];markMistake(types[bad]);stepFb.innerHTML=fb('bad',`第 ${bad+1} 步需要先修正。错误类型：${wrongText(types[bad])}。系统会保留你的答案，请检查高亮规则。`)}}
function repair(){let o=orders[4];workspace.innerHTML=`<div class="level-head"><div><h2>6. 计价仪维修站</h2><p>点击故障原因，修复错误公式。</p></div><span class="pill">错因诊断</span></div><div class="task-grid"><div class="card"><h3>冒烟的计价仪</h3><div class="repair-formula">8 + <span class="wrong-token">4.2</span> × 2.5 = 18.5</div><p>这单全程 7.2 km，实际超出 4.2 km。</p></div><div class="card"><h3>选择错误原因</h3><div class="choice-grid"><button class="choice" onclick="checkRepair('forget_base_price')">忘记起步价</button><button class="choice" onclick="checkRepair('use_total_distance')">把总路程当超出路程</button><button class="choice" onclick="checkRepair('forget_round_up')">没有按不足 1 km 进一</button><button class="choice" onclick="checkRepair('decimal_calculation_error')">小数乘法错误</button></div><div id="repairFb"></div></div></div>`}
function checkRepair(t){logEvent('repair_submit',{order_id:5,wrong_type_selected:t,repair_success:t==='forget_round_up'});if(t==='forget_round_up'){repairFb.innerHTML=fb('ok','维修成功！这里的 4.2 km 是实际超出路程，计费时要进一按 5 km 计算：8 + 5 × 2.5 = 20.5。');state.badges.add('进一达人');state.stars++;updateStats()}else{markMistake(t);repairFb.innerHTML=fb('bad','再想想：起步价已经写了，问题出在把实际超出 4.2 km 直接放进了计费公式。')}}
function strategy(){let o=orders[5];workspace.innerHTML=`<div class="level-head"><div><h2>7. 双策略挑战</h2><p>普通路线和挑战路线会到达同一个车费。</p></div><span class="pill">策略大师徽章</span></div><div class="task-grid"><div class="card"><h3>普通路线：乘加法</h3><p>${o.d} - 3 = ${o.actual}，${o.actual} km 按 ${o.billing} km 计费。</p><div class="fee-box"><div class="screen">8 + ${o.billing} × 2.5 = ${money(o.fee)}</div></div></div><div class="card"><h3>挑战路线：调整法</h3><p>计费总里程 = 3 + ${o.billing} = ${BASE_D+o.billing} km</p><p><b>${BASE_D+o.billing} × 2.5 + (8 - 3 × 2.5) = ${money(o.fee)}</b></p><select id="exp"><option value="">请选择解释</option><option value="right">起步价 8 元和起步段按每千米 2.5 元计算之间的差</option><option value="wrong">超出路程的小数部分</option></select><div class="actions"><button class="btn" onclick="checkStrategy()">提交解释</button></div><div id="strategyFb"></div></div></div>`}
function checkStrategy(){logEvent('explanation_submit',{order_id:6,strategy_type:'adjustment',explanation_choice:exp.value});if(exp.value==='right'){strategyFb.innerHTML=fb('ok','解释正确！两种策略等价，恭喜获得“策略大师”徽章。');state.badges.add('策略大师');completeOrder(orders[5])}else strategyFb.innerHTML=fb('bad','挑战路线中的括号表示“起步价”和“起步段按超出单价计算”之间的差。')}
function summary(){let done=Object.keys(state.done).length, totalWrong=Object.values(state.mistakes).reduce((a,b)=>a+b,0), weak=Object.entries(state.mistakes).sort((a,b)=>b[1]-a[1])[0];workspace.innerHTML=`<div class="level-head"><div><h2>学习总结</h2><p>回顾“先判断、再分段、再进一、后计算”的完整思路。</p></div><span class="pill">城市修复度 ${Math.round(done/6*100)}%</span></div><div class="summary"><div class="stat"><b>${done}</b>完成订单</div><div class="stat"><b>${done?Math.round(done/(done+totalWrong)*100):0}%</b>正确率估计</div><div class="stat"><b>${state.coins}</b>金币</div><div class="stat"><b>${state.badges.size}</b>徽章</div></div><div class="task-grid"><div class="card"><h3>已获得徽章</h3><div class="blocks">${[...state.badges].concat(state.badges.size?[]:['暂无，继续挑战']).map(b=>`<span class="badge">🏅 ${b}</span>`).join('')}</div></div><div class="card"><h3>学习建议</h3><p>${weak?`你最需要练习：<b>${wrongText(weak[0])}</b>。下一单请重点检查这一步。`:'你已经掌握了基本流程。请尝试解释每个数字在算式中的实际含义。'}</p><div class="choice-grid"><button class="choice correct">先判断是否超过起步里程</button><button class="choice correct">先算实际超出路程</button><button class="choice correct">不足 1 km 要按 1 km</button><button class="choice correct">最后起步价加超出费用</button></div></div></div><div class="actions"><button class="btn" onclick="state.idx=0;goLevel(1)">再挑战一单</button><button class="btn ghost" onclick="goLevel(6)">查看错题维修站</button></div>`;logEvent('game_complete',{correct_rate:done?done/(done+totalWrong):0,weak_points:weak?.[0]})}
function hint(id,msg){document.getElementById(id).innerHTML=fb('hint',msg);logEvent('hint_click',{level_id:state.level,hint_count:1})}
function markMistake(t){state.mistakes[t]=(state.mistakes[t]||0)+1;state.credit=Math.max(0,state.credit-2);state.attempts[current().id]=(state.attempts[current().id]||0)+1;updateStats();logEvent('answer_wrong',{order_id:current().id,wrong_type:t,attempt_count:state.attempts[current().id]})}
function completeOrder(o){if(!state.done[o.id]){state.done[o.id]=true;state.coins+=20;state.stars+=1;state.credit=Math.min(100,state.credit+3);if(Object.keys(state.done).length>=3)state.badges.add('乘加达人');if(state.credit>=90)state.badges.add('精准计价官');logEvent('level_complete',{level_id:state.level,correct_rate:1})}updateStats();renderOrders()}
function wrongText(t){return {not_check_exceed:'未判断是否超过起步里程',boundary_error:'把刚好 3 km 当成超出',use_total_distance:'直接用总路程乘超出单价',forget_base_price:'忘记加起步价',extra_distance_error:'实际超出路程计算错误',forget_round_up:'没有按不足 1 km 进一计算',confuse_actual_and_billing:'混淆实际超出和计费超出里程',decimal_calculation_error:'小数乘法或加法计算错误',formula_structure_error:'算式结构错误'}[t]||t}
render();
</script>
</body>
</html>
