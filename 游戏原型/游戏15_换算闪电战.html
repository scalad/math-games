<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>换算闪电战 - 公顷和平方千米</title>
<style>
/* ============================================
   换算闪电战 — 面积单位换算限时竞速
   基于数学游戏模板 CSS 系统构建
   四年级知识点：公顷和平方千米
   ============================================ */

:root {
  /* 竞速主题：充满能量的橙色系 */
  --color-primary: #FF6B35;
  --color-primary-light: #FFB088;
  --color-primary-dark: #E05520;
  --color-success: #2ECC71;
  --color-success-light: #D5F5E3;
  --color-error: #E74C3C;
  --color-error-light: #FDEDEC;
  --color-warning: #F39C12;
  --color-warning-light: #FEF9E7;

  /* 阶段颜色 */
  --color-bronze: #CD7F32;
  --color-silver: #A0A0A0;
  --color-gold: #F1C40F;
  --color-diamond: #00CED1;

  --color-bg: #FFF8F0;
  --color-card: #FFFFFF;
  --color-text: #2C3E50;
  --color-text-light: #7F8C8D;
  --color-border: #F0E6DC;

  /* 尺寸 */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-card: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-button: 0 4px 14px rgba(255,107,53,0.3);

  /* 字体 */
  --font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-number: "Consolas", "Courier New", monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-family);
  background: var(--color-bg);
  color: var(--color-text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

/* ============================================
   游戏主容器
   ============================================ */
.game-container {
  width: 100%;
  max-width: 460px;
  background: var(--color-card);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 580px;
  position: relative;
}

/* ============================================
   顶部标题栏
   ============================================ */
.game-header {
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
  color: white;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.game-title {
  font-size: 19px;
  font-weight: 700;
  letter-spacing: 1px;
}

/* 阶段徽章 */
.stage-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.25);
  letter-spacing: 0.5px;
  transition: background 0.3s, color 0.3s;
}

.stage-badge.bronze { background: var(--color-bronze); color: #fff; }
.stage-badge.silver  { background: var(--color-silver); color: #333; }
.stage-badge.gold    { background: var(--color-gold); color: #333; }
.stage-badge.diamond { background: var(--color-diamond); color: #fff; }

/* ============================================
   状态栏：倒计时环 + 分值 + 连击
   ============================================ */
.stats-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 16px 20px 8px;
  background: var(--color-card);
}

/* SVG 倒计时环 */
.timer-ring-wrap {
  position: relative;
  width: 72px;
  height: 72px;
  flex-shrink: 0;
}

.timer-ring-svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.timer-ring-bg {
  fill: none;
  stroke: var(--color-border);
  stroke-width: 6;
}

.timer-ring-fg {
  fill: none;
  stroke: var(--color-primary);
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.3s linear, stroke 0.3s;
}

/* 低时间警告变红 */
.timer-ring-fg.warning {
  stroke: var(--color-error);
  animation: pulseWarning 0.5s ease infinite;
}

.timer-time-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  font-weight: 700;
  font-family: var(--font-number);
  color: var(--color-text);
}

.timer-time-text.warning {
  color: var(--color-error);
}

/* 分值与连击 */
.score-combo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.score-display {
  font-size: 28px;
  font-weight: 700;
  font-family: var(--font-number);
  color: var(--color-primary);
  transition: transform 0.15s ease;
}

.score-display.pulse {
  animation: scorePop 0.35s ease;
}

.combo-display {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-warning);
  min-height: 20px;
  transition: transform 0.15s ease;
}

.combo-display.active {
  animation: comboPop 0.3s ease;
}

.multiplier-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--color-warning);
  color: #fff;
  margin-left: 4px;
  vertical-align: middle;
}

/* ============================================
   关卡/阶段指示器
   ============================================ */
.stage-indicator {
  padding: 6px 20px 2px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--color-text-light);
}

.stage-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--color-border);
  transition: background 0.3s;
}

.stage-dot.active-bronze  { background: var(--color-bronze); }
.stage-dot.active-silver  { background: var(--color-silver); }
.stage-dot.active-gold    { background: var(--color-gold); }
.stage-dot.active-diamond { background: var(--color-diamond); }

.stage-name {
  font-weight: 600;
  font-size: 12px;
}

.stage-name.bronze  { color: var(--color-bronze); }
.stage-name.silver  { color: var(--color-silver); }
.stage-name.gold    { color: #D4A017; }
.stage-name.diamond { color: var(--color-diamond); }

/* ============================================
   题目区域
   ============================================ */
.question-area {
  padding: 12px 20px 16px;
  text-align: center;
  flex-shrink: 0;
}

.question-label {
  font-size: 12px;
  color: var(--color-text-light);
  margin-bottom: 6px;
  letter-spacing: 1px;
}

.question-text {
  font-size: 22px;
  font-weight: 700;
  color: var(--color-text);
  line-height: 1.6;
  padding: 8px 16px;
  background: var(--color-bg);
  border-radius: var(--radius-md);
  display: inline-block;
  min-width: 240px;
  transition: background 0.2s;
}

.question-text.flash-correct {
  background: var(--color-success-light);
  animation: flashBg 0.5s ease;
}

.question-text.flash-wrong {
  background: var(--color-error-light);
  animation: shake 0.4s ease;
}

/* ============================================
   输入区域
   ============================================ */
.game-area {
  flex: 1;
  padding: 0 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.input-group {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: 340px;
}

.game-input {
  flex: 1;
  padding: 14px 16px;
  font-size: 22px;
  font-weight: 700;
  font-family: var(--font-number);
  text-align: center;
  border: 2px solid var(--color-border);
  border-radius: var(--radius-md);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: var(--color-card);
  -webkit-appearance: none;
  min-width: 0;
}

.game-input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
}

/* 输入正确/错误状态 */
.game-input.input-correct {
  border-color: var(--color-success);
  background: var(--color-success-light);
}

.game-input.input-wrong {
  border-color: var(--color-error);
  background: var(--color-error-light);
}

.submit-btn {
  padding: 14px 24px;
  font-size: 16px;
  font-weight: 700;
  color: white;
  background: var(--color-primary);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  min-width: 72px;
  box-shadow: var(--shadow-button);
}

.submit-btn:hover { background: var(--color-primary-dark); }
.submit-btn:active { transform: scale(0.96); }
.submit-btn:disabled {
  opacity: 0.6;
  pointer-events: none;
}

/* ============================================
   进度条
   ============================================ */
.progress-bar-wrap {
  padding: 0 20px;
}

.progress-bar-container {
  width: 100%;
  height: 8px;
  background: var(--color-border);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--color-success), var(--color-primary));
  border-radius: 4px;
  transition: width 0.4s ease;
}

/* ============================================
   底部按钮
   ============================================ */
.game-footer {
  padding: 10px 20px 14px;
  display: flex;
  justify-content: center;
  border-top: 1px solid var(--color-border);
}

.restart-btn {
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text-light);
  background: transparent;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
}

.restart-btn:hover {
  color: var(--color-primary);
  border-color: var(--color-primary);
}

/* ============================================
   结算弹窗（时间归零）
   ============================================ */
.result-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
  animation: fadeIn 0.3s ease;
}

.result-modal {
  background: white;
  border-radius: var(--radius-xl);
  padding: 32px 24px;
  text-align: center;
  max-width: 340px;
  width: 90%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  animation: scaleIn 0.4s ease;
}

.result-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: 8px;
}

/* 星级评价 */
.stars-container {
  font-size: 40px;
  margin: 12px 0;
  letter-spacing: 4px;
  animation: bounceStars 0.6s ease;
}

.star-earned {
  display: inline-block;
  animation: popIn 0.5s ease both;
}

.star-earned:nth-child(2) { animation-delay: 0.15s; }
.star-earned:nth-child(3) { animation-delay: 0.3s; }
.star-earned:nth-child(4) { animation-delay: 0.45s; }
.star-earned:nth-child(5) { animation-delay: 0.6s; }

.star-empty {
  display: inline-block;
  opacity: 0.25;
  filter: grayscale(1);
}

/* 结算统计 */
.result-stats {
  font-size: 15px;
  color: var(--color-text-light);
  margin: 16px 0;
  line-height: 2;
}

.result-stats span {
  font-weight: 700;
  color: var(--color-text);
  font-family: var(--font-number);
}

.result-comment {
  font-size: 14px;
  color: var(--color-primary);
  font-weight: 600;
  margin-bottom: 20px;
}

.result-btn {
  padding: 12px 36px;
  font-size: 16px;
  font-weight: 700;
  color: white;
  background: var(--color-primary);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  box-shadow: var(--shadow-button);
}

.result-btn:hover { background: var(--color-primary-dark); }
.result-btn:active { transform: scale(0.96); }

/* ============================================
   连击特效提示（浮出）
   ============================================ */
.toast-combo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 20px;
  font-weight: 700;
  color: var(--color-warning);
  pointer-events: none;
  z-index: 200;
  text-shadow: 0 2px 8px rgba(243,156,18,0.4);
  animation: toastFloat 1s ease forwards;
}

.correct-answer-reveal {
  color: var(--color-error);
  font-size: 13px;
  font-weight: 600;
  margin-top: 8px;
  animation: fadeIn 0.3s ease;
}

/* ============================================
   动画定义
   ============================================ */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes scaleIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes scorePop {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

@keyframes comboPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

@keyframes flashBg {
  0% { background: var(--color-success-light); }
  100% { background: var(--color-bg); }
}

@keyframes toastFloat {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  100% { transform: translate(-50%, -100%) scale(1); opacity: 0; }
}

@keyframes bounceStars {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes pulseWarning {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ============================================
   Toast 消息
   ============================================ */
.toast-msg {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  z-index: 200;
  pointer-events: none;
  animation: toastSlide 2s ease forwards;
  white-space: nowrap;
}

.toast-msg.success {
  background: var(--color-success);
  color: #fff;
}

.toast-msg.info {
  background: var(--color-warning);
  color: #fff;
}

@keyframes toastSlide {
  0% { top: 20px; opacity: 0; }
  15% { top: 30px; opacity: 1; }
  80% { top: 30px; opacity: 1; }
  100% { top: 10px; opacity: 0; }
}

/* ============================================
   工具类
   ============================================ */
.hidden { display: none !important; }

/* ============================================
   响应式
   ============================================ */
@media (max-width: 380px) {
  .game-container { min-height: 520px; }
  .game-header { padding: 12px 16px; }
  .game-title { font-size: 17px; }
  .stats-bar { gap: 16px; padding: 12px 16px 4px; }
  .timer-ring-wrap { width: 60px; height: 60px; }
  .timer-time-text { font-size: 18px; }
  .score-display { font-size: 24px; }
  .question-text { font-size: 18px; min-width: 200px; padding: 6px 12px; }
  .game-input { font-size: 20px; padding: 12px; }
  .submit-btn { padding: 12px 20px; font-size: 15px; }
  .result-modal { padding: 24px 20px; }
}

@media (min-width: 600px) {
  .game-container { max-width: 480px; min-height: 640px; }
}

/* ============================================
   输入框数字键盘适配 - 隐藏 spinner
   ============================================ */
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type="number"] {
  -moz-appearance: textfield;
}
</style>
</head>
<body>

<!-- ============================================
     游戏主容器
     ============================================ -->
<div class="game-container" id="gameContainer">

  <!-- 标题栏 + 阶段徽章 -->
  <div class="game-header">
    <div class="game-title">⚡ 换算闪电战</div>
    <div class="stage-badge bronze" id="stageBadge">🟤 青铜</div>
  </div>

  <!-- 倒计时环 + 分值 + 连击 -->
  <div class="stats-bar">
    <div class="timer-ring-wrap">
      <svg class="timer-ring-svg" viewBox="0 0 100 100">
        <circle class="timer-ring-bg" cx="50" cy="50" r="42"></circle>
        <circle class="timer-ring-fg" id="timerRing" cx="50" cy="50" r="42"
          stroke-dasharray="263.89" stroke-dashoffset="0"></circle>
      </svg>
      <div class="timer-time-text" id="timerText">60</div>
    </div>

    <div class="score-combo">
      <div class="score-display" id="scoreDisplay">0</div>
      <div class="combo-display" id="comboDisplay"></div>
    </div>
  </div>

  <!-- 阶段指示器（四个圆点） -->
  <div class="stage-indicator">
    <span style="font-size:11px;">阶段</span>
    <span class="stage-dot active-bronze" id="dotBronze"></span>
    <span class="stage-dot" id="dotSilver"></span>
    <span class="stage-dot" id="dotGold"></span>
    <span class="stage-dot" id="dotDiamond"></span>
    <span class="stage-name bronze" id="stageName">青铜 · 公顷↔平方米</span>
  </div>

  <!-- 题目 -->
  <div class="question-area">
    <div class="question-label">请输入正确答案</div>
    <div class="question-text" id="questionText">8公顷 = ? 平方米</div>
    <div class="correct-answer-reveal hidden" id="correctReveal"></div>
  </div>

  <!-- 输入区 -->
  <div class="game-area">
    <div class="input-group">
      <input type="number" class="game-input" id="answerInput"
        placeholder="输入数字" inputmode="numeric" autocomplete="off">
      <button class="submit-btn" id="submitBtn">确定</button>
    </div>
  </div>

  <!-- 进度条 -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>
  </div>

  <!-- 底部 -->
  <div class="game-footer">
    <button class="restart-btn" id="restartBtn">🔄 重新开始</button>
  </div>

</div>

<!-- ============================================
     结算弹窗（时间归零时显示）
     ============================================ -->
<div class="result-overlay hidden" id="resultOverlay">
  <div class="result-modal">
    <div class="result-title" id="resultTitle">⏰ 时间到！</div>
    <div class="stars-container" id="starsContainer"></div>
    <div class="result-stats" id="resultStats"></div>
    <div class="result-comment" id="resultComment"></div>
    <button class="result-btn" id="resultRestartBtn">🔄 再来一局</button>
  </div>
</div>

<!-- 连击漂浮提示容器 -->
<div class="toast-combo hidden" id="toastCombo"></div>

<script>
// ============================================
// 换算闪电战 — 游戏逻辑
// 四年级数学：公顷和平方千米面积单位换算
// ============================================

// ---------- 常量 ----------
const TOTAL_TIME = 60;          // 总倒计时（秒）
const TIME_BONUS = 2;          // 答对加时（秒）
const MAX_TIME = 60;           // 时间上限
const BASE_SCORE = 10;         // 基础分
const COMBO_X1p5 = 5;          // 连击≥5，×1.5
const COMBO_X2 = 10;           // 连击≥10，×2
const COMBO_X3 = 15;           // 连击≥15，×3
const DIAMOND_COMBO = 15;      // 钻石阶段所需连击
const STAGE_SILVER = 10;       // 累计正确10 → 白银
const STAGE_GOLD = 20;         // 累计正确20 → 黄金
const RING_CIRCUM = 263.89;    // 圆周长 2π×42

// 星级阈值
const STAR_THRESHOLDS = [150, 300, 500, 750];

// ---------- DOM 引用 ----------
const $ = (sel) => document.querySelector(sel);

const stageBadge    = $('#stageBadge');
const timerRing     = $('#timerRing');
const timerText     = $('#timerText');
const scoreDisplay  = $('#scoreDisplay');
const comboDisplay  = $('#comboDisplay');
const dotBronze     = $('#dotBronze');
const dotSilver     = $('#dotSilver');
const dotGold       = $('#dotGold');
const dotDiamond    = $('#dotDiamond');
const stageName     = $('#stageName');
const questionText  = $('#questionText');
const correctReveal = $('#correctReveal');
const answerInput   = $('#answerInput');
const submitBtn     = $('#submitBtn');
const progressBar   = $('#progressBar');
const restartBtn    = $('#restartBtn');
const resultOverlay = $('#resultOverlay');
const resultTitle   = $('#resultTitle');
const starsContainer = $('#starsContainer');
const resultStats   = $('#resultStats');
const resultComment = $('#resultComment');
const resultRestartBtn = $('#resultRestartBtn');
const toastCombo    = $('#toastCombo');

// ---------- 游戏状态 ----------
let state = {
  score: 0,            // 总分
  combo: 0,            // 当前连击
  maxCombo: 0,         // 最高连击
  totalCorrect: 0,     // 累计正确数
  totalAttempts: 0,    // 总答题数
  timeLeft: TOTAL_TIME,
  timerId: null,
  currentAnswer: 0,    // 当前题目答案
  currentQuestion: '', // 当前题目文本
  isPlaying: false,    // 游戏进行中
  isAnswering: false,  // 等待反馈中（防连点）
  stageCache: '',      // 缓存阶段名称，避免重复 DOM 操作
  usedQuestions: new Set(), // 已出过的题目（防重复）
};

// ---------- 工具函数 ----------

/** 获取当前阶段名称 */
function getCurrentStage() {
  if (state.combo >= DIAMOND_COMBO) return 'diamond';
  if (state.totalCorrect >= STAGE_GOLD)  return 'gold';
  if (state.totalCorrect >= STAGE_SILVER) return 'silver';
  return 'bronze';
}

/** 获取当前连击倍率 */
function getMultiplier() {
  if (state.combo >= COMBO_X3) return 3;
  if (state.combo >= COMBO_X2) return 2;
  if (state.combo >= COMBO_X1p5) return 1.5;
  return 1;
}

/** 获取倍率显示文本 */
function getMultiplierLabel() {
  const m = getMultiplier();
  if (m === 1) return '';
  return `×${m}`;
}

/** 更新 UI 中的阶段显示 */
function updateStageUI() {
  const stage = getCurrentStage();
  if (stage === state.stageCache) return; // 未变化则跳过
  state.stageCache = stage;

  // 更新圆点
  dotBronze.className  = 'stage-dot' + (stage === 'bronze'  ? ' active-bronze' : '');
  dotSilver.className  = 'stage-dot' + (stage === 'silver'  ? ' active-silver' : '');
  dotGold.className    = 'stage-dot' + (stage === 'gold'    ? ' active-gold' : '');
  dotDiamond.className = 'stage-dot' + (stage === 'diamond' ? ' active-diamond' : '');

  // 更新阶段徽章
  const badgeMap = {
    bronze:  ['bronze',  '🟤 青铜'],
    silver:  ['silver',  '⚪ 白银'],
    gold:    ['gold',    '🟡 黄金'],
    diamond: ['diamond', '💎 钻石'],
  };
  const [cls, label] = badgeMap[stage];
  stageBadge.className = 'stage-badge ' + cls;
  stageBadge.textContent = label;

  // 更新阶段名称
  const nameMap = {
    bronze:  '青铜 · 公顷↔平方米',
    silver:  '白银 · 平方千米↔公顷',
    gold:    '黄金 · 混合换算',
    diamond: '钻石 · 面积计算',
  };
  stageName.textContent = nameMap[stage];
  stageName.className = 'stage-name ' + stage;
}

/** 更新进度条（用正确数占总趋近目标的粗略进度） */
function updateProgressBar() {
  const totalTarget = STAGE_GOLD + 10; // 30 为满
  const pct = Math.min(100, Math.round((state.totalCorrect / totalTarget) * 100));
  progressBar.style.width = pct + '%';
}

/** 显示漂浮 Toast（连击、倍率提示） */
function showComboToast(msg) {
  toastCombo.textContent = msg;
  toastCombo.classList.remove('hidden');
  // 强制回流后重新动画
  void toastCombo.offsetWidth;
  toastCombo.style.animation = 'none';
  void toastCombo.offsetWidth;
  toastCombo.style.animation = 'toastFloat 1s ease forwards';
  setTimeout(() => toastCombo.classList.add('hidden'), 1000);
}

/** 显示简短 Toast */
function showToast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast-msg ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

// ---------- 题目生成 ----------

/**
 * 生成题目 — 根据当前阶段返回 { question, answer }
 * 保证不与 usedQuestions 中的题目重复
 */
function generateQuestion() {
  const stage = getCurrentStage();
  let question, answer;
  let attempts = 0;
  const maxAttempts = 100;

  do {
    if (stage === 'diamond') {
      // ------ 钻石：面积计算题 ------
      [question, answer] = generateDiamondQuestion();
    } else if (stage === 'gold') {
      // ------ 黄金：混合题 ------
      [question, answer] = generateGoldQuestion();
    } else if (stage === 'silver') {
      // ------ 白银：km²↔ha ------
      [question, answer] = generateSilverQuestion();
    } else {
      // ------ 青铜：ha↔m² ------
      [question, answer] = generateBronzeQuestion();
    }
    attempts++;
  } while (state.usedQuestions.has(question) && attempts < maxAttempts);

  // 如果实在无法生成不重复的题目，清空缓存重试
  if (state.usedQuestions.has(question)) {
    state.usedQuestions.clear();
  }

  state.usedQuestions.add(question);
  return { question, answer };
}

/** 青铜：公顷 ↔ 平方米 */
function generateBronzeQuestion() {
  // 50% 概率 ha→m², 50% m²→ha
  if (Math.random() < 0.5) {
    const ha = randInt(1, 99);
    return [`${ha} 公顷 = ? 平方米`, ha * 10000];
  } else {
    // m²→ha: 确保能被 10000 整除
    const ha = randInt(1, 30);
    return [`${ha * 10000} 平方米 = ? 公顷`, ha];
  }
}

/** 白银：平方千米 ↔ 公顷 */
function generateSilverQuestion() {
  if (Math.random() < 0.5) {
    const km2 = randInt(1, 50);
    return [`${km2} 平方千米 = ? 公顷`, km2 * 100];
  } else {
    const km2 = randInt(1, 30);
    return [`${km2 * 100} 公顷 = ? 平方千米`, km2];
  }
}

/** 黄金：混合题（青铜+白银混合，含跨级换算） */
function generateGoldQuestion() {
  const r = Math.random();
  if (r < 0.25)      return generateBronzeQuestion();
  else if (r < 0.5)  return generateSilverQuestion();
  else if (r < 0.7) {
    // m²→km²
    const km2 = randInt(1, 10);
    return [`${km2 * 1000000} 平方米 = ? 平方千米`, km2];
  } else if (r < 0.85) {
    // km²→m²
    const km2 = randInt(1, 10);
    return [`${km2} 平方千米 = ? 平方米`, km2 * 1000000];
  } else {
    // 公顷→平方米（大数）
    const ha = randInt(10, 200);
    return [`${ha} 公顷 = ? 平方米`, ha * 10000];
  }
}

/** 钻石：面积计算题（长×宽÷10000） */
function generateDiamondQuestion() {
  // 预设能整除 10000 的长宽组合
  const pairs = [
    [100, 300], [200, 200], [200, 500], [400, 250],
    [500, 200], [100, 500], [250, 400], [300, 200],
    [150, 400], [400, 150], [125, 800], [800, 125],
    [100, 200], [200, 100], [250, 200], [200, 250],
    [500, 300], [300, 500], [400, 500], [500, 400],
  ];
  const [len, wid] = pairs[randInt(0, pairs.length - 1)];
  const areaHa = (len * wid) / 10000;
  // 随机交换长宽，增加多样性
  const lengths = Math.random() < 0.5 ? [len, wid] : [wid, len];
  return [`长 ${lengths[0]}m 宽 ${lengths[1]}m 的地 = ? 公顷`, areaHa];
}

/** 生成 [min, max] 范围内的随机整数 */
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ---------- 题目渲染 ----------

/** 展示新题目 */
function renderQuestion() {
  const { question, answer } = generateQuestion();
  state.currentAnswer = answer;
  state.currentQuestion = question;

  questionText.textContent = question;
  questionText.className = 'question-text';
  correctReveal.classList.add('hidden');
  correctReveal.textContent = '';

  answerInput.value = '';
  answerInput.className = 'game-input';
  answerInput.disabled = false;
  submitBtn.disabled = false;
  state.isAnswering = false;

  updateStageUI();
  updateProgressBar();

  // 自动聚焦输入框
  setTimeout(() => answerInput.focus(), 100);
}

// ---------- 计时器 ----------

/** 启动倒计时 */
function startTimer() {
  stopTimer();
  state.timerId = setInterval(() => {
    state.timeLeft--;
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      endGame();
    }
    updateTimerUI();
  }, 1000);
}

/** 停止计时器 */
function stopTimer() {
  if (state.timerId) {
    clearInterval(state.timerId);
    state.timerId = null;
  }
}

/** 增加时间（答对奖励） */
function addTime(seconds) {
  state.timeLeft = Math.min(MAX_TIME, state.timeLeft + seconds);
  updateTimerUI();
}

/** 更新计时器 UI（环 + 文字） */
function updateTimerUI() {
  // 倒计时环
  const elapsed = TOTAL_TIME - state.timeLeft;
  const offset = (elapsed / TOTAL_TIME) * RING_CIRCUM;
  timerRing.setAttribute('stroke-dashoffset', offset);

  // 文字
  timerText.textContent = state.timeLeft;

  // 低时间警告（≤10秒）
  if (state.timeLeft <= 10) {
    timerRing.classList.add('warning');
    timerText.classList.add('warning');
  } else {
    timerRing.classList.remove('warning');
    timerText.classList.remove('warning');
  }
}

// ---------- 回答处理 ----------

/** 提交答案 */
function handleSubmit() {
  if (!state.isPlaying || state.isAnswering) return;

  const rawValue = answerInput.value.trim();
  if (rawValue === '') {
    answerInput.focus();
    return; // 空输入不处理
  }

  const userAnswer = parseInt(rawValue, 10);
  if (isNaN(userAnswer)) {
    answerInput.focus();
    return;
  }

  state.isAnswering = true;
  state.totalAttempts++;
  submitBtn.disabled = true;

  if (userAnswer === state.currentAnswer) {
    handleCorrect();
  } else {
    handleWrong(state.currentAnswer);
  }
}

/** 答对处理 */
function handleCorrect() {
  state.combo++;
  state.totalCorrect++;
  if (state.combo > state.maxCombo) state.maxCombo = state.combo;

  const multiplier = getMultiplier();
  const points = Math.round(BASE_SCORE * multiplier);
  state.score += points;

  // UI 反馈
  questionText.classList.add('flash-correct');
  answerInput.classList.add('input-correct');
  scoreDisplay.textContent = state.score;
  scoreDisplay.classList.add('pulse');
  setTimeout(() => scoreDisplay.classList.remove('pulse'), 350);

  // 更新连击显示
  updateComboUI();

  // 加时
  addTime(TIME_BONUS);

  // 连击里程碑 Toast
  if (state.combo === COMBO_X1p5) showToast('🔥 连击×1.5！', 'success');
  else if (state.combo === COMBO_X2) showToast('💥 连击×2！', 'success');
  else if (state.combo === COMBO_X3) showToast('⚡ 连击×3！钻石阶段！', 'success');
  else if (multiplier > 1) showComboToast(`+${points}分 · ${getMultiplierLabel()}`);

  // 阶段提示
  if (state.totalCorrect === STAGE_SILVER) showToast('⬆ 晋升白银阶段！', 'info');
  else if (state.totalCorrect === STAGE_GOLD) showToast('⬆ 晋升黄金阶段！', 'info');

  updateStageUI();
  updateProgressBar();

  // 延迟出下一题
  setTimeout(() => {
    answerInput.classList.remove('input-correct');
    renderQuestion();
  }, 500);
}

/** 答错处理 */
function handleWrong(correctAnswer) {
  state.combo = 0;
  updateComboUI();

  // UI 反馈
  questionText.classList.add('flash-wrong');
  answerInput.classList.add('input-wrong');
  correctReveal.textContent = `正确答案：${correctAnswer}`;
  correctReveal.classList.remove('hidden');

  // 震动输入框
  answerInput.style.animation = 'shake 0.4s ease';
  setTimeout(() => {
    answerInput.style.animation = '';
    answerInput.classList.remove('input-wrong');
  }, 400);

  updateStageUI();
  updateProgressBar();

  // 延迟出下一题
  setTimeout(() => {
    correctReveal.classList.add('hidden');
    renderQuestion();
  }, 1200);
}

/** 更新连击 UI */
function updateComboUI() {
  if (state.combo > 0) {
    comboDisplay.innerHTML = `🔥 ${state.combo} 连击 <span class="multiplier-badge">${getMultiplierLabel()}</span>`;
    comboDisplay.classList.add('active');
    setTimeout(() => comboDisplay.classList.remove('active'), 300);
  } else {
    comboDisplay.innerHTML = '';
    comboDisplay.classList.remove('active');
  }
}

// ---------- 游戏结束 ----------

/** 时间归零，游戏结束 */
function endGame() {
  stopTimer();
  state.isPlaying = false;
  state.isAnswering = true;
  state.timeLeft = 0;
  updateTimerUI();

  // 禁用输入
  answerInput.disabled = true;
  submitBtn.disabled = true;

  // 计算星级
  const stars = getStars(state.score);

  // 更新弹窗
  resultTitle.textContent = '⏰ 时间到！';
  renderStars(stars);
  resultStats.innerHTML = `
    <div>⭐ 最终得分：<span>${state.score}</span> 分</div>
    <div>✅ 答对次数：<span>${state.totalCorrect}</span></div>
    <div>🔥 最高连击：<span>${state.maxCombo}</span></div>
    <div>📝 总答题数：<span>${state.totalAttempts}</span></div>
    <div>🏆 最终阶段：<span>${getStageLabel()}</span></div>
  `;

  // 评价语
  const comments = [
    '别灰心，多多练习就能越来越快！💪',
    '不错哦，继续加油！🌟',
    '很棒！你对面积换算掌握得不错！👍',
    '太厉害了！你是换算小达人！🏆',
    '无敌！面积换算大师就是你！👑',
  ];
  resultComment.textContent = comments[stars - 1];

  resultOverlay.classList.remove('hidden');
}

/** 计算星级 (1-5) */
function getStars(score) {
  if (score >= STAR_THRESHOLDS[3]) return 5;
  if (score >= STAR_THRESHOLDS[2]) return 4;
  if (score >= STAR_THRESHOLDS[1]) return 3;
  if (score >= STAR_THRESHOLDS[0]) return 2;
  return 1;
}

/** 渲染星级 */
function renderStars(stars) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    if (i <= stars) {
      html += `<span class="star-earned">⭐</span>`;
    } else {
      html += `<span class="star-empty">⭐</span>`;
    }
  }
  starsContainer.innerHTML = html;
}

/** 获取最终阶段标签 */
function getStageLabel() {
  const stage = getCurrentStage();
  const map = { bronze: '青铜', silver: '白银', gold: '黄金', diamond: '钻石' };
  return map[stage];
}

// ---------- 游戏控制 ----------

/** 开始 / 重新开始 */
function startGame() {
  // 重置状态
  stopTimer();
  state.score = 0;
  state.combo = 0;
  state.maxCombo = 0;
  state.totalCorrect = 0;
  state.totalAttempts = 0;
  state.timeLeft = TOTAL_TIME;
  state.isPlaying = true;
  state.isAnswering = false;
  state.stageCache = '';
  state.usedQuestions.clear();

  // 重置 UI
  scoreDisplay.textContent = '0';
  scoreDisplay.classList.remove('pulse');
  comboDisplay.innerHTML = '';
  comboDisplay.classList.remove('active');
  timerRing.classList.remove('warning');
  timerText.classList.remove('warning');
  resultOverlay.classList.add('hidden');
  questionText.className = 'question-text';
  correctReveal.classList.add('hidden');
  answerInput.disabled = false;
  answerInput.value = '';
  submitBtn.disabled = false;

  updateStageUI();
  updateTimerUI();
  updateProgressBar();

  // 生成首题并启动计时
  renderQuestion();
  startTimer();
  answerInput.focus();
}

// ---------- 事件绑定 ----------

submitBtn.addEventListener('click', handleSubmit);

// 回车键提交（桌面端）
answerInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSubmit();
});

restartBtn.addEventListener('click', startGame);
resultRestartBtn.addEventListener('click', () => {
  resultOverlay.classList.add('hidden');
  startGame();
});

// ============================================
// 启动游戏！
// ============================================
startGame();
</script>
