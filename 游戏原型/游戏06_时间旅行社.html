<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧳 时间旅行社</title>
<style>
/* ============================================
   时间旅行社 — 角色扮演游戏样式
   ============================================ */
:root {
  --color-primary: #4A90D9;
  --color-primary-light: #7AB3E8;
  --color-primary-dark: #2E6AB0;
  --color-accent: #FFB347;
  --color-success: #52C41A;
  --color-success-light: #D9F7BE;
  --color-error: #FF4D4F;
  --color-error-light: #FFF1F0;
  --color-warning: #FAAD14;
  --color-warning-light: #FFFBE6;
  --color-bg: #E8F4FD;
  --color-card: #FFFFFF;
  --color-text: #333333;
  --color-text-light: #666666;
  --color-border: #E0E0E0;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-button: 0 4px 12px rgba(0,0,0,0.15);
  --font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-number: "Consolas", "Courier New", monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-family);
  background: var(--color-bg);
  color: var(--color-text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

.game-container {
  width: 100%;
  max-width: 500px;
  background: var(--color-card);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 640px;
  position: relative;
}

/* Header */
.game-header {
  background: linear-gradient(135deg, #4A90D9, #2E6AB0);
  color: white;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.game-title { font-size: 20px; font-weight: 700; }
.game-stats { display: flex; gap: 16px; font-size: 14px; }
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-icon { font-size: 16px; }
.stat-value { font-weight: 700; font-family: var(--font-number); }

/* Level indicator */
.level-indicator {
  padding: 8px 20px;
  background: var(--color-primary-light);
  color: white;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
}

/* Customer dialog */
.customer-area {
  padding: 16px 20px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: #FFFDF5;
  border-bottom: 2px dashed var(--color-accent);
  flex-shrink: 0;
}
.customer-avatar {
  font-size: 40px;
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-accent);
  border-radius: 50%;
}
.customer-bubble {
  flex: 1;
  background: white;
  border: 2px solid var(--color-accent);
  border-radius: var(--radius-lg);
  padding: 10px 14px;
  font-size: 15px;
  line-height: 1.5;
  position: relative;
}
.customer-name {
  font-weight: 700;
  color: var(--color-accent);
  margin-bottom: 2px;
  font-size: 13px;
}
.customer-request {
  color: var(--color-text);
}

/* Game area */
.game-area {
  flex: 1;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 240px;
}

/* Month buttons for Level 1 */
.months-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  width: 100%;
  max-width: 400px;
}
.month-btn {
  padding: 14px 8px;
  font-size: 16px;
  font-weight: 700;
  color: var(--color-text);
  background: white;
  border: 2px solid var(--color-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.2s;
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.month-btn:hover {
  border-color: var(--color-primary);
  background: #F0F7FF;
  transform: translateY(-2px);
  box-shadow: var(--shadow-button);
}
.month-btn.correct {
  border-color: var(--color-success);
  background: var(--color-success-light);
  color: var(--color-success);
  animation: pulse 0.5s ease;
}
.month-btn.incorrect {
  border-color: var(--color-error);
  background: var(--color-error-light);
  color: var(--color-error);
  animation: shake 0.4s ease;
}
.month-btn:disabled { pointer-events: none; opacity: 0.65; }
.month-btn.highlight-correct { border-color: var(--color-success); background: var(--color-success-light); }

/* Calendar styles for Level 2-3 */
.calendar-wrapper {
  width: 100%;
  max-width: 400px;
  border: 2px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: white;
}
.calendar-title {
  text-align: center;
  padding: 10px;
  font-weight: 700;
  font-size: 16px;
  color: var(--color-primary-dark);
  background: #F0F7FF;
}
.calendar-table {
  width: 100%;
  border-collapse: collapse;
}
.calendar-table th {
  padding: 8px 4px;
  font-size: 13px;
  color: var(--color-text-light);
  background: #FAFAFA;
  border-bottom: 1px solid var(--color-border);
}
.calendar-table th.weekend { color: var(--color-error); }
.calendar-table td {
  text-align: center;
  padding: 0;
  height: 44px;
}
.cal-day {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
  min-height: 44px;
}
.cal-day:hover {
  background: #E3F0FF;
  transform: scale(1.08);
  box-shadow: 0 2px 8px rgba(74,144,217,0.3);
}
.cal-day.correct {
  background: var(--color-success-light);
  color: var(--color-success);
  animation: pulse 0.5s ease;
}
.cal-day.incorrect {
  background: var(--color-error-light);
  color: var(--color-error);
  animation: shake 0.4s ease;
}
.cal-day.disabled { pointer-events: none; opacity: 0.4; }
.cal-day.highlight-correct { background: var(--color-success-light); color: var(--color-success); }

/* Time input for Level 3 */
.time-input-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.time-input {
  padding: 14px 16px;
  font-size: 24px;
  font-weight: 700;
  font-family: var(--font-number);
  text-align: center;
  border: 3px solid var(--color-border);
  border-radius: var(--radius-md);
  outline: none;
  width: 160px;
  transition: border-color 0.2s;
}
.time-input:focus { border-color: var(--color-primary); }
.time-hint {
  font-size: 13px;
  color: var(--color-text-light);
}

/* Submit button */
.submit-btn {
  padding: 14px 32px;
  font-size: 17px;
  font-weight: 700;
  color: white;
  background: var(--color-primary);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.2s;
  min-width: 120px;
}
.submit-btn:hover { background: var(--color-primary-dark); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Combo indicator */
.combo-indicator {
  padding: 4px 16px;
  font-size: 13px;
  font-weight: 700;
  text-align: center;
  color: var(--color-accent);
  min-height: 24px;
}
.combo-fire { animation: bounce 0.3s ease infinite alternate; }

/* Progress bar */
.progress-bar-container {
  width: 100%;
  height: 8px;
  background: var(--color-border);
  border-radius: 4px;
  overflow: hidden;
  margin: 0 16px;
  max-width: calc(100% - 32px);
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--color-success), var(--color-primary));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* Footer */
.game-footer {
  padding: 10px 20px;
  display: flex;
  justify-content: center;
  border-top: 1px solid var(--color-border);
}
.restart-btn {
  padding: 8px 20px;
  font-size: 14px;
  color: var(--color-text-light);
  background: transparent;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
}
.restart-btn:hover { color: var(--color-primary); border-color: var(--color-primary); }

/* Feedback modal */
.feedback-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  justify-content: center; align-items: center;
  z-index: 100;
  animation: fadeIn 0.2s ease;
}
.feedback-modal {
  background: white;
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  text-align: center;
  max-width: 320px;
  width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  animation: scaleIn 0.3s ease;
}
.feedback-icon { font-size: 56px; margin-bottom: 12px; }
.feedback-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.feedback-message { font-size: 15px; color: var(--color-text-light); margin-bottom: 20px; line-height: 1.5; }
.feedback-btn {
  padding: 12px 32px;
  font-size: 16px; font-weight: 700;
  color: white;
  background: var(--color-primary);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.2s;
}
.feedback-btn:hover { background: var(--color-primary-dark); }

/* Victory screen */
.victory-container { text-align: center; padding: 20px; }
.victory-icon { font-size: 72px; margin-bottom: 12px; animation: bounce 0.6s ease infinite alternate; }
.victory-title { font-size: 26px; font-weight: 700; color: var(--color-success); margin-bottom: 8px; }
.victory-stats { font-size: 15px; color: var(--color-text-light); margin-bottom: 20px; line-height: 1.8; }
.victory-btn {
  padding: 12px 32px;
  font-size: 16px; font-weight: 700;
  color: white;
  background: var(--color-primary);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  margin: 0 6px;
  transition: background 0.2s;
}
.victory-btn:hover { background: var(--color-primary-dark); }

/* Practice mode styles */
.practice-container {
  display: none; flex-direction: column;
  height: 100%;
}
.practice-badge-bar {
  padding: 12px 20px;
  background: var(--color-bg);
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--color-border);
}
.practice-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 20px;
  font-size: 13px; font-weight: 700;
}
.badge-tier-1 { background: #E8F5E9; color: #2E7D32; }
.badge-tier-2 { background: #E3F2FD; color: #1565C0; }
.badge-tier-3 { background: #FFF3E0; color: #E65100; }
.badge-tier-4 { background: #F3E5F5; color: #7B1FA2; }
.badge-tier-5 { background: #FFEBEE; color: #C62828; }
.practice-progress-text { font-size: 13px; color: var(--color-text-light); }
.practice-question-card {
  margin: 20px; padding: 24px 20px;
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  flex: 1;
}
.practice-q-num { font-size: 12px; font-weight: 700; color: var(--color-primary); margin-bottom: 8px; }
.practice-q-title { font-size: 17px; font-weight: 600; color: var(--color-text); margin-bottom: 16px; line-height: 1.6; }
.practice-options { display: flex; flex-direction: column; gap: 10px; }
.practice-option {
  padding: 14px 16px; font-size: 15px; text-align: left;
  background: var(--color-bg); border: 2px solid var(--color-border);
  border-radius: var(--radius-md); cursor: pointer;
  transition: all 0.2s; line-height: 1.4;
}
.practice-option:hover { border-color: var(--color-primary); background: white; }
.practice-option.selected-correct { border-color: var(--color-success); background: var(--color-success-light); }
.practice-option.selected-wrong { border-color: var(--color-error); background: var(--color-error-light); }
.practice-option.show-correct { border-color: var(--color-success); }
.practice-option:disabled { pointer-events: none; }
.practice-input-area { display: flex; gap: 10px; }
.practice-input {
  flex: 1; padding: 12px 16px; font-size: 18px; font-weight: 700;
  font-family: var(--font-number); text-align: center;
  border: 2px solid var(--color-border); border-radius: var(--radius-md);
  outline: none;
}
.practice-input:focus { border-color: var(--color-primary); }
.practice-feedback {
  margin: 0 20px 12px; padding: 12px 16px;
  border-radius: var(--radius-md); font-size: 14px;
  line-height: 1.5; display: none;
}
.practice-feedback.show { display: block; animation: fadeIn 0.3s ease; }
.practice-feedback.correct { background: var(--color-success-light); color: #2E7D32; }
.practice-feedback.wrong { background: var(--color-error-light); color: #C62828; }
.practice-nav {
  padding: 12px 20px; display: flex; gap: 10px;
  justify-content: center; border-top: 1px solid var(--color-border);
}
.practice-nav-btn {
  padding: 10px 24px; font-size: 15px; font-weight: 700;
  border: none; border-radius: var(--radius-md);
  cursor: pointer; transition: all 0.2s;
}
.practice-nav-btn.primary { background: var(--color-primary); color: white; }
.practice-nav-btn.primary:hover { background: var(--color-primary-dark); }
.practice-nav-btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }
.practice-nav-btn.secondary { background: transparent; color: var(--color-text-light); border: 1px solid var(--color-border); }
.practice-nav-btn.secondary:hover { color: var(--color-primary); border-color: var(--color-primary); }
.practice-summary { text-align: center; padding: 30px 20px; }
.practice-summary-icon { font-size: 64px; margin-bottom: 12px; }
.practice-summary-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.practice-summary-score { font-size: 36px; font-weight: 700; font-family: var(--font-number); margin-bottom: 12px; }
.practice-summary-detail { font-size: 14px; color: var(--color-text-light); margin-bottom: 20px; line-height: 1.8; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes shake { 0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)} }
@keyframes pulse { 0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)} }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }
@keyframes popIn { 0%{transform:scale(0);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1} }

.hidden { display: none !important; }
.text-center { text-align: center; }

@media (max-width: 360px) {
  .game-container { min-height: 540px; }
  .game-header { padding: 12px 16px; }
  .game-title { font-size: 17px; }
  .months-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 768px) {
  .game-container { max-width: 640px; min-height: 720px; }
  .months-grid { grid-template-columns: repeat(4, 1fr); max-width: 480px; }
}
</style>
</head>
<body>

<div class="game-container" id="gameContainer">
  <div class="game-header">
    <div class="game-title" id="gameTitle">🧳 时间旅行社</div>
    <div class="game-stats">
      <div class="stat-item"><span class="stat-icon">💰</span><span class="stat-value" id="scoreDisplay">0</span></div>
      <div class="stat-item"><span class="stat-icon">🎯</span><span class="stat-value" id="levelDisplay">1/3</span></div>
    </div>
  </div>

  <div class="level-indicator" id="levelLabel">🏖️ 第 1 关：本地游</div>

  <div class="customer-area" id="customerArea">
    <div class="customer-avatar" id="customerAvatar">🐱</div>
    <div class="customer-bubble">
      <div class="customer-name" id="customerName">客人A</div>
      <div class="customer-request" id="customerRequest">请帮我安排行程！</div>
    </div>
  </div>

  <div class="combo-indicator" id="comboIndicator"></div>

  <div class="game-area" id="gameArea"></div>

  <div style="padding: 0 20px;">
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>
  </div>

  <div class="game-footer">
    <button class="restart-btn" id="restartBtn">🔄 重新开始</button>
  </div>
</div>

<!-- Feedback Modal -->
<div class="feedback-overlay hidden" id="feedbackOverlay">
  <div class="feedback-modal">
    <div class="feedback-icon" id="feedbackIcon">✅</div>
    <div class="feedback-title" id="feedbackTitle">预订成功！</div>
    <div class="feedback-message" id="feedbackMessage"></div>
    <button class="feedback-btn" id="feedbackBtn">继续 →</button>
  </div>
</div>

<!-- Practice Container -->
<div class="practice-container hidden" id="practiceContainer">
  <div class="practice-badge-bar">
    <span class="practice-badge" id="practiceBadge">📝 巩固练习</span>
    <span class="practice-progress-text" id="practiceProgress">第 1/5 题</span>
  </div>
  <div class="practice-question-card">
    <div class="practice-q-num" id="practiceQNum">第 1 题</div>
    <div class="practice-q-title" id="practiceQTitle">题目内容</div>
    <div id="practiceQContent"></div>
  </div>
  <div class="practice-feedback" id="practiceFeedback"></div>
  <div class="practice-nav">
    <button class="practice-nav-btn secondary hidden" id="practiceSkipBtn">跳过</button>
    <button class="practice-nav-btn primary" id="practiceNextBtn">下一题 →</button>
  </div>
</div>

<script>
// ============================================
// DOM References
// ============================================
const $ = (sel) => document.querySelector(sel);
const gameContainer = $('#gameContainer');
const gameTitle = $('#gameTitle');
const scoreDisplay = $('#scoreDisplay');
const levelDisplay = $('#levelDisplay');
const levelLabel = $('#levelLabel');
const customerArea = $('#customerArea');
const customerAvatar = $('#customerAvatar');
const customerName = $('#customerName');
const customerRequest = $('#customerRequest');
const comboIndicator = $('#comboIndicator');
const gameArea = $('#gameArea');
const progressBar = $('#progressBar');
const restartBtn = $('#restartBtn');
const feedbackOverlay = $('#feedbackOverlay');
const feedbackIcon = $('#feedbackIcon');
const feedbackTitle = $('#feedbackTitle');
const feedbackMessage = $('#feedbackMessage');
const feedbackBtn = $('#feedbackBtn');
const practiceContainer = $('#practiceContainer');
const practiceBadge = $('#practiceBadge');
const practiceProgress = $('#practiceProgress');
const practiceQNum = $('#practiceQNum');
const practiceQTitle = $('#practiceQTitle');
const practiceQContent = $('#practiceQContent');
const practiceFeedback = $('#practiceFeedback');
const practiceNextBtn = $('#practiceNextBtn');
const practiceSkipBtn = $('#practiceSkipBtn');

// ============================================
// Game State
// ============================================
const state = {
  score: 0,
  level: 1,
  totalLevels: 3,
  ordersPerLevel: 3,
  currentOrder: 0,
  totalOrders: 0,
  totalOrdersAll: 9,
  isAnswering: false,
  correctCount: 0,
  totalAttempts: 0,
  comboCount: 0,
  mode: 'game',
  practiceTier: 1,
  practiceIndex: 0,
  practiceCorrect: 0,
};

// Helper functions
const BIG_MONTHS = [1,3,5,7,8,10,12];
const SMALL_MONTHS = [4,6,9,11];

function isLeapYear(y) {
  if (y % 400 === 0) return true;
  if (y % 100 === 0) return false;
  return y % 4 === 0;
}

function getDaysInMonth(y, m) {
  if (m === 2) return isLeapYear(y) ? 29 : 28;
  return BIG_MONTHS.includes(m) ? 31 : 30;
}

function updateScore(points) { state.score += points; scoreDisplay.textContent = state.score; }
function updateLevel(level) { state.level = level; levelDisplay.textContent = `${level}/${state.totalLevels}`; }
function updateProgress(current, total) {
  progressBar.style.width = total > 0 ? `${Math.round((current / total) * 100)}%` : '0%';
}
function showFeedback(type, title, msg, cb) {
  feedbackIcon.textContent = type === 'correct' ? '✅' : type === 'hint' ? '💡' : '❌';
  feedbackTitle.textContent = title;
  feedbackTitle.style.color = type === 'correct' ? 'var(--color-success)' : type === 'hint' ? 'var(--color-warning)' : 'var(--color-error)';
  feedbackMessage.textContent = msg;
  feedbackOverlay.classList.remove('hidden');
  feedbackBtn.onclick = () => { feedbackOverlay.classList.add('hidden'); if (cb) cb(); };
}

// ============================================
// Calendar Rendering
// ============================================
function renderCalendarHTML(year, month, clickable) {
  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = getDaysInMonth(year, month);
  const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
  let html = '<div class="calendar-wrapper">';
  html += `<div class="calendar-title">📅 ${year}年${month}月</div>`;
  html += '<table class="calendar-table"><thead><tr>';
  dayNames.forEach((d, i) => {
    html += `<th class="${(i===0||i===6)?'weekend':''}">${d}</th>`;
  });
  html += '</tr></thead><tbody>';
  let day = 1;
  for (let row = 0; row < 6; row++) {
    html += '<tr>';
    for (let col = 0; col < 7; col++) {
      if (row === 0 && col < firstDay) {
        html += '<td></td>';
      } else if (day > daysInMonth) {
        html += '<td></td>';
      } else {
        const cls = clickable ? 'cal-day' : 'cal-day disabled';
        html += `<td><div class="${cls}" data-day="${day}">${day}</div></td>`;
        day++;
      }
    }
    html += '</tr>';
    if (day > daysInMonth) break;
  }
  html += '</tbody></table></div>';
  return html;
}

let currentCalendarYear = null;
let currentCalendarMonth = null;

function renderOrder() {
  const lvlOrders = orders[state.level];
  if (!lvlOrders || state.currentOrder >= lvlOrders.length) {
    if (state.level >= state.totalLevels) {
      showVictory();
    } else {
      state.currentOrder = 0;
      updateLevel(state.level + 1);
      levelLabel.textContent = levelLabels[state.level];
      renderOrder();
    }
    return;
  }

  const order = lvlOrders[state.currentOrder];
  state.isAnswering = false;
  state.totalOrders = (state.level - 1) * state.ordersPerLevel + state.currentOrder;
  updateProgress(state.totalOrders, state.totalOrdersAll);

  // Update customer dialog
  customerAvatar.textContent = order.animal;
  customerName.textContent = order.name;
  customerRequest.innerHTML = order.request;
  comboIndicator.textContent = '';

  // Render game area based on order type
  if (order.type === 'monthSelect') {
    renderMonthSelect(order);
  } else if (order.type === 'calendar') {
    renderCalendarOrder(order);
  } else if (order.type === 'timeInput') {
    renderTimeInput(order);
  }
}

function renderMonthSelect(order) {
  currentCalendarYear = null;
  currentCalendarMonth = null;

  gameArea.innerHTML = `
    <div style="text-align:center;font-size:14px;color:var(--color-text-light);margin-bottom:10px;">
      👆 点击一个月份来预订行程
    </div>
    <div class="months-grid"></div>`;

  const grid = gameArea.querySelector('.months-grid');
  for (let m = 1; m <= 12; m++) {
    const btn = document.createElement('button');
    btn.className = 'month-btn';
    btn.textContent = `${m}月`;
    btn.setAttribute('data-month', m);
    btn.addEventListener('click', () => handleMonthSelect(m, order));
    grid.appendChild(btn);
  }
}

function handleMonthSelect(selectedMonth, order) {
  if (state.isAnswering) return;
  state.isAnswering = true;
  state.totalAttempts++;

  const buttons = gameArea.querySelectorAll('.month-btn');
  const isCorrect = order.correctFn(selectedMonth);

  // Disable all buttons
  buttons.forEach(b => b.disabled = true);

  if (isCorrect) {
    buttons.forEach(b => {
      if (parseInt(b.getAttribute('data-month')) === selectedMonth) {
        b.classList.add('correct');
      }
    });
    state.correctCount++;
    state.comboCount++;
    let bonus = 10;
    if (state.comboCount >= 3) bonus += 5;
    updateScore(bonus);
    state.currentOrder++;
    updateComboIndicator();
    setTimeout(() => {
      showFeedback('correct', '✅ 预订成功！',
        `正确！${order.correctHint}\n金币 +${bonus} 💰${state.comboCount>=3?' 连击奖励+5！':''}`,
        () => renderOrder());
    }, 400);
  } else {
    buttons.forEach(b => {
      const m = parseInt(b.getAttribute('data-month'));
      if (m === selectedMonth) b.classList.add('incorrect');
      if (order.allCorrect.includes(m)) b.classList.add('highlight-correct');
    });
    state.comboCount = 0;
    state.currentOrder++;
    updateComboIndicator();
    setTimeout(() => {
      showFeedback('hint', '🤔 再想想吧',
        order.failHint, () => renderOrder());
    }, 600);
  }
}

function renderCalendarOrder(order) {
  currentCalendarYear = order.year;
  currentCalendarMonth = order.month;

  gameArea.innerHTML = renderCalendarHTML(order.year, order.month, true);

  const days = gameArea.querySelectorAll('.cal-day');

function handleCalendarClick(clickedDay, order) {
  if (state.isAnswering) return;
  state.isAnswering = true;
  state.totalAttempts++;

  const days = gameArea.querySelectorAll('.cal-day');
  const isCorrect = clickedDay === order.correctDay;

  days.forEach(d => d.classList.add('disabled'));

  if (isCorrect) {
    days.forEach(d => {
      if (parseInt(d.getAttribute('data-day')) === clickedDay) d.classList.add('correct');

    state.correctCount++;
    state.comboCount++;
    let bonus = 10;
    if (state.comboCount >= 3) bonus += 5;
    updateScore(bonus);
    state.currentOrder++;
    updateComboIndicator();

        () => renderOrder());
    }, 400);
  } else {
    days.forEach(d => {
      const dday = parseInt(d.getAttribute('data-day'));

function renderTimeInput(order) {
  currentCalendarYear = null;

  gameArea.innerHTML = `
    <div class="time-input-area">

      <div class="time-hint">💡 提示：下午的时间 = 时刻 + 12</div>
    </div>`;

  const input = $('#timeInput');
  const submitBtn = $('#timeSubmitBtn');

  input.focus();
  submitBtn.addEventListener('click', () => handleTimeSubmit(order));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleTimeSubmit(order);
  });
}

function handleTimeSubmit(order) {
  if (state.isAnswering) return;
  const input = $('#timeInput');
  if (!input) return;

  state.isAnswering = true;
  state.totalAttempts++;

  const userAnswer = input.value.trim();
  const isCorrect = userAnswer === order.correctAnswer;

  const submitBtn = $('#timeSubmitBtn');
  if (submitBtn) submitBtn.disabled = true;
  if (input) input.disabled = true;

  if (isCorrect) {
    state.correctCount++;
    state.comboCount++;
    let bonus = 10;
    if (state.comboCount >= 3) bonus += 5;
    updateScore(bonus);
    state.currentOrder++;
    updateComboIndicator();
    setTimeout(() => {
      showFeedback('correct', '✅ 预订成功！',
        `正确！${order.correctHint}\n金币 +${bonus} 💰${state.comboCount>=3?' 连击奖励+5！':''}`,
        () => renderOrder());
    }, 400);
  } else {
    state.comboCount = 0;
    state.currentOrder++;
    updateComboIndicator();
    setTimeout(() => {
      showFeedback('hint', '🤔 再想想吧',
        order.failHint, () => renderOrder());
    }, 600);
  }
}

function updateComboIndicator() {
  if (state.comboCount >= 5) {
    comboIndicator.innerHTML = '<span class="combo-fire">🔥 超级连击 x' + state.comboCount + '!</span>';
  } else if (state.comboCount >= 3) {
    comboIndicator.innerHTML = '⚡ 连击 x' + state.comboCount + '!';
  } else if (state.comboCount > 0) {
    comboIndicator.textContent = '👍 做得好！';
  } else {
    comboIndicator.textContent = '';
  }
}

function determinePracticeTier() {
  const accuracy = state.totalAttempts > 0 ? state.correctCount / state.totalAttempts : 0;
  if (accuracy < 0.4) return 1;
  if (accuracy < 0.6) return 2;
  if (accuracy < 0.8) return 3;
  if (accuracy < 0.95) return 4;
  return 5;
}

function enterPracticeMode() {
  state.practiceTier = determinePracticeTier();
  state.mode = 'practice';
  state.practiceIndex = 0;
  state.practiceCorrect = 0;

  gameContainer.classList.add('hidden');
  practiceContainer.classList.remove('hidden');
  practiceContainer.style.display = 'flex';

  const tier = difficultyLabels[state.practiceTier];
  practiceBadge.innerHTML = `${tier.icon} ${tier.name}`;
  practiceBadge.className = `practice-badge ${tier.badgeClass}`;

  practiceNextBtn.textContent = '开始答题 →';
  practiceNextBtn.classList.remove('hidden');
  practiceNextBtn.disabled = false;
  renderPracticeQuestion();
}

function renderPracticeQuestion() {
  const problems = practiceProblems[state.practiceTier];
  if (!problems || state.practiceIndex >= problems.length) {
    showPracticeSummary();
    return;
  }
  const p = problems[state.practiceIndex];
  const total = problems.length;
  practiceProgress.textContent = `第 ${state.practiceIndex + 1}/${total} 题`;
  practiceQNum.textContent = `第 ${state.practiceIndex + 1} 题`;
  practiceQTitle.textContent = p.q;
  practiceFeedback.classList.remove('show', 'correct', 'wrong');
  practiceFeedback.textContent = '';

  if (p.type === 'fill') {
    practiceQContent.innerHTML = `
      <div class="practice-input-area">
        <input type="text" class="practice-input" id="practiceInput" placeholder="输入答案" inputmode="text">
        <button class="submit-btn" id="practiceSubmitBtn">确认</button>
      </div>`;
    $('#practiceSubmitBtn').addEventListener('click', handlePracticeSubmit);
    $('#practiceInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') handlePracticeSubmit(); });
    $('#practiceInput').focus();
  } else {
    practiceQContent.innerHTML = '<div class="practice-options"></div>';
    const opts = practiceQContent.querySelector('.practice-options');
    p.options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'practice-option';
      btn.textContent = opt;
      btn.addEventListener('click', () => handlePracticeChoice(idx, p.answer, p.options[p.answer]));
      opts.appendChild(btn);
    });
  }
  practiceNextBtn.textContent = state.practiceIndex < problems.length - 1 ? '下一题 →' : '查看结果 📊';
  practiceNextBtn.disabled = true;
}

function handlePracticeChoice(selected, correctIdx, correctText) {
  const options = practiceQContent.querySelectorAll('.practice-option');
  options.forEach(o => o.disabled = true);
  if (selected === correctIdx) {
    options[selected].classList.add('selected-correct');
    state.practiceCorrect++;
    practiceFeedback.textContent = `✅ 正确！${correctText}`;
    practiceFeedback.className = 'practice-feedback show correct';
  } else {
    options[selected].classList.add('selected-wrong');
    options[correctIdx].classList.add('show-correct');
    practiceFeedback.textContent = `❌ 正确答案是 ${correctText}。加油！`;
    practiceFeedback.className = 'practice-feedback show wrong';
  }
  practiceNextBtn.disabled = false;
}

function handlePracticeSubmit() {
  const input = $('#practiceInput');
  const btn = $('#practiceSubmitBtn');
  if (!input || btn.disabled) return;
  const problems = practiceProblems[state.practiceTier];
  const p = problems[state.practiceIndex];
  const userAnswer = input.value.trim();
  btn.disabled = true;
  input.disabled = true;
  if (userAnswer === p.answer) {
    state.practiceCorrect++;
    practiceFeedback.textContent = `✅ 正确！答案就是 ${p.answer}`;
    practiceFeedback.className = 'practice-feedback show correct';
  } else {
    practiceFeedback.textContent = `❌ 正确答案是 ${p.answer}。${p.hint || ''}`;
    practiceFeedback.className = 'practice-feedback show wrong';
  }
  practiceNextBtn.disabled = false;
}

function handlePracticeNext() {
  const problems = practiceProblems[state.practiceTier];
  if (state.practiceIndex >= problems.length - 1) {
    showPracticeSummary();
    return;
  }
  state.practiceIndex++;
  renderPracticeQuestion();
}

function showPracticeSummary() {
  const problems = practiceProblems[state.practiceTier];
  const total = problems ? problems.length : 0;
  const pct = total > 0 ? Math.round((state.practiceCorrect / total) * 100) : 0;
  let emoji, color;
  if (pct >= 80) { emoji = '🌟'; color = 'var(--color-success)'; }
  else if (pct >= 60) { emoji = '👍'; color = 'var(--color-primary)'; }
  else { emoji = '💪'; color = 'var(--color-warning)'; }

  gameContainer.classList.remove('hidden');
  practiceContainer.classList.add('hidden');
  practiceContainer.style.display = 'none';
  customerArea.style.display = 'none';

  gameArea.innerHTML = `
    <div class="practice-summary">
      <div class="practice-summary-icon">${emoji}</div>
      <div class="practice-summary-title">练习完成！</div>
      <div class="practice-summary-score" style="color:${color}">${state.practiceCorrect}/${total}</div>
      <div class="practice-summary-detail">
        <div>📊 练习正确率：${pct}%</div>
        <div>🎮 游戏得分：${state.score} 分</div>
        ${pct >= 80 ? '<div>🏆 太棒了，你对年月日掌握得很好！</div>' :
          pct >= 60 ? '<div>📚 还不错，继续加油会更好！</div>' :
          '<div>🌱 没关系，多练习几次就能进步！</div>'}
      </div>
      <button class="victory-btn" onclick="restartGame()">🔄 再玩一次</button>
    </div>`;
}

practiceNextBtn.addEventListener('click', handlePracticeNext);

// ============================================
// Restart
// ============================================
function restartGame() {
  state.mode = 'game';
  gameContainer.classList.remove('hidden');
  practiceContainer.classList.add('hidden');
  practiceContainer.style.display = 'none';
  customerArea.style.display = 'flex';

  state.score = 0;
  state.level = 1;
  state.currentOrder = 0;
  state.totalOrders = 0;
  state.correctCount = 0;
  state.totalAttempts = 0;
  state.comboCount = 0;
  state.isAnswering = false;

  updateScore(0);
  updateLevel(1);
  levelLabel.textContent = levelLabels[1];
  updateProgress(0, state.totalOrdersAll);
  comboIndicator.textContent = '';
  renderOrder();
}

// ============================================
// Init
// ============================================
restartBtn.addEventListener('click', restartGame);
gameTitle.textContent = '🧳 时间旅行社';
updateProgress(0, state.totalOrdersAll);
restartGame();
</script>

</body>
