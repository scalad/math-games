<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>砸金蛋识数字 — 1~5数字认识</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(180deg, #FFF8DC 0%, #FFE4B5 40%, #FFD700 70%, #FFA000 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 10px;
  overflow-x: hidden;
}

.game-container {
  width: 100%;
  max-width: 700px;
  background: linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(255,248,220,0.9) 100%);
  border-radius: 24px;
  box-shadow: 0 8px 40px rgba(200,150,0,0.3), 0 0 0 4px #FFD700, 0 0 0 8px #FFA000;
  padding: 20px 15px 30px;
  margin-top: 10px;
  position: relative;
  overflow: hidden;
}

/* ===== Header ===== */
.game-header {
  text-align: center;
  padding: 16px 20px;
  margin: -20px -15px 20px;
  background: linear-gradient(135deg, #FFD700 0%, #FFA000 50%, #FFD700 100%);
  border-radius: 20px 20px 12px 12px;
  position: relative;
  overflow: hidden;
}
.game-header::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 60%);
  animation: headerShine 3s ease-in-out infinite;
}
@keyframes headerShine {
  0%, 100% { transform: translate(-30%, -30%); }
  50% { transform: translate(30%, 30%); }
}
.game-header h1 {
  font-size: 28px;
  color: #5D3A00;
  text-shadow: 2px 2px 4px rgba(255,255,255,0.6), 0 0 10px rgba(255,215,0,0.6);
  position: relative;
  z-index: 1;
  letter-spacing: 3px;
}
.game-header p {
  font-size: 14px;
  color: #6B3A00;
  position: relative;
  z-index: 1;
  margin-top: 4px;
  font-weight: bold;
}

/* ===== Score Bar ===== */
.score-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  padding: 12px;
  background: linear-gradient(135deg, #FFF5E0, #FFE8B0);
  border-radius: 16px;
  margin-bottom: 20px;
  border: 2px solid #FFD700;
}
.score-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 18px;
  font-weight: bold;
  color: #5D3A00;
}
.score-item .icon { font-size: 22px; }
.score-value {
  background: #FFD700;
  color: #5D3A00;
  padding: 4px 14px;
  border-radius: 12px;
  font-size: 20px;
  min-width: 44px;
  text-align: center;
}

/* ===== Stars Collection ===== */
.stars-pool {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-bottom: 16px;
  min-height: 36px;
  flex-wrap: wrap;
}
.stars-pool .star-earned {
  font-size: 28px;
  animation: starPop 0.5s ease-out;
}
@keyframes starPop {
  0% { transform: scale(0) rotate(-30deg); opacity: 0; }
  60% { transform: scale(1.4) rotate(10deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* ===== Eggs Row ===== */
.eggs-row {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 16px;
  padding: 20px 10px;
  flex-wrap: wrap;
}

.egg-wrapper {
  position: relative;
  cursor: pointer;
  transition: transform 0.3s;
}
.egg-wrapper:hover { transform: translateY(-6px); }
.egg-wrapper.smashed { cursor: default; pointer-events: none; }
.egg-wrapper.active { cursor: pointer; }

.egg {
  width: 80px;
  height: 100px;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  background: radial-gradient(ellipse at 50% 30%, #FFF8C0 0%, #FFD700 40%, #FFA000 100%);
  box-shadow:
    0 0 20px rgba(255,215,0,0.8),
    0 0 40px rgba(255,215,0,0.4),
    0 6px 20px rgba(100,60,0,0.4),
    inset 0 -10px 20px rgba(0,0,0,0.1);
  position: relative;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.egg::after {
  content: '';
  position: absolute;
  top: 10%; left: 25%;
  width: 20px; height: 30px;
  background: radial-gradient(ellipse, rgba(255,255,255,0.8) 0%, transparent 70%);
  border-radius: 50%;
  transform: rotate(-20deg);
}
.egg-number {
  font-size: 32px;
  font-weight: bold;
  color: #5D3A00;
  text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
  z-index: 1;
  font-family: Georgia, serif;
}

/* Sparkle particles */
.sparkle {
  position: absolute;
  width: 6px; height: 6px;
  background: #FFF;
  border-radius: 50%;
  pointer-events: none;
  animation: sparkleFloat 1.5s ease-in-out infinite;
}
.sparkle:nth-child(2) { animation-delay: 0.3s; left: 20%; top: 10%; }
.sparkle:nth-child(3) { animation-delay: 0.6s; left: 70%; top: 15%; }
.sparkle:nth-child(4) { animation-delay: 0.9s; left: 40%; top: 80%; }
.sparkle:nth-child(5) { animation-delay: 1.2s; left: 60%; top: 75%; }
.sparkle:nth-child(6) { animation-delay: 0.15s; left: 80%; top: 30%; }
.sparkle:nth-child(7) { animation-delay: 0.75s; left: 10%; top: 50%; }

@keyframes sparkleFloat {
  0%, 100% { transform: scale(0) translateY(0); opacity: 0; }
  20% { transform: scale(1) translateY(-6px); opacity: 1; }
  60% { transform: scale(0.4) translateY(-12px); opacity: 0.6; }
  80% { transform: scale(0) translateY(-8px); opacity: 0; }
}

/* Smashed egg */
.egg-wrapper.smashed .egg {
  background: radial-gradient(ellipse at 50% 30%, #E0D0A0 0%, #C0A050 100%);
  box-shadow: 0 2px 8px rgba(100,60,0,0.3);
  transform: scale(0.7);
  opacity: 0.5;
  animation: eggCrack 0.5s ease-out;
}
@keyframes eggCrack {
  0% { transform: scale(1); }
  30% { transform: scale(1.2); }
  60% { transform: scale(0.6); opacity: 0.7; }
  100% { transform: scale(0.7); opacity: 0.5; }
}

.egg-shards {
  position: absolute;
  pointer-events: none;
  z-index: 10;
}
.shard {
  position: absolute;
  width: 12px; height: 16px;
  background: linear-gradient(135deg, #FFD700, #FFA000);
  border-radius: 3px;
  animation: shardFly 0.6s ease-out forwards;
}
@keyframes shardFly {
  0% { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0); opacity: 0; }
}

/* ===== Question Panel ===== */
.question-panel {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.3s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.question-card {
  background: linear-gradient(135deg, #FFFDF0, #FFF8DC);
  border-radius: 20px;
  padding: 24px 20px;
  max-width: 420px;
  width: 90%;
  box-shadow: 0 12px 48px rgba(0,0,0,0.3), 0 0 0 3px #FFD700;
  animation: cardSlideUp 0.4s ease-out;
  position: relative;
}
@keyframes cardSlideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.question-card .egg-label {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  color: #FFA000;
  margin-bottom: 8px;
}
.question-card .question-text {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  color: #5D3A00;
  margin-bottom: 20px;
  line-height: 1.5;
}
.question-card .hint-text {
  text-align: center;
  font-size: 14px;
  color: #999;
  margin-bottom: 12px;
  font-style: italic;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.option-btn {
  padding: 14px 10px;
  border: 3px solid #FFD700;
  border-radius: 14px;
  background: #FFF;
  font-size: 20px;
  font-weight: bold;
  color: #5D3A00;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.option-btn:hover {
  background: #FFF8DC;
  transform: scale(1.03);
  border-color: #FFA000;
}
.option-btn:active {
  transform: scale(0.96);
}

.feedback-overlay {
  text-align: center;
  padding: 20px;
}
.feedback-overlay .feed-icon {
  font-size: 60px;
  margin-bottom: 10px;
}
.feedback-overlay .feed-text {
  font-size: 22px;
  font-weight: bold;
}
.feedback-overlay.correct .feed-text { color: #FFA000; }
.feedback-overlay.wrong .feed-text { color: #C0392B; }
.feedback-overlay .correct-answer {
  margin-top: 8px;
  font-size: 16px;
  color: #666;
}

.continue-btn {
  display: block;
  margin: 16px auto 0;
  padding: 12px 40px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(135deg, #FFD700, #FFA000);
  color: #5D3A00;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(200,150,0,0.4);
  transition: transform 0.2s;
}
.continue-btn:hover { transform: scale(1.05); }
.continue-btn:active { transform: scale(0.95); }

/* ===== Summary ===== */
.summary-panel {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.summary-card {
  background: linear-gradient(135deg, #FFFDF0, #FFF8DC);
  border-radius: 20px;
  padding: 28px 20px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  box-shadow: 0 12px 48px rgba(0,0,0,0.3), 0 0 0 3px #FFD700;
  animation: cardSlideUp 0.4s ease-out;
}

.summary-card .summary-title {
  font-size: 28px;
  color: #FFA000;
  margin-bottom: 8px;
}
.summary-card .summary-badge {
  font-size: 60px;
  margin: 10px 0;
  animation: starPop 0.8s ease-out;
}
.summary-card .summary-score {
  font-size: 24px;
  color: #5D3A00;
  margin: 8px 0;
}
.summary-card .summary-title-text {
  font-size: 22px;
  font-weight: bold;
  color: #FFA000;
  margin: 8px 0;
  padding: 8px 20px;
  background: #FFF8DC;
  border-radius: 12px;
  display: inline-block;
  border: 2px dashed #FFD700;
}
.summary-card .summary-detail {
  font-size: 16px;
  color: #666;
  margin: 4px 0;
}

/* ===== Practice Panel ===== */
.practice-panel {
  margin-top: 20px;
  padding: 16px;
  background: linear-gradient(135deg, #F0FFF0, #E8FFE0);
  border-radius: 16px;
  border: 2px solid #8BC34A;
  text-align: center;
}
.practice-panel h3 {
  color: #4CAF50;
  font-size: 20px;
  margin-bottom: 8px;
}
.practice-panel .practice-subtitle {
  font-size: 14px;
  color: #666;
  margin-bottom: 12px;
}

.practice-question {
  background: #FFF;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.practice-question .pq-text {
  font-size: 20px;
  font-weight: bold;
  color: #5D3A00;
  margin-bottom: 12px;
}

.practice-question .pq-hint {
  font-size: 13px;
  color: #999;
  margin-bottom: 8px;
  font-style: italic;
}

.practice-question .fill-input {
  width: 120px;
  padding: 10px;
  font-size: 20px;
  text-align: center;
  border: 3px solid #FFD700;
  border-radius: 10px;
  outline: none;
}
.practice-question .fill-input:focus {
  border-color: #FFA000;
}

.practice-question .submit-answer-btn {
  margin-top: 8px;
  padding: 8px 24px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #4CAF50, #66BB6A);
  color: #FFF;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s;
}
.practice-question .submit-answer-btn:hover { transform: scale(1.05); }

.practice-nav {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.practice-nav-btn {
  padding: 8px 16px;
  border: 2px solid #8BC34A;
  border-radius: 10px;
  background: #FFF;
  color: #4CAF50;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.practice-nav-btn:hover { background: #E8FFE0; }
.practice-nav-btn.active {
  background: #4CAF50;
  color: #FFF;
}

.practice-feedback {
  margin-top: 8px;
  font-weight: bold;
  font-size: 16px;
  min-height: 24px;
}

/* ===== Confetti ===== */
.confetti {
  position: fixed;
  pointer-events: none;
  z-index: 300;
}
.confetti-piece {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 2px;
  animation: confettiFall 2s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(600px) rotate(720deg); opacity: 0; }
}

/* Responsive */
@media (max-width: 500px) {
  .egg { width: 55px; height: 70px; }
  .egg-number { font-size: 24px; }
  .eggs-row { gap: 10px; }
  .option-btn { font-size: 16px; padding: 10px 6px; }
  .question-card .question-text { font-size: 18px; }
  .game-header h1 { font-size: 22px; }
}

/* 隐藏 */
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="game-container" id="gameContainer">
  <!-- Header -->
  <div class="game-header">
    <h1>🔨 砸金蛋识数字 🥚</h1>
    <p>敲开金蛋，认识数字 1 ~ 5</p>
  </div>

  <!-- Score Bar -->
  <div class="score-bar">
    <div class="score-item">
      <span class="icon">⭐</span>
      <span>得分:</span>
      <span class="score-value" id="scoreDisplay">0</span>
    </div>
    <div class="score-item">
      <span class="icon">🎯</span>
      <span>进度:</span>
      <span class="score-value" id="progressDisplay">0/5</span>
    </div>
  </div>

  <!-- Stars Pool -->
  <div class="stars-pool" id="starsPool"></div>

  <!-- Eggs Row -->
  <div class="eggs-row" id="eggsRow"></div>

  <!-- Practice Panel (initially hidden) -->
  <div class="practice-panel hidden" id="practicePanel">
    <h3>📚 自适应练习</h3>
    <p class="practice-subtitle" id="practicePrompt"></p>
    <div class="practice-nav" id="practiceNav"></div>
    <div id="practiceContent"></div>
    <div class="practice-feedback" id="practiceFeedback"></div>
  </div>
</div>

<!-- Question Modal (dynamically inserted) -->
<div id="questionModal"></div>

<!-- Summary Modal (dynamically inserted) -->
<div id="summaryModal"></div>

<script>
// ===== 游戏数据 =====
const totalLevels = 1;
const questionsPerLevel = 5;

// 5道固定题目
const goldenEggQuestions = [
  {
    id: 1,
    eggLabel: '金蛋 ①',
    q: '哪个是数字 3？',
    type: 'choice',
    options: ['1', '2', '3', '4'],
    answer: 2,
    hint: '3 像耳朵，两个半圆叠起来'
  },
  {
    id: 2,
    eggLabel: '金蛋 ②',
    q: '图上有几个苹果？🍎🍎🍎',
    type: 'choice',
    options: ['1个', '2个', '3个', '4个'],
    answer: 2,
    hint: '用手指点数：1-2-3，一共3个'
  },
  {
    id: 3,
    eggLabel: '金蛋 ③',
    q: '●●●● 表示数字几？',
    type: 'choice',
    options: ['2', '3', '4', '5'],
    answer: 2,
    hint: '数一数：1-2-3-4，4个点=数字4'
  },
  {
    id: 4,
    eggLabel: '金蛋 ④',
    q: '哪组是5个？',
    type: 'choice',
    options: ['🐤🐤🐤', '🐤🐤🐤🐤🐤', '🐤🐤', '🐤🐤🐤🐤'],
    answer: 1,
    hint: '数一数每组小鸡的数量'
  },
  {
    id: 5,
    eggLabel: '金蛋 ⑤',
    q: "数字'三'等于几？",
    type: 'choice',
    options: ['1', '2', '3', '4'],
    answer: 2,
    hint: '一、二、三、四、五 —— 三对应的数字'
  }
];

// 自适应练习题目池
const practiceProblems = {
  1: [
    { type: 'choice', q: '下面哪个是数字 3？', options: ['1', '2', '3', '4'], answer: 2, hint: '3 像耳朵，两个半圆叠起来' },
    { type: 'choice', q: '图上有几个苹果？🍎🍎🍎', options: ['1个', '2个', '3个', '4个'], answer: 2, hint: '用手指点数：1-2-3，一共3个' },
    { type: 'choice', q: '数字 5 表示有几个？', options: ['3个', '4个', '5个', '6个'], answer: 2, hint: '伸出5根手指看看' },
  ],
  2: [
    { type: 'choice', q: '●●●● 表示数字几？', options: ['2', '3', '4', '5'], answer: 2, hint: '数一数：1-2-3-4，4个点=数字4' },
    { type: 'choice', q: '数字 2 的前面是几？', options: ['0', '1', '3', '4'], answer: 1, hint: '1→2→3→4→5，2前面是1' },
    { type: 'fill', q: '🐤🐤🐤🐤🐤 一共有多少只小鸡？', answer: '5', hint: '点数：1-2-3-4-5，一共5只' },
  ],
  3: [
    { type: 'choice', q: '比 3 大、比 5 小的数是几？', options: ['2', '3', '4', '5'], answer: 2, hint: '在3和5中间的是4' },
    { type: 'choice', q: '小兔子有3根🥕，妈妈又给了1根，现在有几根？', options: ['2根', '3根', '4根', '5根'], answer: 2, hint: '3添上1是4' },
    { type: 'fill', q: '3 添上 1 是几？', answer: '4', hint: '3根小棒+1根=4根' },
  ],
  4: [
    { type: 'choice', q: '下面哪组物品的数量是 4？', options: ['🍎🍎🍎', '🍎🍎🍎🍎', '🍎🍎🍎🍎🍎', '🍎🍎'], answer: 1, hint: '数每组：3, 4✓, 5, 2' },
    { type: 'choice', q: '按顺序：1、2、__、4、5，空格填几？', options: ['1', '2', '3', '5'], answer: 2, hint: '1-2-3-4-5，缺3' },
    { type: 'fill', q: '数字 5 比数字 2 多几个？', answer: '3', hint: '5-2=3' },
  ],
  5: [
    { type: 'choice', q: '数字 4 可以由哪两个数组成？', options: ['1和3', '2和2', '1和1', '1和3或2和2都对'], answer: 3, hint: '1+3=4和2+2=4都正确' },
    { type: 'fill', q: '1~5中比3大的数有哪些？（如"4,5"）', answer: '4,5', hint: '比3大的：4和5' },
    { type: 'choice', q: '苹果比橙子多2个，橙子1个，苹果几个？', options: ['1个', '2个', '3个', '4个'], answer: 2, hint: '1+2=3个' },
  ],
};

// ===== 游戏状态 =====
let gameState = {
  score: 0,
  answered: 0,
  correct: 0,
  currentQuestionIndex: null,
  eggsSmashed: [],
  practiceResults: {},
};

const POINTS_PER_Q = 20;
const BONUS_ALL_CORRECT = 50;

// ===== DOM 引用 =====
const $eggsRow = document.getElementById('eggsRow');
const $scoreDisplay = document.getElementById('scoreDisplay');
const $progressDisplay = document.getElementById('progressDisplay');
const $starsPool = document.getElementById('starsPool');
const $questionModal = document.getElementById('questionModal');
const $summaryModal = document.getElementById('summaryModal');
const $practicePanel = document.getElementById('practicePanel');
const $practicePrompt = document.getElementById('practicePrompt');
const $practiceNav = document.getElementById('practiceNav');
const $practiceContent = document.getElementById('practiceContent');
const $practiceFeedback = document.getElementById('practiceFeedback');

// ===== 初始化 =====
function initGame() {
  gameState.score = 0;
  gameState.answered = 0;
  gameState.correct = 0;
  gameState.currentQuestionIndex = null;
  gameState.eggsSmashed = [];
  gameState.practiceResults = {};

  $scoreDisplay.textContent = '0';
  $progressDisplay.textContent = '0/5';
  $starsPool.innerHTML = '';
  $questionModal.innerHTML = '';
  $summaryModal.innerHTML = '';
  $practicePanel.classList.add('hidden');
  $practiceNav.innerHTML = '';
  $practiceContent.innerHTML = '';
  $practiceFeedback.textContent = '';

  renderEggs();
}

// ===== 渲染金蛋 =====
function renderEggs() {
  $eggsRow.innerHTML = '';
  for (let i = 0; i < goldenEggQuestions.length; i++) {
    const wrapper = document.createElement('div');
    wrapper.className = 'egg-wrapper' + (gameState.eggsSmashed.includes(i) ? ' smashed' : '');
    wrapper.innerHTML = `
      <div class="egg">
        <span class="egg-number">${goldenEggQuestions[i].eggLabel.replace('金蛋 ', '')}</span>
        ${!gameState.eggsSmashed.includes(i) ? `
        <div class="sparkle" style="top:8%;left:15%;"></div>
        <div class="sparkle" style="top:5%;left:75%;"></div>
        <div class="sparkle" style="top:85%;left:30%;"></div>
        <div class="sparkle" style="top:80%;left:65%;"></div>
        <div class="sparkle" style="top:20%;left:55%;"></div>
        <div class="sparkle" style="top:60%;left:12%;"></div>
        ` : ''}
      </div>
    `;
    if (!gameState.eggsSmashed.includes(i)) {
      wrapper.addEventListener('click', () => smashEgg(i));
    }
    $eggsRow.appendChild(wrapper);
  }
}

// ===== 砸蛋 =====
function smashEgg(index) {
  if (gameState.eggsSmashed.includes(index)) return;

  const wrapper = $eggsRow.children[index];

  // 碎片动画
  const shardsEl = document.createElement('div');
  shardsEl.className = 'egg-shards';
  const eggRect = wrapper.querySelector('.egg').getBoundingClientRect();
  shardsEl.style.left = eggRect.left + eggRect.width / 2 + 'px';
  shardsEl.style.top = eggRect.top + eggRect.height / 2 + 'px';
  shardsEl.style.position = 'fixed';

  for (let i = 0; i < 8; i++) {
    const shard = document.createElement('div');
    shard.className = 'shard';
    shard.style.setProperty('--x', (Math.random() * 120 - 60) + 'px');
    shard.style.setProperty('--y', (Math.random() * 80 - 40) + 'px');
    shard.style.setProperty('--r', (Math.random() * 360 - 180) + 'deg');
    shardsEl.appendChild(shard);
  }
  document.body.appendChild(shardsEl);
  setTimeout(() => shardsEl.remove(), 700);

  gameState.eggsSmashed.push(index);
  gameState.currentQuestionIndex = index;
  renderEggs();

  // 延迟显示题目
  setTimeout(() => showQuestion(index), 400);
}

// ===== 显示题目 =====
function showQuestion(index) {
  const question = goldenEggQuestions[index];
  $questionModal.innerHTML = `
    <div class="question-panel" id="questionPanel">
      <div class="question-card">
        <div class="egg-label">🥚 ${question.eggLabel}</div>
        <div class="question-text">${question.q}</div>
        ${question.hint ? `<div class="hint-text">💡 ${question.hint}</div>` : ''}
        <div class="options-grid" id="optionsGrid"></div>
      </div>
    </div>
  `;

  const $optionsGrid = document.getElementById('optionsGrid');
  question.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => checkAnswer(index, i));
    $optionsGrid.appendChild(btn);
  });
}

// ===== 检查答案 =====
function checkAnswer(questionIndex, selectedIndex) {
  const question = goldenEggQuestions[questionIndex];
  const isCorrect = selectedIndex === question.answer;
  const $panel = document.getElementById('questionPanel');

  if (isCorrect) {
    gameState.correct++;
    gameState.score += POINTS_PER_Q;
    addStar();

    $panel.innerHTML = `
      <div class="question-card">
        <div class="feedback-overlay correct">
          <div class="feed-icon">🎉</div>
          <div class="feed-text">答对了！+20分</div>
          <button class="continue-btn" onclick="afterAnswer()">继续敲蛋 🔨</button>
        </div>
      </div>
    `;
  } else {
    $panel.innerHTML = `
      <div class="question-card">
        <div class="feedback-overlay wrong">
          <div class="feed-icon">😅</div>
          <div class="feed-text">再想想哦~</div>
          <div class="correct-answer">正确答案是：<b>${question.options[question.answer]}</b></div>
          <button class="continue-btn" onclick="afterAnswer()">继续敲蛋 🔨</button>
        </div>
      </div>
    `;
  }

  gameState.answered++;
  $scoreDisplay.textContent = gameState.score;
  $progressDisplay.textContent = `${gameState.answered}/5`;
}

// ===== 添加星星 =====
function addStar() {
  const star = document.createElement('span');
  star.className = 'star-earned';
  star.textContent = '⭐';
  $starsPool.appendChild(star);
}

// ===== 答题后处理 =====
function afterAnswer() {
  $questionModal.innerHTML = '';

  if (gameState.answered >= goldenEggQuestions.length) {
    // 全部答完，显示总结
    showSummary();
  }
}

// ===== 显示总结 =====
function showSummary() {
  const allCorrect = gameState.correct === goldenEggQuestions.length;
  let bonusScore = 0;
  let titleText = '';

  if (allCorrect) {
    bonusScore = BONUS_ALL_CORRECT;
    gameState.score += bonusScore;
    titleText = '🏆 丰收小达人 🏆';
  } else {
    titleText = '继续加油哦！';
  }

  const starCount = gameState.correct;
  let starIcons = '';
  for (let i = 0; i < starCount; i++) starIcons += '⭐';
  if (starCount === 0) starIcons = '💪';

  $summaryModal.innerHTML = `
    <div class="summary-panel" id="summaryPanel">
      <div class="summary-card">
        <div class="summary-title">🎊 收获总结 🎊</div>
        <div class="summary-badge">${allCorrect ? '🏆' : (gameState.correct >= 3 ? '🎖️' : '📚')}</div>
        <div class="summary-score">
          得分：<b style="color:#FFA000;font-size:28px;">${gameState.score}</b> 分
        </div>
        <div class="summary-detail">
          答对 ${gameState.correct}/${goldenEggQuestions.length} 题
          ${allCorrect ? '（全对！额外奖励 +' + bonusScore + '分）' : ''}
        </div>
        <div class="summary-detail" style="font-size:24px;margin:8px 0;">${starIcons}</div>
        <div class="summary-title-text">${titleText}</div>
        <button class="continue-btn" style="margin-top:16px;" onclick="startPractice()">📚 自适应练习</button>
        <button class="continue-btn" style="margin-top:8px;background:linear-gradient(135deg,#FFC107,#FF9800);" onclick="resetGame()">🔄 再玩一次</button>
      </div>
    </div>
  `;

  if (allCorrect) {
    spawnConfetti();
  }
}

// ===== 彩纸特效 =====
function spawnConfetti() {
  const confetti = document.createElement('div');
  confetti.className = 'confetti';
  confetti.style.left = '0';
  confetti.style.top = '0';
  confetti.style.width = '100%';
  confetti.style.height = '100%';

  const colors = ['#FFD700', '#FFA000', '#FF5722', '#4CAF50', '#2196F3', '#E91E63'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = -(Math.random() * 200) + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 1.5 + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.width = (6 + Math.random() * 10) + 'px';
    piece.style.height = (6 + Math.random() * 10) + 'px';
    confetti.appendChild(piece);
  }
  document.body.appendChild(confetti);
  setTimeout(() => confetti.remove(), 4000);
}

// ===== 重置游戏 =====
function resetGame() {
  $summaryModal.innerHTML = '';
  $practicePanel.classList.add('hidden');
  initGame();
}

// ===== 自适应练习 =====
function startPractice() {
  $summaryModal.innerHTML = '';
  gameState.practiceResults = {};

  // 分析薄弱知识点：根据答题情况推荐
  const weakPoints = [];
  for (let i = 0; i < goldenEggQuestions.length; i++) {
    // 第i个蛋对应知识点 i+1
    // 简化：如果第i题答错，知识点i+1算薄弱
    if (!gameState.eggsSmashed.includes(i)) continue;
    const q = goldenEggQuestions[i];
    const pointsLevel = i + 1;
    // 判断是否薄弱：如果没答对或者随机挑选
    weakPoints.push({ level: pointsLevel, eggIndex: i });
  }

  // 至少推荐一些练习
  if (weakPoints.length === 0) {
    // 全对，随机挑2个知识点
    for (let i = 1; i <= 5; i++) {
      if (weakPoints.length < 3) weakPoints.push({ level: i, eggIndex: i - 1 });
    }
  }

  // 限制推荐3个知识点
  const recommended = weakPoints.slice(0, 3);

  $practicePanel.classList.remove('hidden');
  $practicePrompt.textContent = '根据你的答题情况，推荐以下练习来巩固知识：';

  // 导航按钮
  $practiceNav.innerHTML = '';
  recommended.forEach((item, idx) => {
    const btn = document.createElement('button');
    btn.className = 'practice-nav-btn' + (idx === 0 ? ' active' : '');
    btn.textContent = `知识点 ${item.level}`;
    btn.addEventListener('click', () => {
      $practiceNav.querySelectorAll('.practice-nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPracticeQuestion(item.level, idx);
    });
    $practiceNav.appendChild(btn);
  });

  // 默认显示第一个知识点
  if (recommended.length > 0) {
    renderPracticeQuestion(recommended[0].level, 0);
    $practicePanel.scrollIntoView({ behavior: 'smooth' });
  }
}

function renderPracticeQuestion(level, idx) {
  const problems = practiceProblems[level];
  if (!problems || problems.length === 0) {
    $practiceContent.innerHTML = '<p>暂无练习题目</p>';
    return;
  }

  // 随机选一题
  const problem = problems[Math.floor(Math.random() * problems.length)];
  $practiceFeedback.textContent = '';

  if (problem.type === 'choice') {
    $practiceContent.innerHTML = `
      <div class="practice-question">
        <div class="pq-text">🎯 ${problem.q}</div>
        ${problem.hint ? `<div class="pq-hint">💡 ${problem.hint}</div>` : ''}
        <div class="options-grid" id="practiceOptions"></div>
      </div>
    `;
    const $optGrid = document.getElementById('practiceOptions');
    problem.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => {
        if (i === problem.answer) {
          $practiceFeedback.innerHTML = '<span style="color:#4CAF50;">✅ 太棒了！回答正确！</span>';
          if (!gameState.practiceResults[level]) gameState.practiceResults[level] = { correct: 0, total: 0 };
          gameState.practiceResults[level].correct++;
          gameState.practiceResults[level].total++;
        } else {
          $practiceFeedback.innerHTML = `<span style="color:#C0392B;">❌ 答案是：${problem.options[problem.answer]}，再试试其他题吧</span>`;
          if (!gameState.practiceResults[level]) gameState.practiceResults[level] = { correct: 0, total: 0 };
          gameState.practiceResults[level].total++;
        }
        // 自动刷新题目
        setTimeout(() => renderPracticeQuestion(level, idx), 1200);
      });
      $optGrid.appendChild(btn);
    });
  } else if (problem.type === 'fill') {
    $practiceContent.innerHTML = `
      <div class="practice-question">
        <div class="pq-text">🎯 ${problem.q}</div>
        ${problem.hint ? `<div class="pq-hint">💡 ${problem.hint}</div>` : ''}
        <input type="text" class="fill-input" id="practiceFillInput" placeholder="输入答案" maxlength="10">
        <br>
        <button class="submit-answer-btn" id="practiceSubmitBtn">提交答案</button>
      </div>
    `;
    document.getElementById('practiceSubmitBtn').addEventListener('click', () => {
      const input = document.getElementById('practiceFillInput').value.trim();
      if (!input) {
        $practiceFeedback.innerHTML = '<span style="color:#999;">请输入答案</span>';
        return;
      }
      if (input === problem.answer || input === problem.answer.replace(/\s/g, '')) {
        $practiceFeedback.innerHTML = '<span style="color:#4CAF50;">✅ 太棒了！回答正确！</span>';
        if (!gameState.practiceResults[level]) gameState.practiceResults[level] = { correct: 0, total: 0 };
        gameState.practiceResults[level].correct++;
        gameState.practiceResults[level].total++;
      } else {
        $practiceFeedback.innerHTML = `<span style="color:#C0392B;">❌ 正确答案是：${problem.answer}</span>`;
        if (!gameState.practiceResults[level]) gameState.practiceResults[level] = { correct: 0, total: 0 };
        gameState.practiceResults[level].total++;
      }
      setTimeout(() => renderPracticeQuestion(level, idx), 1200);
    });
  }
}

// ===== 启动 =====
initGame();
</script>
</body>
</html>
