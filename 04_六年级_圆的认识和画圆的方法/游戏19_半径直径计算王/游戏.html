<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>半径直径计算王</title>
<style>
:root {
  --color-primary: #0277BD;
  --color-primary-light: #4FC3F7;
  --color-primary-dark: #01579B;
  --color-success: #43A047;
  --color-success-light: #E8F5E9;
  --color-error: #EF5350;
  --color-error-light: #FFEBEE;
  --color-warning: #FF9800;
  --color-warning-light: #FFF3E0;
  --color-bg: #E1F5FE;
  --color-card: #FFFFFF;
  --color-text: #263238;
  --color-text-light: #607D8B;
  --color-border: #B0BEC5;
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
  --font-family: "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:var(--font-family);background:var(--color-bg);color:var(--color-text);
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  padding:16px;-webkit-tap-highlight-color:transparent;
}
.game-container{
  width:100%;max-width:500px;background:var(--color-card);
  border-radius:var(--radius-xl);box-shadow:var(--shadow-card);
  overflow:hidden;display:flex;flex-direction:column;min-height:600px;
}
.game-header{
  background:linear-gradient(135deg,var(--color-primary),var(--color-primary-dark));
  color:white;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;
}
.game-title{font-size:20px;font-weight:700;}
.game-stats{display:flex;gap:14px;font-size:14px;}
.stat-item{display:flex;align-items:center;gap:4px;}
.level-indicator{
  padding:8px 20px;background:var(--color-primary-light);
  color:white;font-size:13px;font-weight:600;text-align:center;
}
.question-area{padding:14px 20px 4px;text-align:center;flex-shrink:0;}
.question-text{font-size:16px;font-weight:600;color:var(--color-text);line-height:1.5;}
.question-hint{font-size:12px;color:var(--color-text-light);margin-top:4px;}

.game-area{
  flex:1;padding:16px 20px;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
}

/* Calculator theme */
.calc-card{
  background:#F5F7FA;border-radius:var(--radius-lg);padding:24px 20px;
  width:100%;max-width:380px;text-align:center;
  border:2px solid var(--color-border);
}
.calc-formula{
  display:inline-block;background:var(--color-primary);color:white;
  padding:8px 20px;border-radius:20px;font-size:22px;font-weight:700;margin-bottom:16px;
  letter-spacing:2px;
}
.calc-problem{
  font-size:18px;font-weight:700;color:var(--color-text);margin-bottom:16px;line-height:1.6;
}
.calc-problem .highlight{color:var(--color-primary-dark);font-size:22px;}

.input-row{display:flex;gap:10px;justify-content:center;align-items:center;}
.calc-input{
  width:140px;padding:14px 16px;font-size:26px;font-weight:700;
  font-family:"Consolas","Courier New",monospace;text-align:center;
  border:3px solid var(--color-border);border-radius:var(--radius-md);outline:none;
  transition:border-color 0.2s;
}
.calc-input:focus{border-color:var(--color-primary);}
.calc-unit{font-size:18px;font-weight:600;color:var(--color-text-light);}
.submit-calc-btn{
  padding:14px 24px;font-size:18px;font-weight:700;
  color:white;background:var(--color-primary);border:none;
  border-radius:var(--radius-md);cursor:pointer;min-width:72px;
}
.submit-calc-btn:hover{background:var(--color-primary-dark);}
.submit-calc-btn:disabled{opacity:0.6;cursor:not-allowed;}

.result-display{
  text-align:center;margin-top:12px;font-size:15px;min-height:24px;line-height:1.6;
}
.result-display.correct{color:var(--color-success);font-weight:700;}
.result-display.wrong{color:var(--color-error);font-weight:700;}

/* Timer bar */
.timer-bar-wrap{
  width:100%;max-width:380px;height:6px;background:var(--color-border);
  border-radius:3px;margin-bottom:12px;overflow:hidden;
}
.timer-bar-fill{
  height:100%;border-radius:3px;transition:width 1s linear;
  background:linear-gradient(90deg,var(--color-success),var(--color-warning),var(--color-error));
}
.timer-text{font-size:13px;color:var(--color-text-light);margin-bottom:6px;}

/* Round summary */
.round-summary{padding:10px;text-align:center;font-size:14px;color:var(--color-text-light);}

.progress-bar-container{
  width:calc(100% - 40px);height:8px;background:var(--color-border);
  border-radius:4px;margin:8px 20px;overflow:hidden;
}
.progress-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--color-success),var(--color-primary));
  border-radius:4px;transition:width 0.5s ease;
}

.feedback-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.45);display:flex;
  justify-content:center;align-items:center;z-index:100;animation:fadeIn 0.2s ease;
}
.feedback-modal{
  background:white;border-radius:var(--radius-lg);padding:28px 24px;
  text-align:center;max-width:340px;width:90%;
  box-shadow:0 8px 32px rgba(0,0,0,0.2);animation:scaleIn 0.3s ease;
}
.feedback-icon{font-size:52px;margin-bottom:8px;}
.feedback-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.feedback-message{font-size:14px;color:var(--color-text-light);margin-bottom:18px;line-height:1.5;}
.feedback-btn{
  padding:12px 28px;font-size:16px;font-weight:700;
  color:white;background:var(--color-primary);border:none;border-radius:var(--radius-md);cursor:pointer;
}
.feedback-btn:hover{background:var(--color-primary-dark);}

.game-footer{
  padding:10px 20px;display:flex;justify-content:center;border-top:1px solid var(--color-border);
}
.restart-btn{
  padding:8px 20px;font-size:14px;color:var(--color-text-light);
  background:transparent;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;
}
.restart-btn:hover{color:var(--color-primary);border-color:var(--color-primary);}

.victory-container{text-align:center;padding:20px;}
.victory-icon{font-size:64px;margin-bottom:8px;animation:bounce 0.6s ease infinite alternate;}
.victory-title{font-size:24px;font-weight:700;color:var(--color-success);margin-bottom:8px;}
.victory-stats{font-size:14px;color:var(--color-text-light);margin-bottom:16px;line-height:1.8;}
.victory-btn{
  padding:12px 28px;font-size:16px;font-weight:700;
  color:white;background:var(--color-primary);border:none;
  border-radius:var(--radius-md);cursor:pointer;margin:0 6px;
}
.victory-btn:hover{background:var(--color-primary-dark);}

/* Practice styles */
.practice-container{display:none;flex-direction:column;height:100%;}
.practice-badge-bar{
  padding:10px 20px;background:var(--color-bg);display:flex;
  align-items:center;justify-content:space-between;border-bottom:1px solid var(--color-border);
}
.practice-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;}
.badge-tier-1{background:#E8F5E9;color:#2E7D32;}
.badge-tier-2{background:#E3F2FD;color:#1565C0;}
.badge-tier-3{background:#FFF3E0;color:#E65100;}
.badge-tier-4{background:#F3E5F5;color:#7B1FA2;}
.badge-tier-5{background:#FFEBEE;color:#C62828;}
.practice-progress-text{font-size:13px;color:var(--color-text-light);}
.practice-question-card{
  margin:16px 20px;padding:20px 18px;background:var(--color-card);
  border:1px solid var(--color-border);border-radius:var(--radius-lg);flex:1;
}
.practice-q-num{font-size:12px;font-weight:700;color:var(--color-primary);margin-bottom:6px;}
.practice-q-title{font-size:16px;font-weight:600;color:var(--color-text);margin-bottom:14px;line-height:1.6;}
.practice-options{display:flex;flex-direction:column;gap:10px;}
.practice-option{
  padding:12px 14px;font-size:14px;text-align:left;background:var(--color-bg);
  border:2px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;transition:all 0.2s;
}
.practice-option:hover{border-color:var(--color-primary);background:white;}
.practice-option.selected-correct{border-color:var(--color-success);background:var(--color-success-light);}
.practice-option.selected-wrong{border-color:var(--color-error);background:var(--color-error-light);}
.practice-option.show-correct{border-color:var(--color-success);}
.practice-option:disabled{pointer-events:none;}
.practice-input-area{display:flex;gap:10px;}
.practice-input{
  flex:1;padding:12px 16px;font-size:18px;font-weight:700;
  font-family:"Consolas","Courier New",monospace;text-align:center;
  border:2px solid var(--color-border);border-radius:var(--radius-md);outline:none;
}
.practice-input:focus{border-color:var(--color-primary);}
.submit-btn-sm{
  padding:12px 20px;font-size:15px;font-weight:700;color:white;
  background:var(--color-primary);border:none;border-radius:var(--radius-md);cursor:pointer;
}
.practice-feedback{
  margin:0 20px 10px;padding:10px 14px;
  border-radius:var(--radius-md);font-size:13px;line-height:1.5;display:none;
}
.practice-feedback.show{display:block;animation:fadeIn 0.3s ease;}
.practice-feedback.correct{background:var(--color-success-light);color:#2E7D32;}
.practice-feedback.wrong{background:var(--color-error-light);color:#C62828;}
.practice-nav{
  padding:10px 20px;display:flex;gap:10px;justify-content:center;border-top:1px solid var(--color-border);
}
.practice-nav-btn{padding:10px 22px;font-size:15px;font-weight:700;border:none;border-radius:var(--radius-md);cursor:pointer;}
.practice-nav-btn.primary{background:var(--color-primary);color:white;}
.practice-nav-btn.primary:hover{background:var(--color-primary-dark);}
.practice-nav-btn.primary:disabled{opacity:0.5;cursor:not-allowed;}
.practice-nav-btn.secondary{background:transparent;color:var(--color-text-light);border:1px solid var(--color-border);}
.practice-summary{text-align:center;padding:24px 16px;}
.practice-summary-icon{font-size:56px;margin-bottom:10px;}
.practice-summary-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.practice-summary-score{font-size:32px;font-weight:700;margin-bottom:10px;}
.practice-summary-detail{font-size:14px;color:var(--color-text-light);margin-bottom:16px;line-height:1.8;}

.hidden{display:none!important;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
@keyframes pulse-success{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

@media(max-width:360px){.calc-problem{font-size:15px;}.calc-input{width:100px;font-size:20px;}}
@media(min-width:768px){.game-container{max-width:560px;min-height:660px;}}
</style>
</head>
<body>

<div class="game-container" id="gameContainer">
  <div class="game-header">
    <div class="game-title">🧮 半径直径计算王</div>
    <div class="game-stats">
      <div class="stat-item"><span>⭐</span><span id="scoreDisplay">0</span></div>
      <div class="stat-item"><span>📋</span><span id="levelDisplay">1/5</span></div>
    </div>
  </div>
  <div class="level-indicator" id="levelLabel">第 1 关 · 热身计算</div>

  <div class="question-area">
    <div class="question-text" id="questionText">根据已知条件，计算未知值</div>
    <div class="question-hint" id="questionHint">💡 公式：d = 2r，r = d ÷ 2</div>
  </div>

  <div class="game-area" id="gameArea">
    <div class="timer-bar-wrap hidden" id="timerBarWrap">
      <div class="timer-bar-fill" id="timerBarFill" style="width:100%"></div>
    </div>
    <div class="timer-text" id="timerText"></div>
    <div class="calc-card">
      <div class="calc-formula">d = 2r</div>
      <div class="calc-problem" id="calcProblem">
        已知半径 r = <span class="highlight">3</span> cm，<br>直径 d = ？
      </div>
      <div class="input-row">
        <input type="text" class="calc-input" id="calcInput" placeholder="?" autocomplete="off" inputmode="decimal">
        <span class="calc-unit">cm</span>
        <button class="submit-calc-btn" id="submitCalcBtn">✓</button>
      </div>
      <div class="result-display" id="resultDisplay"></div>
    </div>
    <div class="round-summary" id="roundSummary"></div>
  </div>

  <div class="progress-bar-container">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>

  <div class="game-footer">
    <button class="restart-btn" id="restartBtn">🔄 重新开始</button>
  </div>
</div>

<div class="feedback-overlay hidden" id="feedbackOverlay">
  <div class="feedback-modal">
    <div class="feedback-icon" id="feedbackIcon">✅</div>
    <div class="feedback-title" id="feedbackTitle"></div>
    <div class="feedback-message" id="feedbackMessage"></div>
    <button class="feedback-btn" id="feedbackBtn">继续 →</button>
  </div>
</div>

<div class="practice-container hidden" id="practiceContainer">
  <div class="practice-badge-bar">
    <span class="practice-badge" id="practiceBadge">📝 巩固练习</span>
    <span class="practice-progress-text" id="practiceProgress">第 1/5 题</span>
  </div>
  <div class="practice-question-card">
    <div class="practice-q-num" id="practiceQNum">第 1 题</div>
    <div class="practice-q-title" id="practiceQTitle"></div>
    <div id="practiceQContent"></div>
  </div>
  <div class="practice-feedback" id="practiceFeedback"></div>
  <div class="practice-nav">
    <button class="practice-nav-btn secondary hidden" id="practiceSkipBtn">跳过</button>
    <button class="practice-nav-btn primary" id="practiceNextBtn">下一题 →</button>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);

const gameContainer=$('#gameContainer');
const scoreDisplay=$('#scoreDisplay');
const levelDisplay=$('#levelDisplay');
const levelLabel=$('#levelLabel');
const questionText=$('#questionText');
const questionHint=$('#questionHint');
const calcProblem=$('#calcProblem');
const calcInput=$('#calcInput');
const submitCalcBtn=$('#submitCalcBtn');
const resultDisplay=$('#resultDisplay');
const roundSummary=$('#roundSummary');
const progressBar=$('#progressBar');
const restartBtn=$('#restartBtn');
const feedbackOverlay=$('#feedbackOverlay');
const feedbackIcon=$('#feedbackIcon');
const feedbackTitle=$('#feedbackTitle');
const feedbackMessage=$('#feedbackMessage');
const feedbackBtn=$('#feedbackBtn');
const timerBarWrap=$('#timerBarWrap');
const timerBarFill=$('#timerBarFill');
const timerText=$('#timerText');
const practiceContainer=$('#practiceContainer');
const practiceBadge=$('#practiceBadge');
const practiceProgress=$('#practiceProgress');
const practiceQNum=$('#practiceQNum');
const practiceQTitle=$('#practiceQTitle');
const practiceQContent=$('#practiceQContent');
const practiceFeedback=$('#practiceFeedback');
const practiceNextBtn=$('#practiceNextBtn');

const state={
  score:0,level:1,totalLevels:5,
  questionsPerLevel:4,currentQ:0,
  correctInLevel:0,totalInLevel:0,
  timerInterval:null,timeLeft:0,maxTime:0,
  correctCount:0,totalAttempts:0,
  mode:'game',practiceTier:1,practiceIndex:0,practiceCorrect:0,
};

// Problem generators
function generateProblem(lvl){
  const types=[];
  // Basic: given r, find d
  if(lvl<=4)types.push('r2d');
  // Given d, find r
  if(lvl>=2)types.push('d2r');
  // Decimal
  if(lvl>=3)types.push('r2d_decimal','d2r_decimal');
  // Word problem style
  if(lvl>=4)types.push('word');

  const type=types[Math.floor(Math.random()*types.length)];

  switch(type){
    case 'r2d':{
      const r=Math.floor(Math.random()*15)+2;
      return{known:'r',knownVal:r,find:'d',answer:r*2,
        html:`已知半径 r = <span class="highlight">${r}</span> cm，<br>直径 d = ？`};
    }
    case 'd2r':{
      const d=(Math.floor(Math.random()*12)+1)*2;
      return{known:'d',knownVal:d,find:'r',answer:d/2,
        html:`已知直径 d = <span class="highlight">${d}</span> cm，<br>半径 r = ？`};
    }
    case 'r2d_decimal':{
      const r=(Math.floor(Math.random()*12)+2)*0.5;
      const sr=Number.isInteger(r)?r.toFixed(0):r.toFixed(1);
      return{known:'r',knownVal:parseFloat(sr),find:'d',answer:parseFloat(sr)*2,
        html:`已知半径 r = <span class="highlight">${sr}</span> cm，<br>直径 d = ？`};
    }
    case 'd2r_decimal':{
      const d=(Math.floor(Math.random()*10)+1)*1;
      const sd=Number.isInteger(d)?d.toFixed(0):d.toFixed(1);
      const ans=d/2;
      const sa=Number.isInteger(ans)?ans.toFixed(0):ans.toFixed(1);
      return{known:'d',knownVal:parseFloat(sd),find:'r',answer:parseFloat(sa),
        html:`已知直径 d = <span class="highlight">${sd}</span> cm，<br>半径 r = ？`};
    }
    case 'word':{
      if(Math.random()<0.5){
        const r=Math.floor(Math.random()*10)+2;
        return{known:'r',knownVal:r,find:'d',answer:r*2,
          html:`用圆规画圆，圆规两脚张开 <span class="highlight">${r}</span> cm，<br>画出的圆直径是？`};
      }else{
        const d=(Math.floor(Math.random()*8)+2)*2;
        return{known:'d',knownVal:d,find:'r',answer:d/2,
          html:`画一个直径 <span class="highlight">${d}</span> cm 的圆，<br>圆规两脚应张开多少？`};
      }
    }
    default:{
      const r=Math.floor(Math.random()*10)+3;
      return{known:'r',knownVal:r,find:'d',answer:r*2,
        html:`已知半径 r = <span class="highlight">${r}</span> cm，<br>直径 d = ？`};
    }
  }
}

const levelConfigs={
  1:{name:'第 1 关 · 热身计算',hint:'💡 公式：d = 2r — 已知半径求直径',time:0,qCount:4},
  2:{name:'第 2 关 · 双向运算',hint:'💡 已知直径求半径：r = d ÷ 2',time:0,qCount:4},
  3:{name:'第 3 关 · 小数登场',hint:'💡 注意小数！半径和直径都可能带小数',time:0,qCount:4},
  4:{name:'第 4 关 · 限时速算',hint:'⏰ 90秒完成4道题！',time:90,qCount:4},
  5:{name:'第 5 关 · 终极冲刺',hint:'⏰ 60秒完成5道混合题！',time:60,qCount:5},
};

let currentProblem=null;

function setupLevel(){
  const cfg=levelConfigs[state.level];
  levelLabel.textContent=cfg.name;
  questionHint.textContent=cfg.hint;
  state.questionsPerLevel=cfg.qCount;
  state.currentQ=0;
  state.correctInLevel=0;
  state.totalInLevel=0;
  resultDisplay.textContent='';
  resultDisplay.className='result-display';
  roundSummary.textContent='';
  calcInput.value='';
  calcInput.disabled=false;
  submitCalcBtn.disabled=false;
  calcInput.focus();
  progressBar.style.width=((state.level-1)/state.totalLevels*100)+'%';

  generateAndShow();

  if(cfg.time>0){
    timerBarWrap.classList.remove('hidden');
    state.timeLeft=cfg.time;state.maxTime=cfg.time;
    timerBarFill.style.width='100%';
    timerText.textContent=`⏰ 剩余 ${cfg.time} 秒`;
    if(state.timerInterval)clearInterval(state.timerInterval);
    state.timerInterval=setInterval(()=>{
      state.timeLeft--;
      timerBarFill.style.width=(state.timeLeft/state.maxTime*100)+'%';
      timerText.textContent=`⏰ 剩余 ${state.timeLeft} 秒`;
      if(state.timeLeft<=0){
        clearInterval(state.timerInterval);state.timerInterval=null;
        calcInput.disabled=true;submitCalcBtn.disabled=true;
        finishLevel();
      }
    },1000);
  }else{
    timerBarWrap.classList.add('hidden');
    timerText.textContent='';
  }
}

function generateAndShow(){
  if(state.currentQ>=state.questionsPerLevel){finishLevel();return;}
  currentProblem=generateProblem(state.level);
  calcProblem.innerHTML=currentProblem.html;
  calcInput.value='';
  resultDisplay.textContent='';
  resultDisplay.className='result-display';
  calcInput.disabled=false;
  submitCalcBtn.disabled=false;
  calcInput.focus();
  roundSummary.textContent=`第 ${state.currentQ+1}/${state.questionsPerLevel} 题`;
}

function checkAnswer(){
  if(!currentProblem||calcInput.disabled)return;
  state.totalAttempts++;
  state.totalInLevel++;
  const userAns=calcInput.value.trim();
  if(userAns==='')return;

  const userNum=parseFloat(userAns);
  const correct=currentProblem.answer;
  const tolerance=0.01;

  calcInput.disabled=true;
  submitCalcBtn.disabled=true;

  if(Math.abs(userNum-correct)<tolerance){
    state.correctCount++;
    state.correctInLevel++;
    const pts=state.level>=4?30:20;
    state.score+=pts;
    scoreDisplay.textContent=state.score;
    resultDisplay.textContent=`✅ 正确！${currentProblem.known==='r'?'d=2×'+currentProblem.knownVal+'='+correct:'r='+currentProblem.knownVal+'÷2='+correct} cm (+${pts}分)`;
    resultDisplay.className='result-display correct';
  }else{
    resultDisplay.textContent=`❌ 正确答案是 ${correct} cm。${currentProblem.known==='r'?'d=2r':'r=d÷2'}，再想想！`;
    resultDisplay.className='result-display wrong';
  }

  state.currentQ++;
  setTimeout(()=>{
    if(state.currentQ>=state.questionsPerLevel){
      finishLevel();
    }else{
      generateAndShow();
    }
  },1200);
}

function finishLevel(){
  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null;}
  timerBarWrap.classList.add('hidden');
  timerText.textContent='';

  const pct=state.totalInLevel>0?Math.round((state.correctInLevel/state.totalInLevel)*100):0;
  state.level++;
  progressBar.style.width=((state.level-1)/state.totalLevels*100)+'%';
  levelDisplay.textContent=`${Math.min(state.level,state.totalLevels)}/${state.totalLevels}`;

  if(state.level>state.totalLevels){
    showVictory();
    return;
  }

  const ga=document.getElementById('gameArea');
  ga.innerHTML=`
    <div class="calc-card" style="text-align:center;">
      <div style="font-size:48px;margin-bottom:8px;">${pct>=80?'🌟':pct>=50?'👍':'💪'}</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px;">本关：${state.correctInLevel}/${state.totalInLevel} 正确</div>
      <div style="font-size:14px;color:var(--color-text-light);margin-bottom:16px;">
        ${pct>=80?'太棒了！你对 d=2r 掌握得很好！':pct>=50?'不错，继续加油！':'别灰心，熟能生巧！'}
      </div>
      <button class="submit-calc-btn" onclick="startNextLevel()">➡️ 下一关</button>
    </div>`;
}

function startNextLevel(){
  const ga=document.getElementById('gameArea');
  ga.innerHTML=`
    <div class="timer-bar-wrap hidden" id="timerBarWrap"><div class="timer-bar-fill" id="timerBarFill" style="width:100%"></div></div>
    <div class="timer-text" id="timerText"></div>
    <div class="calc-card">
      <div class="calc-formula">d = 2r</div>
      <div class="calc-problem" id="calcProblem"></div>
      <div class="input-row">
        <input type="text" class="calc-input" id="calcInput" placeholder="?" autocomplete="off" inputmode="decimal">
        <span class="calc-unit">cm</span>
        <button class="submit-calc-btn" id="submitCalcBtn">✓</button>
      </div>
      <div class="result-display" id="resultDisplay"></div>
    </div>
    <div class="round-summary" id="roundSummary"></div>`;
  setupLevel();
  // Rebind events
  document.getElementById('submitCalcBtn').addEventListener('click',checkAnswer);
  document.getElementById('calcInput').addEventListener('keydown',(e)=>{if(e.key==='Enter')checkAnswer();});
}

submitCalcBtn.addEventListener('click',checkAnswer);
calcInput.addEventListener('keydown',(e)=>{if(e.key==='Enter')checkAnswer();});

function showVictory(){
  if(state.timerInterval){clearInterval(state.timerInterval);}
  const accuracy=state.totalAttempts>0?Math.round((state.correctCount/state.totalAttempts)*100):0;
  const tier=determinePracticeTier();
  const tierLabel=difficultyLabels[tier];

  const ga=document.getElementById('gameArea');
  ga.innerHTML=`
    <div class="victory-container">
      <div class="victory-icon">🏆</div>
      <div class="victory-title">计算之王！</div>
      <div class="victory-stats">
        <div>📋 完成关卡：${state.totalLevels} 关</div>
        <div>⭐ 总得分：${state.score} 分</div>
        <div>📊 计算正确率：${accuracy}%</div>
      </div>
      <button class="victory-btn" onclick="enterPracticeMode()">
        📝 进入练习 <small>(${tierLabel.icon} ${tierLabel.name})</small>
      </button>
      <div style="margin-top:8px;">
        <button class="restart-btn" onclick="restartGame()">🔄 重新开始</button>
      </div>
    </div>`;
}

function restartGame(){
  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null;}
  state.score=0;state.level=1;state.correctCount=0;state.totalAttempts=0;
  state.correctInLevel=0;state.totalInLevel=0;state.currentQ=0;
  scoreDisplay.textContent='0';levelDisplay.textContent='1/5';progressBar.style.width='0%';
  gameContainer.classList.remove('hidden');
  practiceContainer.classList.add('hidden');practiceContainer.style.display='none';

  const ga=document.getElementById('gameArea');
  ga.innerHTML=`
    <div class="timer-bar-wrap hidden" id="timerBarWrap"><div class="timer-bar-fill" id="timerBarFill" style="width:100%"></div></div>
    <div class="timer-text" id="timerText"></div>
    <div class="calc-card">
      <div class="calc-formula">d = 2r</div>
      <div class="calc-problem" id="calcProblem"></div>
      <div class="input-row">
        <input type="text" class="calc-input" id="calcInput" placeholder="?" autocomplete="off" inputmode="decimal">
        <span class="calc-unit">cm</span>
        <button class="submit-calc-btn" id="submitCalcBtn">✓</button>
      </div>
      <div class="result-display" id="resultDisplay"></div>
    </div>
    <div class="round-summary" id="roundSummary"></div>`;
  // Re-setup timerBar references
  setupLevel();
  document.getElementById('submitCalcBtn').addEventListener('click',checkAnswer);
  document.getElementById('calcInput').addEventListener('keydown',(e)=>{if(e.key==='Enter')checkAnswer();});
}

// ============================================
// Practice System
// ============================================
const difficultyLabels={
  1:{name:'基础巩固',icon:'🌱',badgeClass:'badge-tier-1'},
  2:{name:'查漏补缺',icon:'🔍',badgeClass:'badge-tier-2'},
  3:{name:'能力提升',icon:'📈',badgeClass:'badge-tier-3'},
  4:{name:'思维拓展',icon:'🚀',badgeClass:'badge-tier-4'},
  5:{name:'挑战冲刺',icon:'🏆',badgeClass:'badge-tier-5'},
};

const practiceProblems={
  1:[
    {type:'choice',q:'圆形中，最中心的那个点叫什么？',options:['顶点','中心点','圆心','圆点'],answer:2,hint:'圆的中心，用字母 O 表示的那个点。'},
    {type:'choice',q:'从圆心到圆上任意一点的线段叫什么？',options:['直径','半径','弦','周长'],answer:1,hint:'半径连接圆心和圆上任意一点，用字母 r 表示。'},
    {type:'choice',q:'通过圆心并且两端都在圆上的线段叫什么？',options:['半径','弧','弦','直径'],answer:3,hint:'直径是最长的弦，它经过圆心，用字母 d 表示。'},
    {type:'fill',q:'圆心用字母 ___ 表示，半径用字母 ___ 表示，直径用字母 ___ 表示。（用大写字母，用逗号分隔，如：A,B,C）',answer:'O,r,d',hint:'圆心是 O，半径是 r，直径是 d。'},
  ],
  2:[
    {type:'choice',q:'在同一个圆中，直径的长度是半径的几倍？',options:['1倍','2倍','3倍','一半'],answer:1,hint:'直径 = 半径 × 2，即 d = 2r。'},
    {type:'choice',q:'一个圆的半径是4cm，它的直径是多少？',options:['2cm','4cm','6cm','8cm'],answer:3,hint:'d = 2r = 2 × 4 = 8cm。'},
    {type:'choice',q:'画圆时，圆规两脚之间的距离是圆的什么？',options:['直径','半径','周长','圆心'],answer:1,hint:'圆规的针尖是圆心，针尖到笔尖的距离就是半径。'},
    {type:'fill',q:'一个圆的直径是10cm，它的半径是___cm。',answer:'5',hint:'r = d ÷ 2 = 10 ÷ 2 = 5cm。'},
  ],
  3:[
    {type:'choice',q:'用圆规画一个直径6cm的圆，圆规两脚应张开多少？',options:['3cm','6cm','12cm','1.5cm'],answer:0,hint:'圆规两脚距离 = 半径。直径6cm → 半径 = 6÷2 = 3cm。'},
    {type:'choice',q:'下面哪个说法是正确的？',options:['半径一定比直径短','同一个圆中所有半径都相等','直径不经过圆心','圆的对称轴只有2条'],answer:1,hint:'同圆中所有半径确实都相等。'},
    {type:'fill',q:'一个圆的半径是3.5cm，它的直径是___cm。',answer:'7',hint:'d = 2r = 2 × 3.5 = 7cm。'},
    {type:'choice',q:'小华用圆规画了一个圆，圆规两脚张开5cm。这个圆的直径是多少？',options:['2.5cm','5cm','10cm','15cm'],answer:2,hint:'圆规两脚=半径=5cm，直径=2×5=10cm。'},
  ],
  4:[
    {type:'choice',q:'一个圆的直径是9cm，小明说"半径是4.5cm"，小红说"半径是18cm"。谁说得对？',options:['小明对','小红对','都不对','都对'],answer:0,hint:'r = d÷2 = 9÷2 = 4.5cm。小明对。'},
    {type:'choice',q:'下面哪一项不是判断一个图形是否为圆的必要条件？',options:['所有半径相等','有一个中心点','有四条对称轴','是封闭的曲线'],answer:2,hint:'圆有无数条对称轴，不是"四条"。'},
    {type:'fill',q:'如果在一个圆中画了5条不同的半径，长度都是3cm。这个圆的直径是___cm。',answer:'6',hint:'直径 = 2×3 = 6cm。'},
    {type:'choice',q:'要在地上画一个直径20米的圆形操场，只用一根绳子和一根木桩，绳子应该多长？',options:['10米','20米','40米','5米'],answer:0,hint:'绳子=半径。直径20米→半径=10米。'},
  ],
  5:[
    {type:'choice',q:'墨子说："圆，一中同长也。"这句话中的"一中"和"同长"分别指什么？',options:['中=圆心，同长=半径都相等','中=中心线，同长=直径都相等','中=中点，同长=圆周长相等','中=中间，同长=面积都相等'],answer:0,hint:'"一中"指圆心；"同长"指半径都相等。'},
    {type:'fill',q:'一个圆可以画无数条对称轴。每条对称轴都通过圆的___。（填一个汉字+一个字母）',answer:'圆心O',hint:'每条对称轴都是直径所在直线，都经过圆心O。'},
    {type:'choice',q:'小明的圆规坏了——画圆时两脚距离会慢慢变大。他用这个圆规能画出真正的圆吗？',options:['能，只要针尖固定就行','不能，因为半径在变','能，转一圈就是圆','不能，因为针尖会移动'],answer:1,hint:'圆要求"定长"。半径在变就不是真正的圆。'},
    {type:'choice',q:'大圆的半径是小圆半径的3倍。那么大圆的直径是小圆直径的几倍？',options:['1.5倍','3倍','6倍','9倍'],answer:1,hint:'半径成比例，直径也成相同比例。'},
  ],
};

function determinePracticeTier(){
  const accuracy=state.totalAttempts>0?state.correctCount/state.totalAttempts:0;
  if(accuracy<0.4)return 1;
  if(accuracy<0.6)return 2;
  if(accuracy<0.8)return 3;
  if(accuracy<0.95)return 4;
  return 5;
}

function enterPracticeMode(){
  state.practiceTier=determinePracticeTier();
  state.mode='practice';state.practiceIndex=0;state.practiceCorrect=0;
  gameContainer.classList.add('hidden');
  practiceContainer.classList.remove('hidden');practiceContainer.style.display='flex';
  const tier=difficultyLabels[state.practiceTier];
  practiceBadge.innerHTML=`${tier.icon} ${tier.name}`;
  practiceBadge.className=`practice-badge ${tier.badgeClass}`;
  practiceNextBtn.textContent='开始答题 →';practiceNextBtn.classList.remove('hidden');practiceNextBtn.disabled=false;
  renderPracticeQuestion();
}

function renderPracticeQuestion(){
  const problems=practiceProblems[state.practiceTier];
  if(!problems||state.practiceIndex>=problems.length){showPracticeSummary();return;}
  const p=problems[state.practiceIndex],total=problems.length;
  practiceProgress.textContent=`第 ${state.practiceIndex+1}/${total} 题`;
  practiceQNum.textContent=`第 ${state.practiceIndex+1} 题`;
  practiceQTitle.textContent=p.q;
  practiceFeedback.classList.remove('show','correct','wrong');
  practiceFeedback.textContent='';
  if(p.type==='fill'){
    practiceQContent.innerHTML=`
      <div class="practice-input-area">
        <input type="text" class="practice-input" id="practiceInput" placeholder="输入答案" autocomplete="off">
        <button class="submit-btn-sm" id="practiceSubmitBtn">确认</button>
      </div>`;
    document.getElementById('practiceSubmitBtn').addEventListener('click',handlePracticeSubmit);
    document.getElementById('practiceInput').addEventListener('keydown',(e)=>{if(e.key==='Enter')handlePracticeSubmit();});
    document.getElementById('practiceInput').focus();
  }else{
    practiceQContent.innerHTML='<div class="practice-options"></div>';
    const opts=practiceQContent.querySelector('.practice-options');
    p.options.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='practice-option';btn.textContent=opt;
      btn.addEventListener('click',()=>handlePracticeChoice(i,p.answer,p.options[p.answer]));
      opts.appendChild(btn);
    });
  }
  practiceNextBtn.textContent=state.practiceIndex<problems.length-1?'下一题 →':'查看结果 📊';
  practiceNextBtn.disabled=true;
}

function handlePracticeChoice(selected,correctIdx,correctText){
  const opts=practiceQContent.querySelectorAll('.practice-option');
  opts.forEach(o=>o.disabled=true);
  if(selected===correctIdx){
    opts[selected].classList.add('selected-correct');state.practiceCorrect++;
    practiceFeedback.textContent=`✅ 正确！${correctText}`;
    practiceFeedback.className='practice-feedback show correct';
  }else{
    opts[selected].classList.add('selected-wrong');
    opts[correctIdx].classList.add('show-correct');
    practiceFeedback.textContent=`❌ 正确答案是 ${correctText}。加油！`;
    practiceFeedback.className='practice-feedback show wrong';
  }
  practiceNextBtn.disabled=false;
}

function handlePracticeSubmit(){
  const input=document.getElementById('practiceInput');
  const btn=document.getElementById('practiceSubmitBtn');
  if(!input||btn.disabled)return;
  const p=practiceProblems[state.practiceTier][state.practiceIndex];
  const userAnswer=input.value.trim();
  btn.disabled=true;input.disabled=true;
  if(userAnswer===p.answer){
    state.practiceCorrect++;
    practiceFeedback.textContent=`✅ 正确！答案就是 ${p.answer}`;
    practiceFeedback.className='practice-feedback show correct';
  }else{
    practiceFeedback.textContent=`❌ 正确答案是 ${p.answer}。${p.hint||''}`;
    practiceFeedback.className='practice-feedback show wrong';
  }
  practiceNextBtn.disabled=false;
}

function handlePracticeNext(){
  const problems=practiceProblems[state.practiceTier];
  if(state.practiceIndex>=problems.length-1){showPracticeSummary();return;}
  state.practiceIndex++;renderPracticeQuestion();
}

function showPracticeSummary(){
  const problems=practiceProblems[state.practiceTier];
  const total=problems?problems.length:0;
  const pct=total>0?Math.round((state.practiceCorrect/total)*100):0;
  let emoji,color;
  if(pct>=80){emoji='🌟';color='var(--color-success)';}
  else if(pct>=60){emoji='👍';color='var(--color-primary)';}
  else{emoji='💪';color='var(--color-warning)';}
  gameContainer.classList.remove('hidden');
  practiceContainer.classList.add('hidden');practiceContainer.style.display='none';
  const ga=document.getElementById('gameArea');
  ga.innerHTML=`
    <div class="practice-summary">
      <div class="practice-summary-icon">${emoji}</div>
      <div class="practice-summary-title">练习完成！</div>
      <div class="practice-summary-score" style="color:${color}">${state.practiceCorrect}/${total}</div>
      <div class="practice-summary-detail">
        <div>📊 正确率：${pct}%</div>
        <div>🎮 游戏得分：${state.score} 分</div>
        ${pct>=80?'<div>🏆 太棒了！d=2r 已经刻在你的脑海里了！</div>':
          pct>=60?'<div>📚 不错！半径直径换算越算越顺手！</div>':
          '<div>🌱 没关系，"d=2r"多练几次就熟练了！</div>'}
      </div>
      <button class="victory-btn" onclick="restartGame()">🔄 再来一次</button>
    </div>`;
}

restartBtn.addEventListener('click',restartGame);
practiceNextBtn.addEventListener('click',handlePracticeNext);
setupLevel();
</script>
